<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080808">
  <title>MAX TIME</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080808;
      --bg2:     #0f0f0f;
      --bg3:     #181818;
      --bg4:     #202020;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text:    #f2f2f2;
      --muted:   #4a4a4a;
      --muted2:  #777;
      --red:     #d42b2b;
      --red2:    #ff3c3c;
      --red-dim: rgba(212,43,43,0.1);
      --gold:    #c9a84c;
      --gold2:   #f0cc6e;
      --gold-dim:rgba(201,168,76,0.08);
      --gold-border:rgba(201,168,76,0.25);
      --white:   #ffffff;
      --carry:   #c9a84c;
      --carry-bg:rgba(201,168,76,0.06);
      --carry-border:rgba(201,168,76,0.28);
      --green:   #2ecc71;
      --green-dim:rgba(46,204,113,0.09);
      --font-d:  'Bebas Neue', sans-serif;
      --font-m:  'DM Mono', monospace;
      --font-b:  'Inter', sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
    input{font-size:16px!important;font-family:var(--font-m);}
    input:focus{outline:none;}
    button{font-family:var(--font-b);cursor:pointer;border:none;}
    button:active{transform:scale(0.95);}

    /* ── STICKY HEADER ── */
    .sticky-header{
      flex-shrink:0;
      padding:14px 14px 10px;
      background:var(--bg);
      position:relative;
      z-index:10;
      border-bottom:1px solid var(--border);
    }
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}

    /* Brand */
    .brand{
      display:flex;align-items:baseline;gap:4px;
      font-family:var(--font-d);
      letter-spacing:3px;
      line-height:1;
    }
    .brand-max{font-size:30px;color:var(--white);}
    .brand-time{
      font-size:30px;
      background:linear-gradient(90deg,var(--red),var(--gold));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand-dot{width:7px;height:7px;border-radius:50%;background:var(--red);margin-bottom:4px;flex-shrink:0;animation:pulse-dot 2s infinite;}
    @keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(212,43,43,0.5)}50%{box-shadow:0 0 0 5px rgba(212,43,43,0)}}

    .clock-display{
      font-family:var(--font-m);font-size:17px;color:var(--muted2);
      letter-spacing:2px;
    }

    /* Tabs */
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg3);padding:3px;border-radius:10px;border:1px solid var(--border);}
    .tab-btn{padding:10px;border-radius:8px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;background:transparent;color:var(--muted2);letter-spacing:.3px;}
    .tab-btn.active-training{background:var(--red);color:#fff;}
    .tab-btn.active-nutrition{background:linear-gradient(135deg,var(--gold),#a87c30);color:#000;}

    /* ── SCROLL ── */
    .scroll-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 40px;-webkit-overflow-scrolling:touch;}
    .scroll-content::-webkit-scrollbar{display:none;}
    .scroll-content{scrollbar-width:none;}

    /* ── HEADER CARD ── */
    .header-card{border-radius:14px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
    .header-card.week-1-2{background:linear-gradient(135deg,#100505 0%,#2a0808 100%);}
    .header-card.week-3-4{background:linear-gradient(135deg,#100808 0%,#3a1010 100%);}
    .header-card.week-5-6{background:linear-gradient(135deg,#180a00 0%,#4a1800 100%);}
    .header-card.week-7{background:linear-gradient(135deg,#0a1000 0%,#1a2800 100%);}
    .header-glow{position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none;}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
    .workout-title{font-family:var(--font-d);font-size:26px;letter-spacing:2px;color:var(--white);}
    .header-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:5px;font-family:var(--font-m);}
    .header-info{font-size:11px;color:var(--gold);margin-top:3px;font-family:var(--font-m);letter-spacing:.5px;}
    .week-badge{
      background:rgba(0,0,0,0.35);border:1px solid var(--gold-border);
      border-radius:10px;padding:8px 14px;text-align:center;flex-shrink:0;
    }
    .week-num{font-family:var(--font-d);font-size:28px;color:var(--gold2);}
    .week-label{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-top:1px;}
    .day-buttons{display:flex;gap:5px;}
    .day-btn{flex:1;padding:9px;border-radius:7px;font-size:13px;font-weight:700;transition:all 0.18s;}
    .day-btn.active{background:var(--red);color:#fff;box-shadow:0 2px 12px rgba(212,43,43,0.3);}
    .day-btn.inactive{background:rgba(255,255,255,0.05);color:var(--muted2);}

    /* ── CARRY LEGEND ── */
    .carry-legend{background:var(--carry-bg);border:1px solid var(--carry-border);border-radius:10px;padding:9px 13px;margin-bottom:12px;display:flex;align-items:center;gap:9px;font-size:12px;color:var(--gold2);line-height:1.4;}

    /* ── EXERCISE CARD ── */
    .exercise-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:9px;transition:border-color 0.2s;}
    .exercise-card.all-done{border-color:rgba(46,204,113,0.3);}
    .exercise-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
    .exercise-name{font-weight:700;font-size:14px;color:var(--text);line-height:1.3;}
    .exercise-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;}
    .meta-tag{font-family:var(--font-m);font-size:10px;padding:3px 7px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);}
    .meta-tag.gold{color:var(--gold2);border-color:rgba(201,168,76,0.2);}
    .meta-tag.red{color:#ff6b6b;border-color:rgba(212,43,43,0.25);}
    .meta-tag.dim{color:#a78bfa;border-color:rgba(167,139,250,0.2);}
    .exercise-badges{display:flex;align-items:center;gap:5px;flex-shrink:0;}
    .badge-done{background:var(--green);color:#000;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;letter-spacing:1px;animation:pulse-badge 2s infinite;}
    @keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.75}}
    .hint-btn{background:rgba(255,255,255,0.04);color:var(--muted2);border:1px solid var(--border2);font-size:11px;padding:4px 9px;border-radius:20px;font-weight:600;}
    .hint-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:11px;margin-bottom:11px;font-size:12px;color:#aaa;line-height:1.6;}
    .hint-title{font-weight:700;color:var(--gold);margin-bottom:4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;}

    /* ── SET ROW ── */
    .set-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;margin-bottom:5px;border:1px solid transparent;transition:all 0.18s;}
    .set-row.incomplete{background:var(--bg3);border-color:var(--border);}
    .set-row.complete{background:var(--green-dim);border-color:rgba(46,204,113,0.2);}
    .set-row.carry-over{background:var(--carry-bg);border-color:var(--carry-border);}
    .set-row.carry-over.complete{background:var(--green-dim);border-color:rgba(46,204,113,0.2);}
    .set-num{font-family:var(--font-m);font-size:10px;color:var(--muted);width:24px;flex-shrink:0;}
    .set-inputs{display:flex;gap:6px;flex:1;}
    .set-input{padding:7px 9px;font-size:13px!important;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--text);width:76px;font-family:var(--font-m)!important;transition:all 0.18s;}
    .set-input:focus{border-color:var(--red);background:rgba(212,43,43,0.06);}
    .set-input.carry{color:var(--gold2);border-color:var(--carry-border);background:var(--carry-bg);}
    .set-input.small{width:60px;}
    .carry-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}
    .check-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.18s;flex-shrink:0;}
    .check-btn.incomplete{background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--muted);}
    .check-btn.complete{background:var(--green);color:#000;font-weight:900;}

    /* ── WEEK NAV ── */
    .week-nav{display:flex;gap:7px;margin:16px 0 9px;align-items:center;}
    .week-btn{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:9px 13px;border-radius:8px;font-size:13px;font-weight:700;}
    .week-btn:disabled{opacity:0.25;cursor:not-allowed;}
    .week-current{flex:1;background:rgba(201,168,76,0.07);border:1px solid var(--gold-border);color:var(--gold2);padding:9px;border-radius:8px;font-weight:700;text-align:center;font-size:13px;font-family:var(--font-m);}
    .next-week-btn{width:100%;background:linear-gradient(135deg,var(--red),#a01a1a);color:#fff;padding:13px;border-radius:11px;font-weight:800;font-size:15px;margin-bottom:16px;box-shadow:0 4px 20px rgba(212,43,43,0.2);letter-spacing:.3px;}
    .final-week{background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold2);padding:15px;border-radius:11px;text-align:center;font-family:var(--font-d);font-size:22px;letter-spacing:3px;margin-bottom:16px;}
    .rest-day{text-align:center;padding:60px 0;}
    .rest-icon{font-size:56px;margin-bottom:14px;}
    .rest-title{font-family:var(--font-d);font-size:30px;letter-spacing:2px;margin-bottom:7px;color:var(--gold2);}
    .rest-subtitle{color:var(--muted2);font-size:13px;}
    .reset-btn{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:10px;border-radius:9px;font-size:12px;margin-top:12px;}

    /* ─────────────────────────────────────
       NUTRITION — полностью переработано
    ───────────────────────────────────── */

    /* Верхняя карточка с калориями + макро */
    .nutr-hero{
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      margin-bottom:12px;
      position:relative;
      overflow:hidden;
    }
    .nutr-hero::before{
      content:'';position:absolute;top:-30px;right:-30px;
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);
      pointer-events:none;
    }
    .nutr-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .nutr-kcal-block{}
    .nutr-kcal-label{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;font-family:var(--font-m);margin-bottom:4px;}
    .nutr-kcal-val{font-family:var(--font-d);font-size:46px;line-height:1;color:var(--white);}
    .nutr-kcal-sub{font-size:11px;color:var(--muted2);font-family:var(--font-m);margin-top:3px;}
    .nutr-kcal-bar{height:3px;background:var(--bg4);border-radius:99px;margin-top:8px;overflow:hidden;width:140px;}
    .nutr-kcal-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width .4s;}

    .nutr-macro-col{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
    .macro-pill{display:flex;align-items:center;gap:8px;}
    .macro-pill-label{font-size:10px;color:var(--muted2);font-family:var(--font-m);text-align:right;}
    .macro-pill-bar{width:70px;height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;}
    .macro-pill-fill{height:100%;border-radius:99px;transition:width .4s;}
    .macro-pill-fill.p{background:var(--red2);}
    .macro-pill-fill.f{background:var(--gold);}
    .macro-pill-fill.c{background:#60a5fa;}
    .macro-pill-val{font-family:var(--font-m);font-size:11px;color:var(--text);min-width:34px;text-align:right;}

    /* Секция дневного плана */
    .nutr-day-label{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;font-family:var(--font-m);margin-bottom:8px;padding:0 2px;}

    /* Временная шкала */
    .timeline{position:relative;padding-left:28px;margin-bottom:14px;}
    .timeline::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:1px;background:linear-gradient(to bottom,var(--red),var(--gold),transparent);}

    .tl-item{position:relative;margin-bottom:6px;}
    .tl-dot{
      position:absolute;left:-20px;top:50%;transform:translateY(-50%);
      width:8px;height:8px;border-radius:50%;
      border:1.5px solid var(--border2);
      background:var(--bg);
      transition:all .2s;
    }
    .tl-item.done .tl-dot{background:var(--green);border-color:var(--green);}

    .tl-card{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:11px;padding:11px 13px;
      display:flex;align-items:center;gap:11px;
      cursor:pointer;transition:all .18s;
    }
    .tl-card:active{transform:scale(0.99);}
    .tl-item.done .tl-card{background:var(--green-dim);border-color:rgba(46,204,113,0.2);}
    .tl-icon{font-size:18px;flex-shrink:0;}
    .tl-body{flex:1;min-width:0;}
    .tl-top{display:flex;align-items:baseline;gap:7px;}
    .tl-name{font-size:13px;font-weight:600;color:var(--text);}
    .tl-time{font-family:var(--font-m);font-size:10px;color:var(--muted2);}
    .tl-items{font-size:11px;color:var(--muted2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tl-macros{
      display:flex;gap:8px;margin-top:4px;
    }
    .tl-macro{font-family:var(--font-m);font-size:10px;}
    .tl-macro.p{color:#ff8a8a;}
    .tl-macro.f{color:var(--gold);}
    .tl-macro.c{color:#93c5fd;}
    .tl-check{
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:800;flex-shrink:0;
      border:1.5px solid var(--border2);background:var(--bg3);
      color:transparent;transition:all .18s;
    }
    .tl-item.done .tl-check{background:var(--green);border-color:var(--green);color:#000;}

    /* Добавки секция */
    .supps-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
    .supp-card{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;padding:10px 12px;
      display:flex;align-items:center;gap:8px;
      cursor:pointer;transition:all .18s;
    }
    .supp-card.done{background:var(--green-dim);border-color:rgba(46,204,113,0.2);}
    .supp-card.buy{border-color:var(--gold-border);}
    .supp-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--border2);flex-shrink:0;}
    .supp-card.done .supp-dot{background:var(--green);border-color:var(--green);}
    .supp-body{flex:1;min-width:0;}
    .supp-name{font-size:12px;font-weight:600;color:var(--text);}
    .supp-time{font-family:var(--font-m);font-size:10px;color:var(--muted2);}
    .buy-badge{font-size:9px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold2);padding:1px 6px;border-radius:99px;font-family:var(--font-m);margin-top:2px;display:inline-block;}

    /* Покупки */
    .shop-card{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:11px;padding:13px;margin-bottom:12px;}
    .shop-title{font-size:11px;font-weight:700;color:var(--gold2);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-m);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .shop-items{display:flex;flex-direction:column;gap:5px;}
    .shop-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text);}
    .shop-price{font-family:var(--font-m);font-size:11px;color:var(--gold);}
    .shop-total{border-top:1px solid var(--gold-border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:var(--gold2);}

    /* Рецепт гейнера */
    .recipe-card{background:rgba(212,43,43,0.05);border:1px solid rgba(212,43,43,0.2);border-radius:11px;padding:13px;margin-bottom:12px;}
    .recipe-title{font-size:10px;font-weight:700;color:var(--red2);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-m);margin-bottom:6px;}
    .recipe-row{display:flex;justify-content:space-between;align-items:center;}
    .recipe-text{font-size:12px;color:#ddd;line-height:1.6;}
    .recipe-kcal{font-family:var(--font-d);font-size:28px;color:var(--red2);flex-shrink:0;margin-left:12px;}

    /* TIMER */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50;}
    .timer-card{position:relative;background:#0c0c0c;border:1px solid rgba(201,168,76,0.2);border-radius:22px;padding:26px 22px 20px;text-align:center;margin:16px;width:100%;max-width:320px;}
    .timer-card::before{content:'';position:absolute;inset:0;border-radius:22px;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,43,43,0.06) 0%,transparent 70%);pointer-events:none;}
    .timer-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted2);font-size:14px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
    .timer-label{font-size:10px;color:var(--muted2);font-weight:600;letter-spacing:3px;text-transform:uppercase;font-family:var(--font-m);margin-bottom:4px;}
    .timer-time{font-family:var(--font-d);font-size:86px;letter-spacing:2px;line-height:1;color:var(--gold2);margin-bottom:4px;text-shadow:0 0 40px rgba(201,168,76,0.2);}
    .timer-time.warning{color:var(--red2);text-shadow:0 0 40px rgba(212,43,43,0.3);}
    .timer-exercise{font-size:11px;color:var(--muted2);margin-bottom:14px;max-width:210px;margin-left:auto;margin-right:auto;}
    .timer-progress{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:99px;margin:0 auto 16px;overflow:hidden;}
    .timer-progress-fill{height:100%;border-radius:99px;transition:width 1s linear;}
    .timer-progress-fill.normal{background:linear-gradient(90deg,var(--red),var(--gold));}
    .timer-progress-fill.warning{background:var(--red2);}
    .timer-adjust-row{display:flex;gap:7px;margin-bottom:10px;}
    .timer-adjust-btn{flex:1;height:39px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:700;font-family:var(--font-m);}
    .timer-save-row{min-height:30px;display:flex;justify-content:center;align-items:center;margin-bottom:10px;}
    .timer-save-btn{background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold2);padding:7px 18px;border-radius:20px;font-weight:700;font-size:12px;}
    .timer-saved-text{color:var(--green);font-size:12px;font-family:var(--font-m);}
    .timer-skip{background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);padding:9px 24px;border-radius:9px;font-weight:600;font-size:13px;width:100%;}

    /* COMPLETION */
    .completion-card{background:#0c0c0c;border:1px solid var(--gold-border);border-radius:22px;padding:34px 26px;text-align:center;margin:16px;max-width:320px;width:100%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
    @keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .completion-icon{font-size:68px;margin-bottom:12px;}
    .completion-title{font-family:var(--font-d);font-size:40px;letter-spacing:4px;background:linear-gradient(90deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
    .completion-subtitle{font-size:15px;color:var(--muted2);margin-bottom:6px;}
    .completion-saved{font-size:11px;color:var(--muted);margin-bottom:22px;font-family:var(--font-m);}
    .completion-btn{background:linear-gradient(135deg,var(--red),#a01a1a);color:#fff;padding:13px 36px;border-radius:11px;font-weight:800;font-size:15px;box-shadow:0 4px 16px rgba(212,43,43,0.25);}
  </style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100%;"></div>
<script>
const PROGRAM={
  1:{name:'СПИНА + БИЦЕПС',exercises:[
    {id:1,name:'Тяга к поясу (#8)',reps:12,pause:150,hint:'Сядь, упрись грудью в подушку. Тяни рукоять к животу, сводя лопатки. Локти вдоль корпуса.'},
    {id:2,name:'Вертикальная тяга (#7)',reps:12,pause:150,hint:'Хват широкий. Тяни к верху груди, сводя лопатки вниз. Корпус слегка отклонён назад.'},
    {id:3,name:'Подтягивания широким хватом',reps:null,pause:180,hint:'Широкий хват, ладони от себя. Тянись грудью к перекладине. Делай максимум.'},
    {id:18,name:'Face Pulls (резинка)',reps:15,pause:60,hint:'Тяни к лицу, разводя руки. Локти выше кистей! Лопатки сведены.'},
    {id:4,name:'Подтягивания узким обратным хватом',reps:10,pause:120,hint:'Узкий хват, ладони к себе. Тяни подбородок к перекладине.'},
    {id:5,name:'Сгибание рук резинка',reps:15,pause:60,hint:'Встань на резинку. Локти прижаты. Сгибай к плечам, медленно опускай.'}
  ]},
  3:{name:'НОГИ + ПРЕСС',exercises:[
    {id:6,name:'Жим ногами (#3)',reps:12,pause:180,hint:'Стопы на ширине плеч. Опускай до 90° в коленях. Жми пятками.'},
    {id:19,name:'Комбо лифт — становая (#6)',reps:10,pause:150,hint:'Спина ПРЯМАЯ! Мощно выпрямись ногами и спиной.'},
    {id:21,name:'Приседания (#5)',reps:10,pause:150,hint:'Ноги на ширине плеч. Опускайся до параллели. Спина прямая.'},
    {id:7,name:'Разгибание ноги (#1)',reps:12,pause:90,hint:'Разгибай полностью, пауза 1 сек вверху. Опускай плавно.'},
    {id:8,name:'Сгибание ноги (#2)',reps:12,pause:90,hint:'Сгибай до касания ягодиц. Не отрывай таз.'},
    {id:22,name:'Подъёмы на носки',reps:15,pause:60,hint:'Поднимайся на носки максимально высоко. Пауза вверху 1 сек.'},
    {id:9,name:'Пресс (#15)',reps:15,pause:60,hint:'Скручивайся, отрывая лопатки. Не тяни шею руками.'},
    {id:20,name:'Гиперэкстензия (#15)',reps:12,pause:60,hint:'Опускайся до 90°. Поднимайся до линии с ногами. Сжимай ягодицы.'}
  ]},
  5:{name:'ГРУДЬ + ПЛЕЧИ + ТРИЦЕПС',exercises:[
    {id:11,name:'Жим от груди (#10)',reps:12,pause:150,hint:'Жми на уровне сосков. Локти под 45°.'},
    {id:12,name:'Жим плеча сидя (#9)',reps:12,pause:150,hint:'Жми вверх, не выпрямляя локти до конца.'},
    {id:13,name:'Боковые разведения рез',reps:15,pause:60,hint:'Руки в стороны до уровня плеч. Мизинец выше большого пальца.'},
    {id:14,name:'Жим плеча рез (стоя)',reps:12,pause:60,hint:'Жми вверх. Корпус стабилен.'},
    {id:15,name:'Трицепс сидя (#14)',reps:10,pause:90,hint:'Разгибай руки полностью, сжимай трицепс.'},
    {id:16,name:'Отжимания на брусьях',reps:null,pause:150,hint:'Опускайся до 90° в локтях. Корпус наклонён вперёд.'},
    {id:17,name:'Разгибание рук рез',reps:15,pause:45,hint:'Локти прижаты. Разгибай до полного выпрямления.'}
  ]}
};

const WEEK_CONFIGS={
  1:{name:'Адаптация',sets:3,reps:'12',cssClass:'week-1-2'},
  2:{name:'Адаптация',sets:3,reps:'12',cssClass:'week-1-2'},
  3:{name:'Кумуляция объёма',sets:4,reps:'8-10',cssClass:'week-3-4'},
  4:{name:'Кумуляция объёма',sets:4,reps:'8-10',cssClass:'week-3-4'},
  5:{name:'ПИК объёма',sets:4,reps:'8-10',cssClass:'week-5-6'},
  6:{name:'ПИК объёма',sets:4,reps:'8-10',cssClass:'week-5-6'},
  7:{name:'Разгрузка',sets:3,reps:'10-12',cssClass:'week-7'}
};

// ККАЛ на порцию рассчитывается: Б*4 + Ж*9 + У*4
const MEALS=[
  {id:'preworkout', time:'5:30', name:'До тренировки',   items:'Коллаген + кофеин + вода с лимоном', protein:5,  fat:0,  carbs:2,  icon:'🍋'},
  {id:'postworkout',time:'7:00', name:'После тренировки', items:'Гейнер + креатин 5г',                protein:41, fat:13, carbs:72, icon:'🥤'},
  {id:'breakfast',  time:'7:40', name:'Завтрак',          items:'Гречка 150г + 3 яйца + 2 сосиски',  protein:34, fat:37, carbs:33, icon:'🍳'},
  {id:'snack1',     time:'10:00',name:'Перекус',           items:'Банан',                              protein:1,  fat:0,  carbs:25, icon:'🍌'},
  {id:'lunch',      time:'13:00',name:'Обед',              items:'Курица 300г + макароны 200г',        protein:55, fat:17, carbs:50, icon:'🍗'},
  {id:'snack2',     time:'16:00',name:'Перекус',           items:'Протеин + банан',                    protein:26, fat:2,  carbs:28, icon:'💪'},
  {id:'snack3',     time:'18:30',name:'Доп. приём',        items:'Макароны 150г',                      protein:5,  fat:1,  carbs:40, icon:'🍝'},
  {id:'dinner',     time:'21:00',name:'Ужин',              items:'Творог 250г + кефир 200мл',          protein:51, fat:14, carbs:16, icon:'🥛'}
];

const SUPPLEMENTS=[
  {id:'collagen', name:'Коллаген',   time:'5:30',  status:'have'},
  {id:'caffeine', name:'Кофеин',     time:'5:30',  status:'have'},
  {id:'creatine', name:'Креатин 5г', time:'7:00',  status:'have'},
  {id:'vitd',     name:'Витамин D3', time:'7:40',  status:'buy', price:350},
  {id:'omega',    name:'Омега-3',    time:'7:40',  status:'buy', price:450},
  {id:'zinc',     name:'Цинк',       time:'7:40',  status:'buy', price:300},
  {id:'protein',  name:'Протеин',    time:'16:00', status:'have'},
  {id:'magnesium',name:'Магний',     time:'22:00', status:'have'}
];

const MACRO_GOALS={protein:218,fat:84,carbs:266,kcal:2650};
const dayNames=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function mealKcal(m){return m.protein*4+m.fat*9+m.carbs*4;}
const TOTAL_KCAL=MEALS.reduce((s,m)=>s+mealKcal(m),0);

let state={
  activeTab:'training',currentWeek:1,currentDay:1,
  workoutData:{},nutritionData:{},customPauses:{},expandedHints:{},
  timer:{active:false,timeLeft:0,maxTime:0,exercise:'',exId:null,modified:false,saved:false},
  showCompletion:false
};

function loadData(){
  try{const s=localStorage.getItem('fitnessTrackerV9');if(s){const d=JSON.parse(s);state.workoutData=d.workoutData||{};state.currentWeek=d.currentWeek||1;state.nutritionData=d.nutritionData||{};state.customPauses=d.customPauses||{};}}catch(e){}
}
function saveData(){
  try{localStorage.setItem('fitnessTrackerV9',JSON.stringify({workoutData:state.workoutData,currentWeek:state.currentWeek,nutritionData:state.nutritionData,customPauses:state.customPauses}));}catch(e){}
}

function getCarryData(exId,setIdx){
  if(state.currentWeek<=1)return null;
  const prev=(state.workoutData['w'+(state.currentWeek-1)+'_ex'+exId]||{}).sets||[];
  return prev[setIdx]||null;
}
function getSetData(exId,setIdx){
  const sets=(state.workoutData['w'+state.currentWeek+'_ex'+exId]||{}).sets||[];
  return sets[setIdx]||{weight:'',reps:'',completed:false};
}

// AUDIO
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function playGong(){
  try{const c=getAC(),now=c.currentTime;
    [220,440,550,660].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.35-i*.07,now+.01);g.gain.exponentialRampToValueAtTime(.001,now+2.5);o.connect(g);g.connect(c.destination);o.start(now);o.stop(now+2.6);});}catch(e){}
}
function playBell(vol=1){
  try{const c=getAC(),now=c.currentTime;
    [1050,2100,3150,525].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();const a=[.35,.18,.10,.12][i],d=[1.4,1.0,.7,1.2][i];o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.001,now);g.gain.linearRampToValueAtTime(a*vol,now+.003);g.gain.exponentialRampToValueAtTime(.001,now+d);o.connect(g);g.connect(c.destination);o.start(now);o.stop(now+d+.05);});}catch(e){}
}
function playCountdown(){for(let i=0;i<10;i++)setTimeout(()=>playBell(.25+(i/9)*.75),i*1000);}

let timerInterval=null,lastBeepTime=null;
function startTimer(sec,ex,exId){
  state.timer={active:true,timeLeft:sec,maxTime:sec,exercise:ex,exId,modified:false,saved:false};
  lastBeepTime=null;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    state.timer.timeLeft--;
    if(state.timer.timeLeft===10&&lastBeepTime!==10){playCountdown();lastBeepTime=10;}
    if(state.timer.timeLeft<=0){playGong();stopTimer();return;}
    render();
  },1000);render();
}
function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=null;state.timer={active:false,timeLeft:0,maxTime:0,exercise:'',exId:null,modified:false,saved:false};render();}
function adjustTimer(d){const nl=state.timer.timeLeft+d,nm=state.timer.maxTime+d;if(nl>=5&&nm>=5&&nm<=600){state.timer.timeLeft=nl;state.timer.maxTime=nm;state.timer.modified=true;state.timer.saved=false;render();}}
function saveTimerPause(){if(state.timer.exId!==null){state.customPauses[state.timer.exId]=state.timer.maxTime;state.timer.modified=false;state.timer.saved=true;saveData();render();setTimeout(()=>{if(state.timer.active){state.timer.saved=false;render();}},2200);}}

function getPause(exId,def){return state.customPauses[exId]!==undefined?state.customPauses[exId]:def;}
function formatPause(s){return s>=120?(s/60)+' мин':s+'с';}
function formatTime(s){const m=Math.floor(s/60),sec=s%60;return m>0?m+':'+(sec<10?'0':'')+sec:''+sec;}
function getTodayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function getTodayNutr(){return state.nutritionData[getTodayKey()]||{meals:{},supplements:{}};}
function calcTotals(){
  const t=getTodayNutr();let p=0,f=0,c=0,k=0;
  MEALS.forEach(m=>{if(t.meals[m.id]){p+=m.protein;f+=m.fat;c+=m.carbs;k+=mealKcal(m);}});
  return{protein:p,fat:f,carbs:c,kcal:k};
}

function updateSet(exId,setIdx,field,value){
  const key='w'+state.currentWeek+'_ex'+exId;
  if(!state.workoutData[key])state.workoutData[key]={sets:[]};
  while(state.workoutData[key].sets.length<=setIdx)state.workoutData[key].sets.push({weight:'',reps:'',completed:false});
  state.workoutData[key].sets[setIdx][field]=value;saveData();
}
function toggleComplete(exId,setIdx,exIdx,dayKey,isLastSet,isLastEx){
  const ex=PROGRAM[dayKey].exercises[exIdx];
  const key='w'+state.currentWeek+'_ex'+exId;
  if(!state.workoutData[key])state.workoutData[key]={sets:[]};
  while(state.workoutData[key].sets.length<=setIdx)state.workoutData[key].sets.push({weight:'',reps:'',completed:false});
  const was=state.workoutData[key].sets[setIdx].completed;
  state.workoutData[key].sets[setIdx].completed=!was;
  if(!was){
    const carry=getCarryData(exId,setIdx);
    const curr=state.workoutData[key].sets[setIdx];
    if(carry){if(!curr.weight&&carry.weight)curr.weight=carry.weight;if(!curr.reps&&carry.reps)curr.reps=carry.reps;}
    if(isLastSet&&isLastEx){state.showCompletion=true;}
    else if(!isLastSet){
      const pause=getPause(exId,ex.pause);startTimer(pause,ex.name,exId);
      if(!state.workoutData[key].sets[setIdx+1])state.workoutData[key].sets[setIdx+1]={weight:'',reps:'',completed:false};
      const next=state.workoutData[key].sets[setIdx+1];
      if(curr.weight&&!next.weight)next.weight=curr.weight;if(curr.reps&&!next.reps)next.reps=curr.reps;
    }
  }
  saveData();render();
}

function toggleMeal(id){const k=getTodayKey();if(!state.nutritionData[k])state.nutritionData[k]={meals:{},supplements:{}};state.nutritionData[k].meals[id]=!state.nutritionData[k].meals[id];saveData();render();}
function toggleSupplement(id){const k=getTodayKey();if(!state.nutritionData[k])state.nutritionData[k]={meals:{},supplements:{}};state.nutritionData[k].supplements[id]=!state.nutritionData[k].supplements[id];saveData();render();}

function goToNextWeek(){
  if(state.currentWeek<7){
    const next=state.currentWeek+1;
    [1,3,5].forEach(day=>{const prog=PROGRAM[day];if(!prog)return;
      prog.exercises.forEach(ex=>{
        const pk='w'+state.currentWeek+'_ex'+ex.id,nk='w'+next+'_ex'+ex.id;
        if(state.workoutData[pk]&&!state.workoutData[nk])
          state.workoutData[nk]={sets:state.workoutData[pk].sets.map(s=>({weight:s.weight||'',reps:s.reps||'',completed:false}))};
      });
    });
    state.currentWeek=next;saveData();render();
  }
}
function resetAllData(){if(confirm('Сбросить ВСЕ данные?')){state.workoutData={};state.nutritionData={};state.customPauses={};state.currentWeek=1;localStorage.removeItem('fitnessTrackerV9');render();}}
function toggleHint(id){state.expandedHints['ex'+id]=!state.expandedHints['ex'+id];render();}
function setTab(t){state.activeTab=t;render();}
function setDay(d){state.currentDay=d;render();}
function setWeek(w){state.currentWeek=w;saveData();render();}
function closeCompletion(){state.showCompletion=false;render();}

function render(){
  const wc=WEEK_CONFIGS[state.currentWeek];
  const tw=PROGRAM[state.currentDay];
  const tn=getTodayNutr();
  const tot=calcTotals();
  const now=new Date();
  const clock=(now.getHours()<10?'0':'')+now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();

  let hasCarry=false;
  if(state.currentWeek>1&&tw){
    tw.exercises.forEach(ex=>{
      const pk='w'+(state.currentWeek-1)+'_ex'+ex.id,ck='w'+state.currentWeek+'_ex'+ex.id;
      if(state.workoutData[pk]&&state.workoutData[ck]){
        const c=state.workoutData[ck];
        if(c.sets&&c.sets.some(s=>s.weight||s.reps)&&!c.sets.some(s=>s.completed))hasCarry=true;
      }
    });
  }

  let html='';

  // OVERLAYS
  if(state.timer.active){
    const warn=state.timer.timeLeft<=10;
    const prog=state.timer.maxTime>0?(state.timer.timeLeft/state.timer.maxTime)*100:0;
    let sr='<div class="timer-save-row"></div>';
    if(state.timer.exId!==null){
      if(state.timer.saved)sr='<div class="timer-save-row"><span class="timer-saved-text">✓ Сохранено</span></div>';
      else if(state.timer.modified)sr='<div class="timer-save-row"><button class="timer-save-btn" onclick="saveTimerPause()">💾 Сохранить время</button></div>';
    }
    html+=`<div class="overlay"><div class="timer-card">
      <button class="timer-close" onclick="stopTimer()">✕</button>
      <div class="timer-label">отдых</div>
      <div class="timer-time ${warn?'warning':''}">${formatTime(state.timer.timeLeft)}</div>
      <div class="timer-exercise">${state.timer.exercise}</div>
      <div class="timer-progress"><div class="timer-progress-fill ${warn?'warning':'normal'}" style="width:${prog}%"></div></div>
      <div class="timer-adjust-row">
        <button class="timer-adjust-btn" onclick="adjustTimer(-15)">− 15с</button>
        <button class="timer-adjust-btn" onclick="adjustTimer(15)">+ 15с</button>
      </div>${sr}
      <button class="timer-skip" onclick="stopTimer()">Пропустить →</button>
    </div></div>`;
  }
  if(state.showCompletion){
    html+=`<div class="overlay"><div class="completion-card">
      <div class="completion-icon">🏆</div>
      <div class="completion-title">MAX TIME</div>
      <div class="completion-subtitle">Тренировка закрыта 💪</div>
      <div class="completion-saved">Прогресс сохранён</div>
      <button class="completion-btn" onclick="closeCompletion()">Готово ✓</button>
    </div></div>`;
  }

  // HEADER
  html+=`<div class="sticky-header">
    <div class="top-bar">
      <div class="brand">
        <span class="brand-max">MAX</span>
        <span class="brand-dot"></span>
        <span class="brand-time">TIME</span>
      </div>
      <span id="clock" class="clock-display">${clock}</span>
    </div>
    <div class="tabs">
      <button class="tab-btn ${state.activeTab==='training'?'active-training':'inactive'}" onclick="setTab('training')">🏋️ Тренировка</button>
      <button class="tab-btn ${state.activeTab==='nutrition'?'active-nutrition':'inactive'}" onclick="setTab('nutrition')">🍽️ Питание</button>
    </div>
  </div>`;

  html+=`<div class="scroll-content">`;

  // ══════════ NUTRITION ══════════
  if(state.activeTab==='nutrition'){
    const kcalPct=Math.min(100,tot.kcal/MACRO_GOALS.kcal*100);
    const pPct=Math.min(100,tot.protein/MACRO_GOALS.protein*100);
    const fPct=Math.min(100,tot.fat/MACRO_GOALS.fat*100);
    const cPct=Math.min(100,tot.carbs/MACRO_GOALS.carbs*100);
    const completedMeals=MEALS.filter(m=>tn.meals[m.id]).length;
    const completedSupps=SUPPLEMENTS.filter(s=>tn.supplements[s.id]).length;

    // HERO — калории + макро
    html+=`<div class="nutr-hero">
      <div class="nutr-hero-top">
        <div class="nutr-kcal-block">
          <div class="nutr-kcal-label">Калории сегодня</div>
          <div class="nutr-kcal-val">${tot.kcal}</div>
          <div class="nutr-kcal-sub">из ${MACRO_GOALS.kcal} ккал · ${completedMeals}/${MEALS.length} приёмов</div>
          <div class="nutr-kcal-bar"><div class="nutr-kcal-bar-fill" style="width:${kcalPct}%"></div></div>
        </div>
        <div class="nutr-macro-col">
          <div class="macro-pill">
            <div class="macro-pill-label">Б ${tot.protein}/${MACRO_GOALS.protein}</div>
            <div class="macro-pill-bar"><div class="macro-pill-fill p" style="width:${pPct}%"></div></div>
          </div>
          <div class="macro-pill">
            <div class="macro-pill-label">Ж ${tot.fat}/${MACRO_GOALS.fat}</div>
            <div class="macro-pill-bar"><div class="macro-pill-fill f" style="width:${fPct}%"></div></div>
          </div>
          <div class="macro-pill">
            <div class="macro-pill-label">У ${tot.carbs}/${MACRO_GOALS.carbs}</div>
            <div class="macro-pill-bar"><div class="macro-pill-fill c" style="width:${cPct}%"></div></div>
          </div>
        </div>
      </div>
    </div>`;

    // РЕЦЕПТ ГЕЙНЕРА
    html+=`<div class="recipe-card">
      <div class="recipe-title">🥤 Рецепт гейнера</div>
      <div class="recipe-row">
        <div class="recipe-text">Молоко 300мл<br>Овсянка 50г<br>Банан · Протеин 30г</div>
        <div class="recipe-kcal">~560<span style="font-size:14px;color:var(--muted2)"> ккал</span></div>
      </div>
    </div>`;

    // TIMELINE ПРИЁМЫ
    html+=`<div class="nutr-day-label">📅 Расписание дня</div>
    <div class="timeline">`;
    MEALS.forEach(m=>{
      const done=!!tn.meals[m.id];
      const kcal=mealKcal(m);
      html+=`<div class="tl-item ${done?'done':''}">
        <div class="tl-dot"></div>
        <div class="tl-card" onclick="toggleMeal('${m.id}')">
          <span class="tl-icon">${m.icon}</span>
          <div class="tl-body">
            <div class="tl-top"><span class="tl-name">${m.name}</span><span class="tl-time">${m.time}</span></div>
            <div class="tl-items">${m.items}</div>
            ${m.protein>0?`<div class="tl-macros">
              <span class="tl-macro p">Б${m.protein}</span>
              <span class="tl-macro f">Ж${m.fat}</span>
              <span class="tl-macro c">У${m.carbs}</span>
              <span class="tl-macro" style="color:var(--muted2)">${kcal}ккал</span>
            </div>`:''}
          </div>
          <div class="tl-check">✓</div>
        </div>
      </div>`;
    });
    html+=`</div>`;

    // ДОБАВКИ
    html+=`<div class="nutr-day-label">💊 Спортпит · ${completedSupps}/${SUPPLEMENTS.length}</div>
    <div class="supps-grid">`;
    SUPPLEMENTS.forEach(s=>{
      const done=!!tn.supplements[s.id];
      html+=`<div class="supp-card ${done?'done':''} ${s.status==='buy'?'buy':''}" onclick="toggleSupplement('${s.id}')">
        <div class="supp-dot"></div>
        <div class="supp-body">
          <div class="supp-name">${s.name}</div>
          <div class="supp-time">${s.time}</div>
          ${s.status==='buy'?'<span class="buy-badge">докупить</span>':''}
        </div>
      </div>`;
    });
    html+=`</div>`;

    // ПОКУПКИ
    const toBuy=SUPPLEMENTS.filter(s=>s.status==='buy');
    const total=toBuy.reduce((s,x)=>s+(x.price||0),0);
    html+=`<div class="shop-card">
      <div class="shop-title">🛒 Список покупок</div>
      <div class="shop-items">
        ${toBuy.map(s=>`<div class="shop-item"><span>${s.name}</span><span class="shop-price">~${s.price}₽/мес</span></div>`).join('')}
      </div>
      <div class="shop-total"><span>Итого</span><span>~${total}₽/мес</span></div>
    </div>`;

  // ══════════ TRAINING ══════════
  } else {
    // HEADER CARD
    html+=`<div class="header-card ${wc.cssClass}">
      <div class="header-glow"></div>
      <div class="header-top">
        <div>
          <div class="workout-title">${tw?tw.name:'ОТДЫХ'}</div>
          <div class="header-sub">Неделя ${state.currentWeek}/7 · ${wc.name}</div>
          <div class="header-info">${wc.sets} подходов × ${wc.reps} повт.</div>
        </div>
        <div class="week-badge">
          <div class="week-num">${dayNames[state.currentDay]}</div>
          <div class="week-label">ДЕНЬ</div>
        </div>
      </div>
      <div class="day-buttons">
        ${[1,3,5].map(d=>`<button class="day-btn ${state.currentDay===d?'active':'inactive'}" onclick="setDay(${d})">${dayNames[d]}</button>`).join('')}
      </div>
    </div>`;

    if(!tw){
      html+=`<div class="rest-day"><div class="rest-icon">😴</div><div class="rest-title">ДЕНЬ ОТДЫХА</div><div class="rest-subtitle">Восстанавливайся, ешь по плану 💪</div></div>`;
    } else {
      if(hasCarry){
        html+=`<div class="carry-legend"><span style="font-size:16px">◆</span><span>Золотые поля — данные прошлой недели. Ориентируйся и бей рекорд!</span></div>`;
      }

      tw.exercises.forEach((ex,exIdx)=>{
        const key='w'+state.currentWeek+'_ex'+ex.id;
        const sets=(state.workoutData[key]||{}).sets||[];
        const completed=sets.filter(s=>s.completed).length;
        const isLastEx=exIdx===tw.exercises.length-1;
        const showHint=state.expandedHints['ex'+ex.id];
        const pause=getPause(ex.id,ex.pause);
        const isCustom=state.customPauses[ex.id]!==undefined;
        const allDone=completed===wc.sets;

        html+=`<div class="exercise-card ${allDone?'all-done':''}">
          <div class="exercise-header">
            <div>
              <div class="exercise-name">${ex.name}</div>
              <div class="exercise-meta">
                <span class="meta-tag">${wc.sets}×${ex.reps||'max'}</span>
                <span class="meta-tag ${pause>=120?'gold':'red'}">${formatPause(pause)}</span>
                ${isCustom?'<span class="meta-tag dim">✎ моё время</span>':''}
              </div>
            </div>
            <div class="exercise-badges">
              ${allDone?'<span class="badge-done">✓ DONE</span>':''}
              ${ex.hint?`<button class="hint-btn" onclick="toggleHint(${ex.id})">${showHint?'▲':'?'}</button>`:''}
            </div>
          </div>
          ${showHint&&ex.hint?`<div class="hint-box"><div class="hint-title">Техника</div>${ex.hint}</div>`:''}
          ${Array(wc.sets).fill(0).map((_,si)=>{
            const sd=sets[si]||{weight:'',reps:'',completed:false};
            const carry=getCarryData(ex.id,si);
            const showCW=!!(carry&&carry.weight&&!sd.completed&&!sd.weight);
            const showCR=!!(carry&&carry.reps&&!sd.completed&&!sd.reps);
            const showCA=showCW||showCR;
            const dw=sd.weight||(showCW?carry.weight:'');
            const dr=sd.reps||(showCR?carry.reps:'');
            const rc=sd.completed?'complete':(showCA?'carry-over':'incomplete');
            const isLastSet=si===wc.sets-1;
            return `<div class="set-row ${rc}">
              <span class="set-num">S${si+1}</span>
              ${showCA?'<span class="carry-dot"></span>':''}
              <div class="set-inputs">
                <input type="text" inputmode="decimal" placeholder="кг" value="${dw}"
                  class="set-input ${showCW?'carry':''}" onchange="updateSet(${ex.id},${si},'weight',this.value)">
                <input type="text" inputmode="numeric" placeholder="${ex.reps?'повт':'max'}" value="${dr}"
                  class="set-input small ${showCR?'carry':''}" onchange="updateSet(${ex.id},${si},'reps',this.value)">
              </div>
              <button class="check-btn ${sd.completed?'complete':'incomplete'}"
                onclick="toggleComplete(${ex.id},${si},${exIdx},${state.currentDay},${isLastSet},${isLastEx})">✓</button>
            </div>`;
          }).join('')}
        </div>`;
      });
    }

    html+=`<div class="week-nav">
      <button class="week-btn" onclick="setWeek(${state.currentWeek-1})" ${state.currentWeek===1?'disabled':''}>◀ W${state.currentWeek-1}</button>
      <div class="week-current">НЕДЕЛЯ ${state.currentWeek} / 7</div>
      <button class="week-btn" onclick="setWeek(${state.currentWeek+1})" ${state.currentWeek===7?'disabled':''}>W${state.currentWeek+1} ▶</button>
    </div>`;
    if(state.currentWeek<7){
      html+=`<button class="next-week-btn" onclick="goToNextWeek()">✓ Закрыть неделю → Неделя ${state.currentWeek+1}</button>`;
    } else {
      html+=`<div class="final-week">🏆 ФИНАЛЬНАЯ НЕДЕЛЯ · РАЗГРУЗКА</div>`;
    }
  }

  html+=`<button class="reset-btn" onclick="resetAllData()">🗑 Сбросить все данные</button>`;
  html+=`</div>`; // scroll-content

  document.getElementById('app').innerHTML=html;
}

loadData();render();
setInterval(()=>{const el=document.getElementById('clock');if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}},1000);
</script>
</body>
</html>
