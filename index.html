<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1C1C1C">
  <title>MAX TIME — INDUSTRIAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== INDUSTRIAL BRUTALISM ========== */
    :root {
      --bg:      #1C1C1C;
      --bg2:     #2F4F4F;      /* металлический оттенок */
      --bg3:     #232323;
      --border:  #FF5722;       /* оранжевый акцент */
      --text:    #EEEEEE;
      --muted:   #888888;
      --accent:  #FF5722;
      --accent-dark: #C41C00;
      --green:   #2E7D32;
      --green-dim: #1B5E20;
      --gold:    #B8860B;
      --font-head: 'Bebas Neue', cursive;
      --font-body: 'Oswald', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    input, button {
      font-family: var(--font-body);
      font-size: 16px;
      border: none;
      background: none;
      color: inherit;
    }

    input:focus {
      outline: 2px solid var(--accent);
    }

    button {
      cursor: pointer;
      transition: all 0.1s ease;
    }

    button:active {
      transform: scale(0.96);
    }

    /* ---------- Стилизация scroll ---------- */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 16px 40px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-content::-webkit-scrollbar {
      display: none;
    }

    /* ---------- Шапка с часами и табами ---------- */
    .sticky-header {
      flex-shrink: 0;
      padding: 14px 14px 8px;
      background: var(--bg);
      border-bottom: 2px solid var(--accent);
      position: relative;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 5px;
      font-family: var(--font-head);
      font-size: 32px;
      line-height: 1;
    }
    .brand-max {
      color: var(--text);
    }
    .brand-time {
      color: var(--accent);
      text-shadow: 2px 2px 0 #000;
    }
    .brand-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      transform: rotate(45deg);
      margin: 0 4px 4px 4px;
    }

    .clock-display {
      font-family: var(--font-body);
      font-size: 18px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* ---------- Табы ---------- */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--bg3);
      padding: 3px;
      border: 1px solid var(--accent);
    }
    .tab-btn {
      padding: 10px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active-training,
    .tab-btn.active-nutrition {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-dark);
      box-shadow: inset 0 -2px 0 var(--accent-dark);
    }

    /* ---------- Карточки с металлическим градиентом ---------- */
    .header-card, .exercise-card, .nutr-hero, .recipe-card, .shop-card,
    .product-form, .product-suggestions, .meal-creator, .section-card {
      background: linear-gradient(135deg, var(--bg2), var(--bg));
      border: 2px solid var(--accent);
      box-shadow: 0 4px 0 #0a0a0a;
      padding: 16px;
      margin-bottom: 16px;
      position: relative;
    }

    /* Имитация заклёпок */
    .header-card::before, .exercise-card::before, .nutr-hero::before,
    .recipe-card::before, .shop-card::before, .product-form::before,
    .meal-creator::before {
      content: "• • •";
      position: absolute;
      top: -10px;
      left: 10px;
      color: var(--accent);
      font-size: 16px;
      letter-spacing: 4px;
      background: var(--bg);
      padding: 0 6px;
    }

    /* ---------- Заголовки ---------- */
    h1, h2, h3, .workout-title, .section-title, .macro-label, .nutr-kcal-label,
    .recipe-title, .shop-title, .product-title {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    .workout-title {
      font-size: 36px;
      border-bottom: none;
    }

    /* ---------- Тренировка ---------- */
    .exercise-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .exercise-name {
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
    }

    .exercise-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .meta-tag {
      font-size: 12px;
      padding: 2px 8px;
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--text);
    }

    .badge-done {
      background: var(--green);
      color: #000;
      font-weight: 700;
      padding: 4px 12px;
      border: 1px solid #000;
    }

    .hint-btn {
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--accent);
      width: 30px;
      height: 30px;
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .hint-box {
      background: #2A2A2A;
      border-left: 4px solid var(--accent);
      padding: 10px;
      margin: 10px 0;
      font-size: 14px;
      color: #CCC;
    }

    /* Сет-строка */
    .set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      margin-bottom: 6px;
      background: var(--bg3);
      border: 1px solid var(--accent);
    }
    .set-row.complete {
      background: var(--green-dim);
      border-color: var(--green);
    }
    .set-row.carry-over {
      border-color: var(--gold);
    }

    .set-num {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--muted);
      min-width: 32px;
    }

    .set-inputs {
      display: flex;
      gap: 6px;
      flex: 1;
    }

    .set-input {
      width: 70px;
      padding: 6px;
      background: #000;
      border: 1px solid var(--accent);
      color: var(--text);
      font-size: 14px;
    }
    .set-input.small {
      width: 55px;
    }
    .set-input.carry {
      border-color: var(--gold);
      background: #332700;
    }

    .check-btn {
      width: 40px;
      height: 40px;
      background: #2A2A2A;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-weight: 900;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check-btn.complete {
      background: var(--green);
      color: #000;
      border-color: #000;
    }

    /* Навигация по неделям */
    .week-nav {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }
    .week-btn {
      background: var(--bg3);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 8px 16px;
      font-weight: 600;
    }
    .week-btn:disabled {
      opacity: 0.4;
      border-color: var(--muted);
    }
    .week-current {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: 2px solid var(--accent-dark);
      padding: 8px;
      text-align: center;
      font-weight: 700;
    }
    .next-week-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: 2px solid var(--accent-dark);
      padding: 14px;
      font-weight: 800;
      font-size: 16px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .final-week {
      background: var(--gold);
      color: #000;
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 24px;
      border: 2px solid #000;
      margin-bottom: 16px;
    }

    .rest-day {
      text-align: center;
      padding: 40px;
    }
    .rest-icon {
      font-size: 60px;
    }
    .rest-title {
      font-family: var(--font-head);
      font-size: 36px;
      color: var(--accent);
    }

    .reset-btn {
      width: 100%;
      background: transparent;
      border: 2px solid var(--muted);
      color: var(--muted);
      padding: 10px;
      font-size: 14px;
      margin-top: 16px;
    }

    /* ========== НОВАЯ ВКЛАДКА ПИТАНИЯ ========== */
    /* Hero‑блок с калориями */
    .nutr-hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 16px;
    }
    .nutr-kcal-block {
      flex: 1;
    }
    .nutr-kcal-label {
      font-size: 16px;
      border-bottom: none;
      margin-bottom: 0;
    }
    .nutr-kcal-val {
      font-family: var(--font-head);
      font-size: 64px;
      line-height: 1;
      color: var(--accent);
    }
    .nutr-kcal-sub {
      font-size: 12px;
      color: var(--muted);
    }
    .nutr-kcal-bar {
      height: 6px;
      background: #333;
      margin-top: 8px;
      width: 180px;
      border: 1px solid var(--accent);
    }
    .nutr-kcal-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }
    .nutr-macro-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .macro-pill {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .macro-pill-label {
      font-size: 12px;
      color: var(--muted);
      min-width: 70px;
    }
    .macro-pill-bar {
      width: 80px;
      height: 6px;
      background: #333;
      border: 1px solid var(--accent);
    }
    .macro-pill-fill {
      height: 100%;
      transition: width 0.3s;
    }
    .macro-pill-fill.p { background: var(--accent); }
    .macro-pill-fill.f { background: var(--gold); }
    .macro-pill-fill.c { background: #42A5F5; }

    /* Форма добавления продукта в базу */
    .product-form {
      margin-bottom: 16px;
    }
    .product-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 6px;
      background: #000;
      border: 1px solid var(--accent);
      color: var(--text);
    }
    .product-form .btn {
      background: var(--accent);
      color: #000;
      border: 2px solid var(--accent-dark);
      padding: 8px 16px;
      font-weight: 700;
      text-transform: uppercase;
      margin-right: 8px;
      cursor: pointer;
    }

    /* Поиск продукта + подсказки */
    .search-section {
      margin-bottom: 16px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: #000;
      border: 2px solid var(--accent);
    }
    .search-box input {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text);
    }
    .search-box button {
      padding: 12px 16px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      border-left: 2px solid var(--accent-dark);
    }
    .suggestions {
      background: #2A2A2A;
      border: 2px solid var(--accent);
      border-top: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .suggestion-item {
      padding: 10px;
      border-bottom: 1px solid #444;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .suggestion-item:hover {
      background: var(--accent);
      color: #000;
    }
    .suggestion-item .small {
      font-size: 11px;
      color: var(--muted);
    }

    /* Выбранный продукт для добавления в приём */
    .selected-product {
      display: flex;
      gap: 8px;
      align-items: center;
      background: #2A2A2A;
      border: 1px solid var(--accent);
      padding: 10px;
      margin-top: 8px;
    }
    .selected-product input {
      width: 70px;
      padding: 6px;
      background: #000;
      border: 1px solid var(--accent);
      color: var(--text);
    }
    .selected-product .btn-add {
      background: var(--green);
      color: #000;
      border: 2px solid #000;
      padding: 6px 16px;
      font-weight: 700;
    }

    /* Таймлайн приёмов */
    .nutr-day-label {
      font-family: var(--font-head);
      font-size: 24px;
      color: var(--accent);
      margin: 16px 0 8px;
    }
    .timeline {
      position: relative;
      padding-left: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--accent);
    }
    .tl-item {
      position: relative;
      margin-bottom: 8px;
    }
    .tl-dot {
      position: absolute;
      left: -20px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background: var(--bg);
      border: 2px solid var(--accent);
    }
    .tl-item.done .tl-dot {
      background: var(--green);
      border-color: var(--green);
    }
    .tl-card {
      background: #2A2A2A;
      border: 2px solid var(--accent);
      padding: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tl-icon {
      font-size: 22px;
    }
    .tl-body {
      flex: 1;
    }
    .tl-top {
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .tl-name {
      font-weight: 700;
      font-size: 16px;
    }
    .tl-time {
      font-size: 11px;
      color: var(--muted);
    }
    .tl-items {
      font-size: 12px;
      color: var(--muted);
    }
    .tl-macros {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      font-size: 11px;
    }
    .tl-check {
      width: 28px;
      height: 28px;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--accent);
      background: #000;
    }
    .tl-item.done .tl-check {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }

    /* Сетка добавок */
    .supps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
    }
    .supp-card {
      background: #2A2A2A;
      border: 2px solid var(--accent);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .supp-card.done {
      background: var(--green-dim);
    }
    .supp-dot {
      width: 10px;
      height: 10px;
      border: 2px solid var(--accent);
      background: transparent;
    }
    .supp-card.done .supp-dot {
      background: var(--green);
      border-color: var(--green);
    }
    .supp-name {
      font-weight: 600;
    }
    .supp-time {
      font-size: 10px;
      color: var(--muted);
    }
    .buy-badge {
      background: var(--gold);
      color: #000;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 700;
    }

    /* Карточка покупок */
    .shop-card {
      margin-top: 16px;
    }
    .shop-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 10px 0;
    }
    .shop-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
    .shop-price {
      color: var(--gold);
    }
    .shop-total {
      border-top: 2px solid var(--accent);
      padding-top: 8px;
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 16px;
    }

    /* Рецепт гейнера */
    .recipe-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .recipe-text {
      font-size: 14px;
      color: #CCC;
    }
    .recipe-kcal {
      font-family: var(--font-head);
      font-size: 36px;
      color: var(--accent);
    }

    /* ---------- Таймер ---------- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .timer-card {
      background: var(--bg3);
      border: 4px solid var(--accent);
      padding: 28px 24px;
      text-align: center;
      min-width: 280px;
      box-shadow: 8px 8px 0 #000;
    }
    .timer-close {
      float: right;
      font-size: 20px;
      color: var(--accent);
      cursor: pointer;
    }
    .timer-label {
      font-family: var(--font-head);
      font-size: 24px;
      color: var(--accent);
      text-transform: uppercase;
    }
    .timer-time {
      font-family: var(--font-head);
      font-size: 86px;
      color: var(--accent);
      line-height: 1;
      margin: 10px 0;
    }
    .timer-exercise {
      font-size: 14px;
      color: var(--muted);
    }
    .timer-progress {
      height: 6px;
      background: #333;
      margin: 16px 0;
      border: 1px solid var(--accent);
    }
    .timer-progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 1s linear;
    }
    .timer-adjust-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 16px 0;
    }
    .timer-adjust-btn {
      background: #000;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      font-weight: 700;
    }
    .timer-save-btn {
      background: var(--accent);
      color: #000;
      border: 2px solid #000;
      padding: 8px 16px;
      font-weight: 700;
      margin: 8px 0;
    }
    .timer-skip {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 10px 24px;
      width: 100%;
      font-weight: 700;
    }

    /* Завершение тренировки */
    .completion-card {
      background: var(--bg3);
      border: 4px solid var(--accent);
      padding: 40px 32px;
      text-align: center;
      box-shadow: 8px 8px 0 #000;
    }
    .completion-icon {
      font-size: 80px;
    }
    .completion-title {
      font-family: var(--font-head);
      font-size: 48px;
      color: var(--accent);
    }
    .completion-btn {
      background: var(--accent);
      color: #000;
      border: 2px solid #000;
      padding: 12px 32px;
      font-weight: 700;
      font-size: 18px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
<div id="app" style="display: flex; flex-direction: column; height: 100%;"></div>
<script>
  (function() {
    // ==================== ПРОГРАММА ТРЕНИРОВОК (без изменений) ====================
    const PROGRAM = {
      1: {
        name: 'СПИНА + БИЦЕПС',
        exercises: [
          { id: 1, name: 'Тяга к поясу (#8)', reps: 12, pause: 150, hint: 'Сядь, упрись грудью в подушку. Тяни рукоять к животу, сводя лопатки. Локти вдоль корпуса.' },
          { id: 2, name: 'Вертикальная тяга (#7)', reps: 12, pause: 150, hint: 'Хват широкий. Тяни к верху груди, сводя лопатки вниз. Корпус слегка отклонён назад.' },
          { id: 3, name: 'Подтягивания широким хватом', reps: null, pause: 180, hint: 'Широкий хват, ладони от себя. Тянись грудью к перекладине. Делай максимум.' },
          { id: 18, name: 'Face Pulls (резинка)', reps: 15, pause: 60, hint: 'Тяни к лицу, разводя руки. Локти выше кистей! Лопатки сведены.' },
          { id: 4, name: 'Подтягивания узким обратным хватом', reps: 10, pause: 120, hint: 'Узкий хват, ладони к себе. Тяни подбородок к перекладине.' },
          { id: 5, name: 'Сгибание рук резинка', reps: 15, pause: 60, hint: 'Встань на резинку. Локти прижаты. Сгибай к плечам, медленно опускай.' }
        ]
      },

    // ==================== АУДИО (как в оригинале) ====================
    let audioCtx = null;
    function getAC() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playGong() {
      try {
        const c = getAC(), now = c.currentTime;
        [220, 440, 550, 660].forEach((f, i) => {
          const o = c.createOscillator(), g = c.createGain();
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(0, now);
          g.gain.linearRampToValueAtTime(.35 - i * .07, now + .01);
          g.gain.exponentialRampToValueAtTime(.001, now + 2.5);
          o.connect(g);
          g.connect(c.destination);
          o.start(now);
          o.stop(now + 2.6);
        });
      } catch (e) {}
    }
    function playBell(vol = 1) {
      try {
        const c = getAC(), now = c.currentTime;
        [1050, 2100, 3150, 525].forEach((f, i) => {
          const o = c.createOscillator(), g = c.createGain();
          const a = [.35, .18, .10, .12][i], d = [1.4, 1.0, .7, 1.2][i];
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(.001, now);
          g.gain.linearRampToValueAtTime(a * vol, now + .003);
          g.gain.exponentialRampToValueAtTime(.001, now + d);
          o.connect(g);
          g.connect(c.destination);
          o.start(now);
          o.stop(now + d + .05);
        });
      } catch (e) {}
    }
    function playCountdown() {
      for (let i = 0; i < 10; i++) setTimeout(() => playBell(.25 + (i / 9) * .75), i * 1000);
    }

    // ==================== ТАЙМЕР ====================
    let timerInterval = null, lastBeepTime = null;
    function startTimer(sec, ex, exId) {
      state.timer = { active: true, timeLeft: sec, maxTime: sec, exercise: ex, exId, modified: false, saved: false };
      lastBeepTime = null;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        state.timer.timeLeft--;
        if (state.timer.timeLeft === 10 && lastBeepTime !== 10) { playCountdown(); lastBeepTime = 10; }
        if (state.timer.timeLeft <= 0) { playGong(); stopTimer(); return; }
        render();
      }, 1000);
      render();
    }
    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      state.timer = { active: false, timeLeft: 0, maxTime: 0, exercise: '', exId: null, modified: false, saved: false };
      render();
    }
    function adjustTimer(d) {
      const nl = state.timer.timeLeft + d, nm = state.timer.maxTime + d;
      if (nl >= 5 && nm >= 5 && nm <= 600) {
        state.timer.timeLeft = nl;
        state.timer.maxTime = nm;
        state.timer.modified = true;
        state.timer.saved = false;
        render();
      }
    }
    function saveTimerPause() {
      if (state.timer.exId !== null) {
        state.customPauses[state.timer.exId] = state.timer.maxTime;
        state.timer.modified = false;
        state.timer.saved = true;
        saveData();
        render();
        setTimeout(() => { if (state.timer.active) { state.timer.saved = false; render(); } }, 2200);
      }
    }

    function getPause(exId, def) { return state.customPauses[exId] !== undefined ? state.customPauses[exId] : def; }
    function formatPause(s) { return s >= 120 ? (s/60) + ' мин' : s + 'с'; }
    function formatTime(s) { const m = Math.floor(s / 60), sec = s % 60; return m > 0 ? m + ':' + (sec < 10 ? '0' : '') + sec : '' + sec; }
    function getTodayKey() { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate(); }

    // ==================== РАБОТА С ПИТАНИЕМ ====================
    function getTodayNutrition() {
      const key = getTodayKey();
      if (!state.nutritionData[key]) {
        state.nutritionData[key] = { consumed: [], supplements: {} };
      }
      return state.nutritionData[key];
    }

    function calculateTotals() {
      const today = getTodayNutrition();
      let p = 0, f = 0, c = 0, kcal = 0;
      today.consumed.forEach(item => {
        if (item.completed) { // учитываем только отмеченные съеденными? Лучше учитывать все добавленные, но отметка визуальная. Для суммы будем считать все.
          p += item.protein;
          f += item.fat;
          c += item.carbs;
          kcal += item.kcal;
        } else {
          // Можно считать и неотмеченные, но тогда отметка теряет смысл. Будем считать только отмеченные.
        }
      });
      return { protein: p, fat: f, carbs: c, kcal: kcal };
    }

    // Добавление потреблённого продукта в текущий день
    function addConsumedProduct(product, weight) {
      const factor = weight / 100;
      const consumed = {
        id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
        name: product.name,
        weight: weight,
        protein: Math.round(product.protein * factor * 10) / 10,
        fat: Math.round(product.fat * factor * 10) / 10,
        carbs: Math.round(product.carbs * factor * 10) / 10,
        kcal: Math.round(product.kcal * factor),
        completed: false,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      };
      const today = getTodayNutrition();
      today.consumed.push(consumed);
      saveData();
      render();
    }

    function toggleConsumed(id) {

        item.completed = !item.completed;

        render();
      }

    // Удаление продукта из дневника
    function removeConsumed(id) {

    // ==================== ПОИСК ПРОДУКТОВ (локальный + API) ====================
    let searchTimeout = null;
    function searchProducts(query) {
      if (!query.trim()) {
        state.suggestions = [];
        render();
        return;
      }
      // Локальный поиск
      const local = userProducts.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).map(p => ({
        ...p,
        source: 'local'
      }));
      state.suggestions = local.slice(0, 5); // сначала покажем локальные

      // Поиск в интернете (если есть сеть)
      if (navigator.onLine) {
        fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=5`)
          .then(res => res.json())
          .then(data => {
            const products = data.products || [];
            const online = products.map(p => ({
              id: 'off_' + p.code,
              name: p.product_name || 'Без названия',
              kcal: p.nutriments['energy-kcal_100g'] || 0,
              protein: p.nutriments.proteins_100g || 0,
              fat: p.nutriments.fat_100g || 0,
              carbs: p.nutriments.carbohydrates_100g || 0,
              source: 'online'
            })).filter(p => p.kcal > 0); // только с калориями
            // Объединяем с локальными, убираем дубликаты по имени (грубо)
            const combined = [...local, ...online];
            // Уникальные по названию (можно улучшить)
            const unique = combined.filter((v, i, a) => a.findIndex(t => t.name === v.name) === i);
            state.suggestions = unique.slice(0, 7);
            render();
          })
          .catch(() => {
            // Ошибка сети – ничего не делаем, остаются локальные
          });
      }
    }

    // Debounce для поиска

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ДЛЯ ТРЕНИРОВОК ====================
    function getCarryData(exId, setIdx) {
      if (state.currentWeek <= 1) return null;
      const prev = (state.workoutData['w' + (state.currentWeek - 1) + '_ex' + exId] || {}).sets || [];
      return prev[setIdx] || null;
    }

    function updateSet(exId, setIdx, field, value) {
      const key = 'w' + state.currentWeek + '_ex' + exId;
      if (!state.workoutData[key]) state.workoutData[key] = { sets: [] };
      while (state.workoutData[key].sets.length <= setIdx) state.workoutData[key].sets.push({ weight: '', reps: '', completed: false });
      state.workoutData[key].sets[setIdx][field] = value;
      saveData();
    }

    function toggleComplete(exId, setIdx, exIdx, dayKey, isLastSet, isLastEx) {
      const ex = PROGRAM[dayKey].exercises[exIdx];
      const key = 'w' + state.currentWeek + '_ex' + exId;
      if (!state.workoutData[key]) state.workoutData[key] = { sets: [] };
      while (state.workoutData[key].sets.length <= setIdx) state.workoutData[key].sets.push({ weight: '', reps: '', completed: false });
      const was = state.workoutData[key].sets[setIdx].completed;
      state.workoutData[key].sets[setIdx].completed = !was;
      if (!was) {
        const carry = getCarryData(exId, setIdx);
        const curr = state.workoutData[key].sets[setIdx];
        if (carry) {
          if (!curr.weight && carry.weight) curr.weight = carry.weight;
          if (!curr.reps && carry.reps) curr.reps = carry.reps;
        }
        if (isLastSet && isLastEx) {
          state.showCompletion = true;
        } else if (!isLastSet) {
          const pause = getPause(exId, ex.pause);
          startTimer(pause, ex.name, exId);
          if (!state.workoutData[key].sets[setIdx + 1]) state.workoutData[key].sets[setIdx + 1] = { weight: '', reps: '', completed: false };
          const next = state.workoutData[key].sets[setIdx + 1];
          if (curr.weight && !next.weight) next.weight = curr.weight;
          if (curr.reps && !next.reps) next.reps = curr.reps;
        }
      }
      saveData();
      render();
    }

    function goToNextWeek() {
      if (state.currentWeek < 7) {
        const next = state.currentWeek + 1;
        [1, 3, 5].forEach(day => {
          const prog = PROGRAM[day];
          if (!prog) return;
          prog.exercises.forEach(ex => {
            const pk = 'w' + state.currentWeek + '_ex' + ex.id, nk = 'w' + next + '_ex' + ex.id;
            if (state.workoutData[pk] && !state.workoutData[nk])
              state.workoutData[nk] = { sets: state.workoutData[pk].sets.map(s => ({ weight: s.weight || '', reps: s.reps || '', completed: false })) };
          });
        });
        state.currentWeek = next;
        saveData();
        render();
      }
    }

    // ==================== RENDER ====================
    function render() {
      const wc = WEEK_CONFIGS[state.currentWeek];
      const tw = PROGRAM[state.currentDay];
      const todayNutr = getTodayNutrition();
      const totals = calculateTotals();
      const now = new Date();
      const clock = (now.getHours() < 10 ? '0' : '') + now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();

      let hasCarry = false;
      if (state.currentWeek > 1 && tw) {
        tw.exercises.forEach(ex => {
          const pk = 'w' + (state.currentWeek - 1) + '_ex' + ex.id, ck = 'w' + state.currentWeek + '_ex' + ex.id;
          if (state.workoutData[pk] && state.workoutData[ck]) {
            const c = state.workoutData[ck];
            if (c.sets && c.sets.some(s => s.weight || s.reps) && !c.sets.some(s => s.completed)) hasCarry = true;
          }
        });
      }

      let html = '';

      // Оверлеи (таймер, завершение)
      if (state.timer.active) {
        const warn = state.timer.timeLeft <= 10;
        const prog = state.timer.maxTime > 0 ? (state.timer.timeLeft / state.timer.maxTime) * 100 : 0;
        let sr = '<div class="timer-save-row"></div>';
        if (state.timer.exId !== null) {
          if (state.timer.saved) sr = '<div class="timer-save-row"><span class="timer-saved-text">✓ Сохранено</span></div>';
          else if (state.timer.modified) sr = '<div class="timer-save-row"><button class="timer-save-btn" onclick="saveTimerPause()">💾 Сохранить время</button></div>';
        }
        html += `<div class="overlay"><div class="timer-card">
          <button class="timer-close" onclick="stopTimer()">✕</button>
          <div class="timer-label">отдых</div>
          <div class="timer-time ${warn ? 'warning' : ''}">${formatTime(state.timer.timeLeft)}</div>
          <div class="timer-exercise">${state.timer.exercise}</div>
          <div class="timer-progress"><div class="timer-progress-fill ${warn ? 'warning' : 'normal'}" style="width:${prog}%"></div></div>
          <div class="timer-adjust-row">
            <button class="timer-adjust-btn" onclick="adjustTimer(-15)">− 15с</button>
            <button class="timer-adjust-btn" onclick="adjustTimer(15)">+ 15с</button>
          </div>${sr}
          <button class="timer-skip" onclick="stopTimer()">Пропустить →</button>
        </div></div>`;
      }
      if (state.showCompletion) {
        html += `<div class="overlay"><div class="completion-card">
          <div class="completion-icon">🏆</div>
          <div class="completion-title">MAX TIME</div>
          <div class="completion-subtitle">Тренировка закрыта 💪</div>
          <div class="completion-saved">Прогресс сохранён</div>
          <button class="completion-btn" onclick="closeCompletion()">Готово ✓</button>
        </div></div>`;
      }

      // Шапка
      html += `<div class="sticky-header">
        <div class="top-bar">
          <div class="brand">
            <span class="brand-max">MAX</span>
            <span class="brand-dot"></span>
            <span class="brand-time">TIME</span>
          </div>
          <span id="clock" class="clock-display">${clock}</span>
        </div>
        <div class="tabs">
          <button class="tab-btn ${state.activeTab === 'training' ? 'active-training' : 'inactive'}" onclick="setTab('training')">🏋️ Тренировка</button>
          <button class="tab-btn ${state.activeTab === 'nutrition' ? 'active-nutrition' : 'inactive'}" onclick="setTab('nutrition')">🍽️ Питание</button>
        </div>
      </div>`;

      html += `<div class="scroll-content">`;

      // ========== ВКЛАДКА ПИТАНИЕ (новая) ==========
      if (state.activeTab === 'nutrition') {
        const kcalPct = Math.min(100, totals.kcal / MACRO_GOALS.kcal * 100);
        const pPct = Math.min(100, totals.protein / MACRO_GOALS.protein * 100);
        const fPct = Math.min(100, totals.fat / MACRO_GOALS.fat * 100);
        const cPct = Math.min(100, totals.carbs / MACRO_GOALS.carbs * 100);

        // Hero-блок
        html += `<div class="nutr-hero">
          <div class="nutr-hero-top">
            <div class="nutr-kcal-block">
              <div class="nutr-kcal-label">Калории сегодня</div>
              <div class="nutr-kcal-val">${totals.kcal}</div>
              <div class="nutr-kcal-sub">из ${MACRO_GOALS.kcal} ккал</div>
              <div class="nutr-kcal-bar"><div class="nutr-kcal-bar-fill" style="width:${kcalPct}%"></div></div>
            </div>
            <div class="nutr-macro-col">
              <div class="macro-pill">
                <div class="macro-pill-label">Б ${totals.protein}/${MACRO_GOALS.protein}</div>
                <div class="macro-pill-bar"><div class="macro-pill-fill p" style="width:${pPct}%"></div></div>
              </div>
              <div class="macro-pill">
                <div class="macro-pill-label">Ж ${totals.fat}/${MACRO_GOALS.fat}</div>
                <div class="macro-pill-bar"><div class="macro-pill-fill f" style="width:${fPct}%"></div></div>
              </div>
              <div class="macro-pill">
                <div class="macro-pill-label">У ${totals.carbs}/${MACRO_GOALS.carbs}</div>
                <div class="macro-pill-bar"><div class="macro-pill-fill c" style="width:${cPct}%"></div></div>
              </div>
            </div>
          </div>
        </div>`;

        // Рецепт гейнера (оставим)
        html += `<div class="recipe-card">
          <div class="recipe-title">🥤 Рецепт гейнера</div>
          <div class="recipe-row">
            <div class="recipe-text">Молоко 300мл<br>Овсянка 50г<br>Банан · Протеин 30г</div>
            <div class="recipe-kcal">~560<span style="font-size:14px;color:var(--muted2)"> ккал</span></div>
          </div>
        </div>`;

        // Кнопка показать/скрыть форму добавления продукта
        html += `<button class="btn" onclick="state.showAddProductForm = !state.showAddProductForm; render()" style="background:var(--accent); color:#000; border:2px solid #000; padding:8px 16px; margin-bottom:8px;">➕ Добавить продукт</button>`;

        if (state.showAddProductForm) {
          html += `<div class="product-form">
            <input type="text" placeholder="Название" value="${state.newProduct.name}" onchange="state.newProduct.name = this.value">
            <input type="number" placeholder="Калорий на 100г" value="${state.newProduct.kcal}" onchange="state.newProduct.kcal = this.value">
            <input type="number" placeholder="Белки" value="${state.newProduct.protein}" onchange="state.newProduct.protein = this.value">
            <input type="number" placeholder="Жиры" value="${state.newProduct.fat}" onchange="state.newProduct.fat = this.value">
            <input type="number" placeholder="Углеводы" value="${state.newProduct.carbs}" onchange="state.newProduct.carbs = this.value">
            <button class="btn" onclick="addUserProduct()">Сохранить</button>
            <button class="btn" onclick="state.showAddProductForm = false; render()">Отмена</button>
          </div>`;
        }

        // Поиск продуктов
        html += `<div class="search-section">
          <div class="search-box">
            <input type="text" placeholder="Поиск продукта (начните вводить)" value="${state.searchQuery}" oninput="handleSearchInput(this.value)">
            <button onclick="searchProducts(state.searchQuery)">🔍</button>
          </div>`;
        if (state.suggestions.length > 0) {
          html += `<div class="suggestions">`;
          state.suggestions.forEach(p => {
            html += `<div class="suggestion-item" onclick="selectProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">
              <span>${p.name}</span>
              <span class="small">${p.kcal} ккал/100г</span>
            </div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;

        // Выбранный продукт для добавления
        if (state.selectedProduct) {
          html += `<div class="selected-product">
            <span>${state.selectedProduct.name}</span>
            <input type="number" value="${state.selectedWeight}" onchange="state.selectedWeight = parseFloat(this.value) || 100">
            <span>г</span>
            <button class="btn-add" onclick="addConsumedProduct(state.selectedProduct, state.selectedWeight); state.selectedProduct = null; render()">➕ Добавить</button>
          </div>`;
        }

        // Таймлайн съеденного за день
        html += `<div class="nutr-day-label">🍽️ Приёмы сегодня</div>
        <div class="timeline">`;
        if (todayNutr.consumed.length === 0) {
          html += `<p style="color:var(--muted); padding:10px;">Пока ничего не добавлено</p>`;
        } else {
          todayNutr.consumed.forEach(item => {
            html += `<div class="tl-item ${item.completed ? 'done' : ''}">
              <div class="tl-dot"></div>
              <div class="tl-card" onclick="toggleConsumed('${item.id}')">
                <span class="tl-icon">🍽️</span>
                <div class="tl-body">
                  <div class="tl-top"><span class="tl-name">${item.name}</span><span class="tl-time">${item.time}</span></div>
                  <div class="tl-items">${item.weight}г</div>
                  <div class="tl-macros">
                    <span class="tl-macro p">Б${item.protein}</span>
                    <span class="tl-macro f">Ж${item.fat}</span>
                    <span class="tl-macro c">У${item.carbs}</span>
                    <span class="tl-macro" style="color:var(--muted2)">${item.kcal}ккал</span>
                  </div>
                </div>
                <div class="tl-check">✓</div>
                <button style="background:transparent; border:none; color:var(--accent); font-size:16px; margin-left:4px;" onclick="event.stopPropagation(); removeConsumed('${item.id}')">🗑️</button>
              </div>
            </div>`;
          });
        }
        html += `</div>`;

        // Добавки (спортивное питание)
        const completedSupps = Object.keys(todayNutr.supplements).filter(id => todayNutr.supplements[id]).length;
        html += `<div class="nutr-day-label">💊 Спортпит · ${completedSupps}/${SUPPLEMENTS.length}</div>
        <div class="supps-grid">`;
        SUPPLEMENTS.forEach(s => {
          const done = !!todayNutr.supplements[s.id];
          html += `<div class="supp-card ${done ? 'done' : ''} ${s.status === 'buy' ? 'buy' : ''}" onclick="toggleSupplement('${s.id}')">
            <div class="supp-dot"></div>
            <div class="supp-body">
              <div class="supp-name">${s.name}</div>
              <div class="supp-time">${s.time}</div>
              ${s.status === 'buy' ? '<span class="buy-badge">докупить</span>' : ''}
            </div>
          </div>`;
        });
        html += `</div>`;

        // Список покупок (только те, что со статусом buy)
        const toBuy = SUPPLEMENTS.filter(s => s.status === 'buy');
        const total = toBuy.reduce((s, x) => s + (x.price || 0), 0);
        html += `<div class="shop-card">
          <div class="shop-title">🛒 Список покупок</div>
          <div class="shop-items">
            ${toBuy.map(s => `<div class="shop-item"><span>${s.name}</span><span class="shop-price">~${s.price}₽/мес</span></div>`).join('')}
          </div>
          <div class="shop-total"><span>Итого</span><span>~${total}₽/мес</span></div>
        </div>`;

      // ========== ВКЛАДКА ТРЕНИРОВКА (без изменений, только стили уже применены) ==========
      } else {
        // Header карточка
        html += `<div class="header-card ${wc.cssClass}">
          <div class="header-glow"></div>
          <div class="header-top">
            <div>
              <div class="workout-title">${tw ? tw.name : 'ОТДЫХ'}</div>
              <div class="header-sub">Неделя ${state.currentWeek}/7 · ${wc.name}</div>
              <div class="header-info">${wc.sets} подходов × ${wc.reps} повт.</div>
            </div>
            <div class="week-badge">
              <div class="week-num">${dayNames[state.currentDay]}</div>
              <div class="week-label">ДЕНЬ</div>
            </div>
          </div>
          <div class="day-buttons">
            ${[1, 3, 5].map(d => `<button class="day-btn ${state.currentDay === d ? 'active' : 'inactive'}" onclick="setDay(${d})">${dayNames[d]}</button>`).join('')}
          </div>
        </div>`;

        if (!tw) {
          html += `<div class="rest-day"><div class="rest-icon">😴</div><div class="rest-title">ДЕНЬ ОТДЫХА</div><div class="rest-subtitle">Восстанавливайся, ешь по плану 💪</div></div>`;
        } else {
          if (hasCarry) {
            html += `<div class="carry-legend"><span style="font-size:16px">◆</span><span>Золотые поля — данные прошлой недели. Ориентируйся и бей рекорд!</span></div>`;
          }

          tw.exercises.forEach((ex, exIdx) => {
            const key = 'w' + state.currentWeek + '_ex' + ex.id;
            const sets = (state.workoutData[key] || {}).sets || [];
            const completed = sets.filter(s => s.completed).length;
            const isLastEx = exIdx === tw.exercises.length - 1;
            const showHint = state.expandedHints['ex' + ex.id];
            const pause = getPause(ex.id, ex.pause);
            const isCustom = state.customPauses[ex.id] !== undefined;
            const allDone = completed === wc.sets;

            html += `<div class="exercise-card ${allDone ? 'all-done' : ''}">
              <div class="exercise-header">
                <div>
                  <div class="exercise-name">${ex.name}</div>
                  <div class="exercise-meta">
                    <span class="meta-tag">${wc.sets}×${ex.reps || 'max'}</span>
                    <span class="meta-tag ${pause >= 120 ? 'gold' : 'red'}">${formatPause(pause)}</span>
                    ${isCustom ? '<span class="meta-tag dim">✎ моё время</span>' : ''}
                  </div>
                </div>
                <div class="exercise-badges">
                  ${allDone ? '<span class="badge-done">✓ DONE</span>' : ''}
                  ${ex.hint ? `<button class="hint-btn" onclick="toggleHint(${ex.id})">${showHint ? '▲' : '?'}</button>` : ''}
                </div>
              </div>
              ${showHint && ex.hint ? `<div class="hint-box"><div class="hint-title">Техника</div>${ex.hint}</div>` : ''}
              ${Array(wc.sets).fill(0).map((_, si) => {
                const sd = sets[si] || { weight: '', reps: '', completed: false };
                const carry = getCarryData(ex.id, si);
                const showCW = !!(carry && carry.weight && !sd.completed && !sd.weight);
                const showCR = !!(carry && carry.reps && !sd.completed && !sd.reps);
                const showCA = showCW || showCR;
                const dw = sd.weight || (showCW ? carry.weight : '');
                const dr = sd.reps || (showCR ? carry.reps : '');
                const rc = sd.completed ? 'complete' : (showCA ? 'carry-over' : 'incomplete');
                const isLastSet = si === wc.sets - 1;
                return `<div class="set-row ${rc}">
                  <span class="set-num">S${si + 1}</span>
                  ${showCA ? '<span class="carry-dot"></span>' : ''}
                  <div class="set-inputs">
                    <input type="text" inputmode="decimal" placeholder="кг" value="${dw}"
                      class="set-input ${showCW ? 'carry' : ''}" onchange="updateSet(${ex.id},${si},'weight',this.value)">
                    <input type="text" inputmode="numeric" placeholder="${ex.reps ? 'повт' : 'max'}" value="${dr}"
                      class="set-input small ${showCR ? 'carry' : ''}" onchange="updateSet(${ex.id},${si},'reps',this.value)">
                  </div>
                  <button class="check-btn ${sd.completed ? 'complete' : 'incomplete'}"
                    onclick="toggleComplete(${ex.id},${si},${exIdx},${state.currentDay},${isLastSet},${isLastEx})">✓</button>
                </div>`;
              }).join('')}
            </div>`;
          });
        }

        // Навигация по неделям
        html += `<div class="week-nav">
          <button class="week-btn" onclick="setWeek(${state.currentWeek - 1})" ${state.currentWeek === 1 ? 'disabled' : ''}>◀ W${state.currentWeek - 1}</button>
          <div class="week-current">НЕДЕЛЯ ${state.currentWeek} / 7</div>
          <button class="week-btn" onclick="setWeek(${state.currentWeek + 1})" ${state.currentWeek === 7 ? 'disabled' : ''}>W${state.currentWeek + 1} ▶</button>
        </div>`;
        if (state.currentWeek < 7) {
          html += `<button class="next-week-btn" onclick="goToNextWeek()">✓ Закрыть неделю → Неделя ${state.currentWeek + 1}</button>`;
        } else {
          html += `<div class="final-week">🏆 ФИНАЛЬНАЯ НЕДЕЛЯ · РАЗГРУЗКА</div>`;
        }
      }

      html += `<button class="reset-btn" onclick="resetAllData()">🗑 Сбросить все данные</button>`;
      html += `</div>`; // scroll-content

      document.getElementById('app').innerHTML = html;
    }

    // Глобальный доступ для обработчиков событий (onclick)
    window.setTab = setTab;
    window.setDay = setDay;
    window.setWeek = setWeek;
    window.goToNextWeek = goToNextWeek;
    window.resetAllData = resetAllData;
    window.toggleHint = toggleHint;
    window.updateSet = updateSet;
    window.toggleComplete = toggleComplete;
    window.stopTimer = stopTimer;
    window.adjustTimer = adjustTimer;
    window.saveTimerPause = saveTimerPause;
    window.closeCompletion = closeCompletion;
    window.toggleMeal = toggleConsumed; // для совместимости? нет, у нас новая функция
    window.toggleSupplement = toggleSupplement;
    window.toggleConsumed = toggleConsumed;
    window.removeConsumed = removeConsumed;
    window.addConsumedProduct = addConsumedProduct;
    window.searchProducts = searchProducts;
    window.handleSearchInput = handleSearchInput;
    window.selectProduct = selectProduct;
    window.addUserProduct = addUserProduct;

    // Инициализация
    loadData();
    render();

    // Обновление часов
    setInterval(() => {
      const el = document.getElementById('clock');
      if (el) {
        const n = new Date();
        el.textContent = (n.getHours() < 10 ? '0' : '') + n.getHours() + ':' + (n.getMinutes() < 10 ? '0' : '') + n.getMinutes();
      }
    }, 1000);
  })();
</script>
</body>
</html>
