<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="./manifest.json">
<title>MAX TIME</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

:root{
  --bg0:#050505;
  --bg1:#0d0d0d;
  --bg2:#141414;
  --bg3:#1c1c1c;
  --bg4:#242424;
  --border:#2a2a2a;
  --border2:#333;
  --red:#cc1111;
  --red-dim:#cc111122;
  --red-glow:0 0 12px #cc111133;
  --text:#e2e2e2;
  --text2:#999;
  --text3:#555;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg0);
  background-image:radial-gradient(ellipse at 50% 0%,#1a1a1a 0%,#050505 70%);
  min-height:100vh;color:var(--text);
  padding-bottom:40px;overflow-x:hidden
}
input,button,select{font-family:'Inter',system-ui,sans-serif}
input{font-size:16px!important}
input:focus,select:focus{outline:none}
button{cursor:pointer;border:none}
button:active{opacity:.75}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;
  background:linear-gradient(180deg,#161616 0%,#0f0f0f 100%);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
  box-shadow:0 4px 24px #00000088
}
.topbar-left{display:flex;align-items:center;gap:12px}
.week-badge{
  width:34px;height:34px;
  background:transparent;
  border:1.5px solid var(--red);
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--red);
  flex-shrink:0;
  box-shadow:var(--red-glow)
}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:1px;line-height:1}
.topbar-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.5px}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--border)}
.tab-btn{
  flex:1;padding:12px 4px;font-size:13px;font-weight:500;
  background:none;color:var(--text3);border:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .2s;letter-spacing:.2px
}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}

/* ── CONTENT ── */
.content{padding:0 14px}

/* ── HEADER ── */
.hdr{padding:16px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.hdr-label{font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
.hdr-title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--text);letter-spacing:.5px;line-height:1.1}
.day-btns{display:flex;gap:5px;margin-top:12px}
.day-btn{
  flex:1;padding:8px 2px;font-size:11px;font-weight:500;
  border:1px solid var(--border);color:var(--text3);
  background:var(--bg2);transition:all .2s;letter-spacing:.3px;
  border-radius:2px
}
.day-btn.active{
  background:transparent;
  border-color:var(--red);color:var(--red);
  box-shadow:var(--red-glow)
}

/* ── EXERCISE CARD ── */
.ex-card{
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
  border:1px solid var(--border);
  border-radius:2px;margin-bottom:10px;overflow:hidden;
  box-shadow:0 2px 12px #00000066
}
.ex-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:11px 13px 9px;
  background:linear-gradient(90deg,var(--bg3) 0%,var(--bg2) 100%);
  border-bottom:1px solid var(--border)
}
.ex-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:var(--text);letter-spacing:.5px}
.ex-meta{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.2px}
.ex-meta .hl{color:var(--red)}
.ex-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge-done{border:1px solid var(--red);color:var(--red);font-size:10px;padding:2px 8px;letter-spacing:1px;font-weight:600;border-radius:2px}
.hint-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);font-size:10px;padding:2px 8px;border-radius:2px;font-weight:500}
.hint-box{background:var(--bg1);border-top:1px solid var(--border);padding:10px 13px}
.hint-t{font-size:10px;color:var(--red);letter-spacing:1px;margin-bottom:3px;font-weight:600;text-transform:uppercase}
.hint-txt{font-size:12px;color:var(--text2);line-height:1.6}

/* ── SET ROWS ── */
.set-row{
  display:flex;align-items:center;gap:10px;padding:8px 13px;
  border-top:1px solid var(--border);
  background:var(--bg1);transition:background .2s
}
.set-row.done-row{background:linear-gradient(90deg,#1a0a0a 0%,var(--bg1) 100%)}
.set-lbl{font-size:11px;font-weight:600;color:var(--text3);width:22px;flex-shrink:0;font-family:'Rajdhani',sans-serif}
.set-row.done-row .set-lbl{color:var(--red)}
.set-inputs{flex:1;display:flex;gap:6px}
.set-inp{
  background:var(--bg3);
  border:1px solid var(--border2);
  color:var(--text);padding:7px 9px;font-size:15px;width:76px;
  border-radius:2px;font-weight:400;transition:border .2s
}
.set-inp::placeholder{color:var(--text3);font-weight:300}
.set-inp:focus{border-color:var(--red)}
.set-inp.done-inp{border-color:#cc111133}
.set-inp.prev-inp{color:var(--text3);border-color:var(--border);font-style:italic}
.chk-btn{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid var(--border2);
  background:none;color:var(--text3);font-size:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .25s
}
.chk-btn.checked{
  background:transparent;border-color:var(--red);color:var(--red);
  box-shadow:var(--red-glow)
}

/* ── TIMER BUTTON ── */
.tmr-row{padding:8px 13px 12px}
.tmr-start{
  width:100%;background:transparent;
  color:var(--red);border:1.5px solid var(--red);
  padding:12px;font-size:15px;font-weight:600;
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:1px;font-family:'Rajdhani',sans-serif;
  box-shadow:var(--red-glow);
  transition:all .2s
}
.tmr-start:active{background:var(--red-dim)}

/* ── WEEK NAV ── */
.week-nav{display:flex;gap:8px;margin:14px 0}
.wn-btn{
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text2);padding:10px 12px;font-size:13px;font-weight:500;border-radius:2px
}
.wn-btn:disabled{opacity:.25;cursor:default}
.wn-cur{
  flex:1;background:transparent;border:1.5px solid var(--red);
  color:var(--red);padding:10px;font-size:13px;font-weight:600;
  border-radius:2px;text-align:center;letter-spacing:1px;
  font-family:'Rajdhani',sans-serif
}
.next-wk{
  width:100%;background:transparent;color:var(--red);
  border:1.5px solid var(--red);padding:12px;font-size:15px;font-weight:600;
  border-radius:2px;margin-bottom:14px;letter-spacing:.5px;
  font-family:'Rajdhani',sans-serif;
  box-shadow:var(--red-glow)
}
.final-wk{
  border:1px solid var(--red);padding:14px;text-align:center;
  margin-bottom:14px;font-size:15px;font-weight:600;color:var(--red);
  border-radius:2px;background:var(--red-dim)
}
.rest-day{text-align:center;padding:50px 20px}
.rest-icon{font-size:52px;margin-bottom:14px}
.rest-t{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--text);letter-spacing:1px}
.rest-s{color:var(--text3);font-size:12px;margin-top:6px}
.reset-btn{
  width:100%;background:none;border:1px solid var(--border);
  color:var(--text3);padding:10px;font-size:12px;border-radius:2px;margin-top:8px
}
.footer{padding:14px 0 6px;border-top:1px solid var(--border);margin-top:14px}
.footer-txt{font-size:11px;color:var(--text3);line-height:1.7;margin-bottom:10px}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{border:1px solid var(--border2);color:var(--text3);font-size:11px;padding:3px 10px;border-radius:2px;font-weight:500}

/* ── TIMER OVERLAY ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
  backdrop-filter:blur(6px)
}
.tmr-card{
  background:linear-gradient(180deg,#161616 0%,#0a0a0a 100%);
  border:1px solid var(--border);border-radius:4px;
  padding:28px 20px 20px;text-align:center;width:100%;max-width:320px;position:relative;
  box-shadow:0 0 60px #00000099
}
.tmr-close{
  position:absolute;top:12px;right:14px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text3);font-size:14px;width:28px;height:28px;
  border-radius:50%;display:flex;align-items:center;justify-content:center
}
.tmr-label{font-size:10px;color:var(--text3);letter-spacing:3px;margin-bottom:6px;text-transform:uppercase}
.tmr-time{
  font-family:'Rajdhani',sans-serif;
  font-size:84px;font-weight:700;color:var(--text);
  line-height:1;margin-bottom:4px;letter-spacing:-2px
}
.tmr-time.warn{color:var(--red)}
.tmr-ex{font-size:11px;color:var(--text3);margin-bottom:16px;letter-spacing:.5px}
.tmr-progress{height:2px;background:var(--bg4);border-radius:1px;margin-bottom:18px;overflow:hidden}
.tmr-bar{height:100%;background:var(--red);transition:width 1s linear}
.tmr-bar.warn{background:#ff4444}
.tmr-adj{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.adj-btn{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);padding:8px 18px;font-size:14px;border-radius:2px;font-weight:500
}
.tmr-save-row{min-height:28px;display:flex;justify-content:center;align-items:center;margin-bottom:12px}
.save-btn{
  background:transparent;color:var(--red);border:1px solid var(--red);
  padding:6px 20px;font-size:12px;border-radius:2px;font-weight:600;letter-spacing:.5px
}
.saved-txt{color:#55cc77;font-size:12px;font-weight:600}
.skip-btn{
  background:none;border:1px solid var(--border2);color:var(--text3);
  padding:10px 30px;font-size:13px;border-radius:2px;font-weight:500
}
.comp-card{
  background:linear-gradient(180deg,#161616 0%,#0a0a0a 100%);
  border:1px solid var(--red);border-radius:4px;
  padding:40px 22px;text-align:center;width:100%;max-width:320px;
  box-shadow:var(--red-glow)
}
.comp-icon{font-size:64px;margin-bottom:16px}
.comp-t{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:1px;margin-bottom:6px}
.comp-s{font-size:12px;color:var(--text2);margin-bottom:24px}
.comp-btn{
  background:transparent;color:var(--red);border:1.5px solid var(--red);
  padding:12px 36px;font-size:15px;font-weight:600;border-radius:2px;
  font-family:'Rajdhani',sans-serif;letter-spacing:.5px;
  box-shadow:var(--red-glow)
}

/* ── NUTRITION ── */
.mac-summary{
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
  border:1px solid var(--border);border-radius:2px;padding:14px;margin:12px 0
}
.mac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mac-item{text-align:center}
.mac-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--text);line-height:1;letter-spacing:.5px}
.mac-val.over{color:var(--red)}
.mac-lbl{font-size:9px;color:var(--text3);letter-spacing:.5px;margin:2px 0;text-transform:uppercase}
.mac-bar{height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin-top:4px}
.mac-fill{height:100%;background:var(--red);transition:width .3s;opacity:.7}
.mac-fill.over{opacity:1}

.nut-sec{
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
  border:1px solid var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden
}
.nut-sec-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;border-bottom:1px solid var(--border);
  background:var(--bg3)
}
.nut-sec-t{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--text);letter-spacing:.5px}
.nut-sec-c{font-size:11px;color:var(--text3)}
.search-area{padding:10px 13px}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.search-inp{
  flex:1;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);padding:9px 12px;font-size:15px;border-radius:2px
}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:var(--red);outline:none}
.srch-btn{
  background:transparent;color:var(--red);border:1.5px solid var(--red);
  padding:9px 14px;font-size:13px;border-radius:2px;white-space:nowrap;font-weight:600
}
.manual-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text3);padding:9px 12px;font-size:12px;border-radius:2px;width:100%;font-weight:500
}
.search-results{margin-top:8px}
.sri{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;
  transition:all .15s
}
.sri:last-child{border-bottom:none}
.sri:active{background:var(--red-dim);padding-left:4px}
.sri-name{font-size:13px;color:var(--text);font-weight:500}
.sri-mac{font-size:10px;color:var(--text3);margin-top:2px}
.sri-arr{color:var(--red);font-size:18px}
.srch-status{text-align:center;color:var(--text3);font-size:12px;padding:14px 0;letter-spacing:.5px}
.portion-form{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:12px;margin-top:4px}
.pf-t{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--text);letter-spacing:.3px;margin-bottom:4px}
.pf-prev{font-size:11px;color:var(--red);min-height:16px;margin-bottom:8px}
.f-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.f-inp{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);padding:9px 12px;font-size:15px;border-radius:2px;
  margin-bottom:8px
}
.f-inp:focus{border-color:var(--red);outline:none}
.f-inp::placeholder{color:var(--text3)}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.f-note{font-size:10px;color:var(--text3);margin-bottom:6px}
.pf-actions{display:flex;gap:8px;margin-top:4px}
.add-btn{
  flex:1;background:transparent;color:var(--red);
  border:1.5px solid var(--red);padding:10px;font-size:14px;font-weight:600;
  border-radius:2px;box-shadow:var(--red-glow)
}
.cancel-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text3);padding:10px 14px;font-size:13px;border-radius:2px;font-weight:500
}
.manual-form{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:12px;margin-top:4px}
.mf-t{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}

.fli{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border)}
.fli:last-child{border-bottom:none}
.fli-info{flex:1}
.fli-name{font-size:13px;color:var(--text);font-weight:500}
.fli-mac{font-size:10px;color:var(--text3);margin-top:2px}
.fli-del{background:none;border:none;color:var(--text3);font-size:20px;padding:0 4px;line-height:1}
.fli-del:active{color:var(--red)}
.empty-log{padding:16px;text-align:center;color:var(--text3);font-size:12px;letter-spacing:.5px}

.supp-item{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);cursor:pointer}
.supp-item:last-child{border-bottom:none}
.supp-chk{
  width:22px;height:22px;border:1.5px solid var(--border2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-right:12px;flex-shrink:0;transition:all .2s
}
.supp-chk.checked{border-color:var(--red);color:var(--red)}
.supp-name{font-size:13px;color:var(--text);flex:1;font-weight:400}
.supp-time{font-size:11px;color:var(--text3)}

select.f-inp{-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const PROGRAM={
  1:{name:'СПИНА + БИЦЕПС',exercises:[
    {id:1,name:'Тяга к поясу (#8)',reps:12,pause:150,hint:'Сядь, упрись грудью в подушку. Тяни рукоять к животу, сводя лопатки. Локти вдоль корпуса.'},
    {id:2,name:'Вертикальная тяга (#7)',reps:12,pause:150,hint:'Хват широкий. Тяни к верху груди, сводя лопатки вниз. Корпус слегка отклонён назад.'},
    {id:3,name:'Подтягивания широким хватом',reps:null,pause:180,hint:'Широкий хват, ладони от себя. Тянись грудью к перекладине. Делай максимум.'},
    {id:18,name:'Face Pulls (резинка)',reps:15,pause:60,hint:'Тяни к лицу, разводя руки. Локти выше кистей! Лопатки сведены.'},
    {id:4,name:'Подтягивания узким обратным хватом',reps:10,pause:120,hint:'Узкий хват, ладони к себе. Тяни подбородок к перекладине.'},
    {id:5,name:'Сгибание рук резинка',reps:15,pause:60,hint:'Встань на резинку. Локти прижаты. Сгибай к плечам, медленно опускай.'}
  ]},
  3:{name:'НОГИ + ПРЕСС',exercises:[
    {id:6,name:'Жим ногами (#3)',reps:12,pause:180,hint:'Стопы на ширине плеч. Опускай до 90° в коленях. Жми пятками.'},
    {id:19,name:'Становая тяга (#6)',reps:10,pause:150,hint:'Спина ПРЯМАЯ! Мощно выпрямись ногами и спиной.'},
    {id:21,name:'Приседания (#5)',reps:10,pause:150,hint:'Ноги на ширине плеч. Опускайся до параллели. Спина прямая.'},
    {id:7,name:'Разгибание ноги (#1)',reps:12,pause:90,hint:'Разгибай полностью, пауза 1 сек вверху. Опускай плавно.'},
    {id:8,name:'Сгибание ноги (#2)',reps:12,pause:90,hint:'Сгибай до касания ягодиц. Не отрывай таз.'},
    {id:22,name:'Подъёмы на носки',reps:15,pause:60,hint:'Поднимайся на носки максимально высоко. Пауза вверху 1 сек.'},
    {id:9,name:'Пресс (#15)',reps:15,pause:60,hint:'Скручивайся, отрывая лопатки. Не тяни шею руками.'},
    {id:20,name:'Гиперэкстензия (#15)',reps:12,pause:60,hint:'Опускайся до 90°. Поднимайся до линии с ногами. Сжимай ягодицы.'}
  ]},
  5:{name:'ГРУДЬ + ПЛЕЧИ + ТРИЦЕПС',exercises:[
    {id:11,name:'Жим от груди (#10)',reps:12,pause:150,hint:'Жми на уровне сосков. Локти под 45°.'},
    {id:12,name:'Жим плеча сидя (#9)',reps:12,pause:150,hint:'Жми вверх, не выпрямляя локти до конца.'},

    async function playGong() {
      try {
        const ctx = getAudioCtx();
        const buffer = await loadGong();
        if (!buffer) return;
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.8;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0);
      } catch(e) { console.error('Gong play error:', e); }
    }

    // === БОКСЁРСКИЙ ЗВОНОК с эскалацией громкости ===
    function playBoxingBell(volumeMultiplier = 1.0) {
      try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;

        // --- Удар молотком: короткий белый шум с быстрым спадом ---
        const hitLen = ctx.sampleRate * 0.025;
        const hitBuf = ctx.createBuffer(1, hitLen, ctx.sampleRate);
        const hitData = hitBuf.getChannelData(0);
        for (let i = 0; i < hitLen; i++) {
          hitData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / hitLen, 20);
        }
        const hitSrc = ctx.createBufferSource();
        hitSrc.buffer = hitBuf;
        const hitHP = ctx.createBiquadFilter();
        hitHP.type = 'highpass';
        hitHP.frequency.value = 2000;
        const hitGain = ctx.createGain();
        hitGain.gain.value = 0.7 * volumeMultiplier;
        hitSrc.connect(hitHP);
        hitHP.connect(hitGain);
        hitGain.connect(ctx.destination);
        hitSrc.start(now);

        // --- Основной тон колокола: 1050Hz + металлические обертоны ---
        const bellFreqs = [
          { freq: 1050, amp: 0.35, decay: 1.4 },
          { freq: 2100, amp: 0.18, decay: 1.0 },
          { freq: 3150, amp: 0.10, decay: 0.7 },
          { freq: 4200, amp: 0.05, decay: 0.5 },
          { freq: 525,  amp: 0.12, decay: 1.2 },
        ];

        bellFreqs.forEach(({ freq, amp, decay }) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.linearRampToValueAtTime(amp * volumeMultiplier, now + 0.003);
          gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + decay + 0.05);
        });

        // --- Металлический shimmer ---
        [-2, 2].forEach((det) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = 1050 + det;
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.linearRampToValueAtTime(0.08 * volumeMultiplier, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 1.2);
        });
      } catch(e) { console.error('Bell error:', e); }
    }

    // === ОБРАТНЫЙ ОТСЧЁТ с нарастающей громкостью ===
    function playCountdown() {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const volume = 0.25 + (i / 9) * 0.75; // 25% → 100%
          playBoxingBell(volume);
        }, i * 1000);
      }
    }

    function playBeep() {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

// NUTRITION
async function sf(q){
  if(!q||!q.trim()){S.ns.res=[];render();return;}
  const custom=gcp().filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).map(p=>({...p,isC:true}));
  S.ns.res=custom.slice(0,5);
  render();
  if(navigator.onLine){
    try{
      const url=new URL('https://world.openfoodfacts.org/cgi/search.pl');
      url.searchParams.append('search_terms',q);
      url.searchParams.append('search_simple','1');
      url.searchParams.append('action','process');
      url.searchParams.append('json','1');
      url.searchParams.append('page_size','5');
      const r=await fetch(url.toString());
      const data=await r.json();
      const online=(data.products||[]).map(p=>({
        name:(p.product_name||'').split(',')[0].substring(0,50).trim()||'\u0411\u0435\u0437 \u043d\u0430\u0437\u0432\u0430\u043d\u0438\u044f',
        cal:Math.round(p.nutriments?.['energy-kcal_100g']||0),
        prot:Math.round((p.nutriments?.proteins_100g||0)*10)/10,
        fat:Math.round((p.nutriments?.fat_100g||0)*10)/10,
        carbs:Math.round((p.nutriments?.carbohydrates_100g||0)*10)/10
      })).filter(p=>p.cal>0);
      const combined=[...custom,...online];
      const unique=combined.filter((item,i,self)=>i===self.findIndex(t=>t.name===item.name));
      S.ns.res=unique.slice(0,10);
    }catch(e){}
  }
  render();
}

function calcGoals(){
  const c=S.calc;
  const w=parseFloat(c.weight),h=parseFloat(c.height),a=parseFloat(c.age),act=parseFloat(c.activity);
  if(!w||!h||!a)return null;
  const bmr=c.sex==='m'?(10*w+6.25*h-5*a+5):(10*w+6.25*h-5*a-161);
  const tdee=Math.round(bmr*act);
  let cal=tdee;
  if(c.goal==='cut') cal=Math.round(tdee*0.82);
  if(c.goal==='bulk') cal=Math.round(tdee*1.12);
  const prot=c.goal==='cut'?Math.round(w*2.4):Math.round(w*2);
  const fat=Math.round(cal*0.25/9);
  const carbs=Math.round((cal-prot*4-fat*9)/4);
  return{cal,prot,fat:fat<Math.round(w*0.8)?Math.round(w*0.8):fat,carbs:carbs<0?0:carbs};
}

  const w=document.getElementById('calc-weight');

}

}

      </div><div class="mac-grid">
        <div class="mac-item"><div class="mac-val ${mac.cal>MG.cal?'over':''}">${mac.cal}</div><div class="mac-lbl">/ ${MG.cal} ККАЛ</div><div class="mac-bar"><div class="mac-fill ${mac.cal>MG.cal?'over':''}" style="width:${pct(mac.cal,MG.cal)}%"></div></div></div>
        <div class="mac-item"><div class="mac-val ${mac.prot>MG.prot?'over':''}">${mac.prot}</div><div class="mac-lbl">/ ${MG.prot}Г Б</div><div class="mac-bar"><div class="mac-fill ${mac.prot>MG.prot?'over':''}" style="width:${pct(mac.prot,MG.prot)}%"></div></div></div>
        <div class="mac-item"><div class="mac-val ${mac.fat>MG.fat?'over':''}">${mac.fat}</div><div class="mac-lbl">/ ${MG.fat}Г Ж</div><div class="mac-bar"><div class="mac-fill ${mac.fat>MG.fat?'over':''}" style="width:${pct(mac.fat,MG.fat)}%"></div></div></div>
        <div class="mac-item"><div class="mac-val ${mac.carbs>MG.carbs?'over':''}">${mac.carbs}</div><div class="mac-lbl">/ ${MG.carbs}Г У</div><div class="mac-bar"><div class="mac-fill ${mac.carbs>MG.carbs?'over':''}" style="width:${pct(mac.carbs,MG.carbs)}%"></div></div></div>
      </div></div>`;
    }

    // ПОИСК ПРОДУКТОВ
    h+=`<div class="nut-sec"><div class="nut-sec-head"><span class="nut-sec-t">ДОБАВИТЬ ПРОДУКТ</span></div><div class="search-area">`;
    if(S.ns.sel){
      const p=S.ns.sel;
      h+=`<div class="portion-form">
        <div class="pf-t">${p.name.substring(0,42).toUpperCase()}</div>
        <div style="font-size:11px;color:#888884;margin-bottom:8px;letter-spacing:1px">НА 100Г: ${p.cal} ККАЛ · Б${p.prot} Ж${p.fat} У${p.carbs}</div>
        <div class="f-lbl">ГРАММЫ</div>
        <input id="gi" type="text" inputmode="decimal" placeholder="100" class="f-inp" value="${S.ns.gram}"
          oninput="S.ns.gram=this.value;const g=parseFloat(this.value)||0;const el=document.getElementById('pp');if(el)el.textContent=g?Math.round(${p.cal}*g/100)+' ККАЛ · Б'+Math.round(${p.prot}*g/100*10)/10+' Ж'+Math.round(${p.fat}*g/100*10)/10+' У'+Math.round(${p.carbs}*g/100*10)/10:'';">
        <div id="pp" class="pf-prev"></div>
        <div class="pf-actions">
          <button class="add-btn" onclick="ap()">ДОБАВИТЬ</button>
          <button class="cancel-btn" onclick="S.ns.sel=null;render()">ОТМЕНА</button>
        </div>
      </div>`;
    } else if(S.ns.manual){
      const m=S.ns.mf;
      h+=`<div class="manual-form">
        <div class="mf-t">ДОБАВИТЬ ВРУЧНУЮ</div>
        <div class="f-note">БЖУК на 100г, затем съеденные граммы</div>
        <div class="f-lbl">НАЗВАНИЕ</div>
        <input type="text" placeholder="Куриная грудь" class="f-inp" value="${m.name}" oninput="S.ns.mf.name=this.value">
        <div class="f-grid">
          <div><div class="f-lbl">ККАЛ/100Г</div><input type="text" inputmode="decimal" placeholder="165" class="f-inp" value="${m.cal}" oninput="S.ns.mf.cal=this.value"></div>
          <div><div class="f-lbl">БЕЛКИ/100Г</div><input type="text" inputmode="decimal" placeholder="31" class="f-inp" value="${m.prot}" oninput="S.ns.mf.prot=this.value"></div>
          <div><div class="f-lbl">ЖИРЫ/100Г</div><input type="text" inputmode="decimal" placeholder="3.6" class="f-inp" value="${m.fat}" oninput="S.ns.mf.fat=this.value"></div>
          <div><div class="f-lbl">УГЛЕВОДЫ/100Г</div><input type="text" inputmode="decimal" placeholder="0" class="f-inp" value="${m.carbs}" oninput="S.ns.mf.carbs=this.value"></div>
        </div>
        <div class="f-lbl">ГРАММЫ СЪЕДЕНО</div>
        <input type="text" inputmode="decimal" placeholder="200" class="f-inp" value="${m.grams}" oninput="S.ns.mf.grams=this.value">
        <div class="pf-actions">
          <button class="add-btn" onclick="am()">ДОБАВИТЬ</button>
          <button class="cancel-btn" onclick="S.ns.manual=false;render()">ОТМЕНА</button>
        </div>
      </div>`;
    } else {
      h+=`<div class="search-row">
        <input type="text" placeholder="Поиск продукта..." class="search-inp" id="si" value="${S.ns.q}"
          oninput="debounceSf(this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();clearTimeout(_st);sf(S.ns.q);}">
        <button class="srch-btn" onclick="sf(document.getElementById('si').value)">НАЙТИ</button>
      </div>
      <button class="manual-btn" onclick="S.ns.manual=true;S.ns.res=[];render()">+ ДОБАВИТЬ ВРУЧНУЮ</button>`;
      if(S.ns.loading)h+=`<div class="srch-status">Поиск...</div>`;
      else if(S.ns.errMsg&&!S.ns.res.length)h+=`<div class="srch-status" style="color:#ff453a">${S.ns.errMsg}</div>`;
      else if(S.ns.err&&S.ns.res.length)h+=`<div class="srch-status" style="color:#ff9f0a">Офлайн — только сохранённые продукты</div>`;
      else if(S.ns.res.length){
        h+=`<div class="search-results">`;
        S.ns.res.forEach(p=>{
          const ps=JSON.stringify(p).replace(/'/g,"\\'").replace(/"/g,'&quot;');
          h+=`<div class="sri" onclick="selp(JSON.parse(this.dataset.p))" data-p="${ps}">
            <div><div class="sri-name">${p.name}${p.isC?' ★':''}</div><div class="sri-mac">${p.cal} ККАЛ · Б${p.prot} Ж${p.fat} У${p.carbs} / 100Г</div></div>
            <span class="sri-arr">›</span>
          </div>`;
        });
        h+=`</div>`;
      }
    }
    h+=`</div></div>`;

    // ЛЕНТА ЗА ДЕНЬ
    const log=nd.log||[];
    h+=`<div class="nut-sec"><div class="nut-sec-head"><span class="nut-sec-t">СЕГОДНЯ</span><span class="nut-sec-c">${log.length} позиций</span></div>`;
    if(!log.length)h+=`<div class="empty-log">ЕЩЁ НЕТ ЗАПИСЕЙ</div>`;
    else log.forEach(e=>{h+=`<div class="fli"><div class="fli-info"><div class="fli-name">${e.name} — ${e.grams}г</div><div class="fli-mac">${e.cal} ККАЛ · Б${e.prot} Ж${e.fat} У${e.carbs}</div></div><button class="fli-del" onclick="dl(${e.id})">×</button></div>`;});
    h+=`</div>`;

    // ДОБАВКИ
    const SUPPS=gSupps();
    const sup=nd.sup||{};
    h+=`<div class="nut-sec"><div class="nut-sec-head"><span class="nut-sec-t">ДОБАВКИ</span><span class="nut-sec-c">${SUPPS.filter(s=>sup[s.id]).length}/${SUPPS.length}</span></div>`;
    SUPPS.forEach(s=>{h+=`<div class="supp-item" onclick="ts('${s.id}')">
      <div class="supp-chk ${sup[s.id]?'checked':''}">${sup[s.id]?'<svg width="12" height="9" viewBox="0 0 12 9"><polyline points="1,4.5 4,8 11,1" stroke="white" stroke-width="2" fill="none"/></svg>':''}</div>
      <span class="supp-name">${s.name}</span>
      <span class="supp-time">${s.time}</span>
      <button onclick="event.stopPropagation();delSupp('${s.id}')" style="background:none;border:none;color:#555;font-size:18px;padding:0 4px;font-weight:900;line-height:1">×</button>
    </div>`;});
    h+=`<div style="padding:10px 12px;border-top:${SUPPS.length?'1px solid #4a4a4a':'none'}">
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input id="supp-name" type="text" placeholder="Название" class="search-inp" style="flex:2">
        <input id="supp-time" type="text" placeholder="8:00" class="search-inp" style="flex:1">
      </div>
      <button class="add-btn" style="width:100%" onclick="addSupp()">+ ДОБАВИТЬ ДОБАВКУ</button>
    </div></div>`;
  }

  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

load();loadGong();render();
setInterval(()=>{const el=document.getElementById('clk');if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}},1000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
</script>
</body>
</html>
