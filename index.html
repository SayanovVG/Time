<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="./manifest.json">
<title>MAX TIME</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16161a;--z1:#1e1e23;--z2:#25252b;--z3:#2d2d34;--z4:#38383f;--z5:#46464e;
  --line:#2a2a32;--line2:#36363e;--dim:#68686f;--muted:#8e8e99;
  --body:#c8c6d0;--text:#e8e6f0;--white:#f4f2fb;
  --red:#c0420c;--accent:#C8860A;--amber:#C8860A;--green:#2a9d5c;
  --ra10:rgba(192,66,12,.12);--ra20:rgba(192,66,12,.22);
  --aa10:rgba(200,134,10,.12);--ga10:rgba(42,157,92,.08);--nav-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--ink)}
body{font-family:'IBM Plex Mono',monospace;font-size:14px;padding-bottom:calc(var(--nav-h) + 56px);background:var(--ink);color:var(--body);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h)+4px)}
input,button,select,textarea{font-family:'IBM Plex Mono',monospace}
input{font-size:16px!important}
input:focus,select:focus,textarea:focus{outline:none}
button{cursor:pointer;transition:opacity .15s,transform .1s}
button:active{transform:scale(.96);opacity:.8}
textarea{resize:none;font-size:16px!important}
.bc{font-family:'Barlow Condensed',sans-serif}
.topbar{position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:9px 14px 8px;background:rgba(26,26,30,.99);border-bottom:1px solid var(--line2);backdrop-filter:blur(20px)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-logo{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--white);letter-spacing:5px;line-height:1;-webkit-text-stroke:1.5px var(--red);text-stroke:1.5px var(--red);paint-order:stroke fill;text-transform:uppercase}
.tb-sub-wrap{margin-left:4px}
.tb-sub{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:300}
.tb-clk{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--white);letter-spacing:1px}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:98;height:var(--nav-h);background:rgba(26,26,30,.99);border-top:1px solid var(--line2);display:flex;align-items:stretch;backdrop-filter:blur(20px)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;padding:6px 2px 8px;position:relative}
.bn::before{content:'';position:absolute;top:0;left:0;right:0;height:0;background:var(--red);transition:height .15s}
.bn.on::before{height:2px}
.bn-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.bn-ico svg{width:100%;height:100%}
.bn-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}
.bn.on .bn-lbl{color:var(--red)}
.pg{padding:0 13px}
.sc{background:var(--z1);border:1px solid var(--line2);margin-bottom:8px;overflow:hidden}
.sc-h{display:flex;justify-content:space-between;align-items:center;padding:7px 13px;background:var(--z2);border-bottom:1px solid var(--line)}
.sc-t{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--white);letter-spacing:2px}
.sc-m{font-size:10px;color:var(--muted);font-weight:300}
.f-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;font-weight:700}
.f-inp{width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:8px 10px;font-size:15px;margin-bottom:8px;font-weight:400}
.f-inp:focus{border-color:var(--red)}
.f-inp::placeholder{color:var(--muted);font-weight:300}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.add-btn{flex:1;background:transparent;color:var(--red);border:1px solid var(--red);padding:9px;font-size:13px;font-weight:500;letter-spacing:.5px}
.add-btn:active{background:var(--ra10)}
.cancel-btn{background:var(--z3);border:1px solid var(--line2);color:var(--muted);padding:9px 12px;font-size:12px;font-weight:400}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.del-btn{background:none;border:none;color:var(--dim);font-size:18px;padding:0 4px;line-height:1}
.del-btn:active{color:var(--red)}

/* ШТАБ MIT STICKY */
.mit-sticky{position:sticky;top:52px;z-index:90;background:var(--ink);border-bottom:1px solid var(--line2);box-shadow:0 4px 16px rgba(0,0,0,.6)}
.pomo-bar-wrap{height:3px;background:var(--z5)}
.pomo-bar-fill{height:100%;transition:width 1s linear}
.mit-block{padding:11px 13px 10px}
.mit-lbl{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:700;margin-bottom:5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mit-sphere-tag{border:1px solid var(--line2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 6px}
.mit-txt{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;color:var(--white);line-height:1.2;letter-spacing:.5px;margin-bottom:8px;cursor:pointer}
.mit-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--white);padding:3px 0 5px;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.3px;margin-bottom:8px}
.mit-inp:focus{border-bottom-color:var(--red)}
.mit-inp::placeholder{color:var(--dim);font-weight:400}
.mit-actions{display:flex;gap:7px;align-items:center}
.mit-start{background:transparent;border:1px solid var(--red);color:var(--red);padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;flex:1}
.mit-edit-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:8px 10px;font-size:13px}
.pomo-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:8px 10px;font-size:13px;flex-shrink:0}
.pomo-btn.active{border-color:var(--red);color:var(--red)}
.badge-not-started{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--red);border:1px solid var(--red);padding:2px 7px}
.badge-done-mit{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--green)}

/* SPHERE ACCORDION */
.sph-acc{border-bottom:1px solid var(--line)}
.sph-acc:last-child{border-bottom:none}
.sph-row{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;user-select:none}
.sph-row:active{background:var(--z3)}
.sph-ico{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sph-ico svg{width:100%;height:100%}
.sph-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white);letter-spacing:1px;min-width:80px;flex-shrink:0}
.sph-chk{font-size:9px;color:transparent;width:16px;height:16px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:none;border-radius:0}
.sph-chk.on{border-color:var(--red);color:var(--red)}
.sph-goal{font-size:12px;color:var(--muted);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.sph-chv{font-size:10px;color:var(--dim);flex-shrink:0;transition:transform .2s}
.sph-chv.open{transform:rotate(90deg)}
.sph-done .sph-name{color:var(--red)}
.sph-tasks{border-top:1px solid var(--line)}
.t-row{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid var(--line);transition:background .1s}
.t-row:last-of-type{border-bottom:none}
.t-pri{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid var(--dim);background:transparent}
.t-pri-a{background:var(--amber);border-color:var(--amber)}
.t-pri-r{background:var(--red);border-color:var(--red)}
/* POMO FLOATING */
.pomo-fab{position:fixed;bottom:calc(var(--nav-h) + 58px);right:14px;z-index:95;width:56px;height:56px;border-radius:50%;background:var(--z3);border:2px solid var(--amber);color:var(--amber);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer}
.pomo-fab.active{border-color:var(--red);color:var(--white);background:var(--red)}
.pomo-fab.brk{border-color:var(--amber);color:var(--ink);background:var(--amber)}
.pomo-fab-t{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;line-height:1;letter-spacing:.5px}
.pomo-fab-l{font-size:8px;letter-spacing:1px;font-weight:700;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;opacity:.7}
.pomo-fab-icon{width:16px;height:16px;flex-shrink:0}
/* POMO SETTINGS */
.pomo-settings{padding:14px 16px}
.pomo-settings-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pomo-settings-lbl{font-size:11px;color:var(--body);font-weight:400}
.pomo-num-inp{background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 8px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;width:64px;text-align:center}
.pomo-num-inp:focus{border-color:var(--red);outline:none}
.t-chk{width:15px;height:15px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;flex-shrink:0;cursor:pointer;background:none}
.t-chk.on{border-color:var(--red);color:var(--red)}
.t-txt{font-size:14px;color:var(--body);flex:1;font-weight:400;line-height:1.4}
.t-txt.done{color:var(--muted);text-decoration:line-through}
.t-mit-btn{background:none;border:none;font-size:13px;padding:0 3px;color:var(--dim);flex-shrink:0;line-height:1}
.t-mit-btn.active{color:var(--amber)}
.t-add-row{display:flex;gap:6px;padding:7px 12px;background:var(--z2);border-top:1px solid var(--line)}
.t-add-inp{flex:1;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 9px;font-size:13px}
.t-add-inp:focus{border-color:var(--red);outline:none}
.t-add-inp::placeholder{color:var(--muted);font-weight:300}

/* ALERTS */
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid rgba(212,146,10,.15);background:rgba(212,146,10,.08)}
.alert-row:last-child{border-bottom:none}
.alert-row.crit{background:rgba(196,16,32,.07);border-bottom-color:rgba(196,16,32,.12)}
.al-dot{width:4px;height:4px;background:var(--amber);flex-shrink:0}
.al-dot.crit{background:var(--red)}
.al-txt{font-size:12px;color:var(--amber);font-weight:600;letter-spacing:.3px}
.al-txt.crit{color:var(--red);font-size:12px}
.overlay{position:fixed;inset:0;background:rgba(13,13,13,.92);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(12px)}
.tmr-card{background:var(--z1);border:1px solid var(--line2);padding:26px 20px 20px;text-align:center;width:100%;max-width:320px;position:relative}
.tmr-close{position:absolute;top:12px;right:13px;background:var(--z3);border:1px solid var(--line2);color:var(--muted);font-size:12px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.tmr-lbl{font-size:9px;color:var(--muted);letter-spacing:4px;margin-bottom:6px;text-transform:uppercase}
.tmr-t{font-family:'Barlow Condensed',sans-serif;font-size:86px;font-weight:800;color:var(--white);line-height:1;margin-bottom:5px;letter-spacing:-2px}
.tmr-t.warn{color:var(--red)}
.tmr-ex{font-size:10px;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;font-weight:300}
.tmr-prog{height:1px;background:var(--z5);margin-bottom:16px}
.tmr-bar{height:100%;background:var(--red);transition:width 1s linear}
.tmr-adj{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.adj-btn{background:var(--z3);border:1px solid var(--line2);color:var(--body);padding:7px 18px;font-size:12px;font-weight:400}
.tmr-save-row{min-height:26px;display:flex;justify-content:center;align-items:center;margin-bottom:10px}
.save-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:5px 18px;font-size:11px;letter-spacing:1px}
.saved-txt{color:var(--green);font-size:11px;letter-spacing:1px}
.skip-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:8px 28px;font-size:12px;letter-spacing:.5px}
.comp-card{background:var(--z1);border:1px solid var(--red);padding:36px 20px;text-align:center;width:100%;max-width:320px}
.comp-t{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--white);letter-spacing:2px;margin-bottom:5px}
.comp-s{font-size:12px;color:var(--muted);margin-bottom:20px;font-weight:300}
.comp-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:10px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px}
/* POMO OVERLAY */
.pomo-card{background:var(--z1);border:1px solid var(--line2);padding:28px 20px 22px;text-align:center;width:100%;max-width:300px}
.pomo-phase-lbl{font-size:9px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.pomo-time-big{font-family:'Barlow Condensed',sans-serif;font-size:84px;font-weight:800;color:var(--white);line-height:1;letter-spacing:-2px;margin-bottom:14px}
.pomo-time-big.brk{color:var(--green)}
.pomo-stop-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:8px 28px;font-size:12px;letter-spacing:.5px}
/* HEALTH */
.htabs{display:flex;background:var(--ink);border-bottom:1px solid var(--line);padding:0 13px;gap:18px}
.htab{padding:9px 0;font-size:12px;font-weight:400;background:none;color:var(--muted);border:none;border-bottom:1.5px solid transparent;margin-bottom:-1px;letter-spacing:.3px}
.htab.on{color:var(--red);border-bottom-color:var(--red);font-weight:500}
.hdr{padding:12px 13px 10px;border-bottom:1px solid var(--line)}
.hdr-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:3px;text-transform:uppercase;font-weight:700}
.hdr-t{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--white);letter-spacing:.5px;line-height:1}
.day-btns{display:flex;gap:3px;margin-top:9px}
.day-btn{flex:1;padding:6px 1px;font-size:10px;border:1px solid var(--line2);color:var(--muted);background:var(--z2);letter-spacing:.3px;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.day-btn.on{background:transparent;border-color:var(--red);color:var(--red)}
.ex-card{background:var(--z1);border:1px solid var(--line);margin-bottom:8px;overflow:hidden}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px 8px;border-bottom:1px solid var(--line)}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--white);letter-spacing:.3px}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px;font-weight:300}
.ex-meta .hl{color:var(--red);font-weight:400}
.ex-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;margin-left:6px}
.badge-done{border:1px solid var(--red);color:var(--red);font-size:8px;padding:2px 6px;letter-spacing:1px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.badge-lr{border:1px solid var(--amber);color:var(--amber);font-size:8px;padding:2px 6px;letter-spacing:1px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.hint-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:10px;padding:2px 7px;font-weight:400}
.hint-box{background:var(--z3);border-top:1px solid var(--line);padding:8px 12px}
.hint-t{font-size:8px;color:var(--red);letter-spacing:2px;margin-bottom:2px;font-weight:700;text-transform:uppercase}
.hint-txt{font-size:13px;color:var(--body);line-height:1.6;font-weight:300}
.set-row{display:flex;align-items:center;gap:7px;padding:7px 12px;border-top:1px solid var(--line)}
.set-row.done-row{background:rgba(196,16,32,.06)}
.set-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);width:16px;flex-shrink:0}
.set-row.done-row .set-lbl{color:var(--red)}
.set-inputs{flex:1;display:flex;gap:5px}
.set-inp{background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 8px;font-size:14px;width:70px;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.set-inp::placeholder{color:var(--muted);font-weight:300;font-family:'Barlow Condensed',sans-serif;font-size:11px}
.set-inp:focus{border-color:var(--red)}
.set-inp.done-inp{border-color:rgba(204,21,34,.25)}
.set-inp.prev-inp{color:var(--muted);border-color:var(--line);font-style:italic;font-weight:300}
.chk-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:transparent;font-size:12px;flex-shrink:0}
.chk-btn.checked{border-color:var(--red);color:var(--red)}
.prg-hint{font-size:10px;color:var(--amber);font-weight:500;padding:5px 12px 2px;letter-spacing:.5px}
.tmr-row{padding:6px 12px 10px}
.tmr-start{width:100%;background:transparent;color:var(--red);border:1px solid var(--red);padding:9px 0;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px}
.act-inp-row{display:flex;gap:6px;padding:8px 12px;background:var(--z2);border-top:1px solid var(--line)}
.act-txt-inp{flex:1;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 9px;font-size:13px}
.act-txt-inp:focus{border-color:var(--red);outline:none}
.act-txt-inp::placeholder{color:var(--muted);font-weight:300}
.act-add-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:6px 11px;font-size:14px;font-weight:700}
.week-nav{display:flex;gap:7px;margin:10px 0}
.wn-btn{background:var(--z2);border:1px solid var(--line);color:var(--body);padding:8px 12px;font-size:12px}
.wn-btn:disabled{opacity:.2}
.wn-cur{flex:1;background:transparent;border:1px solid var(--red);color:var(--red);padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-align:center}
.reset-btn{width:100%;background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px;font-size:11px;margin-top:8px;letter-spacing:.5px}
.mac-summary{background:var(--z2);border:1px solid var(--line);padding:12px 13px;margin:11px 0 9px}
.mac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mac-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--white);line-height:1}
.mac-val.over{color:var(--red)}
.mac-lbl{font-size:8px;color:var(--muted);letter-spacing:.3px;margin:2px 0;text-transform:uppercase;font-weight:300}
.mac-bar{height:1px;background:var(--z5)}
.mac-fill{height:100%;background:var(--red)}
.nut-sec{background:var(--z1);border:1px solid var(--line);margin-bottom:9px;overflow:hidden}
.nut-sec-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--z2);border-bottom:1px solid var(--line)}
.nut-sec-t{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--white);letter-spacing:1px}
.nut-sec-c{font-size:10px;color:var(--muted);font-weight:300}
.search-inp{background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:8px 10px;font-size:15px}
.search-inp::placeholder{color:var(--muted);font-weight:300}
.search-inp:focus{border-color:var(--red);outline:none}

let audioCtx=null,gongBuffer=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
async function loadGong(){
  if(gongBuffer)return gongBuffer;
  try{
    const ctx=getAC();
    const resp=await fetch('https://sayanovvg.github.io/Time/gong.mp3');
    if(!resp.ok)throw new Error('no gong');
    const buf=await resp.arrayBuffer();
    gongBuffer=await ctx.decodeAudioData(buf);
    return gongBuffer;
  }catch(e){return null;}
}
async function playGong(){
  try{
    const ctx=getAC();
    const buf=await loadGong();
    if(buf){
      const src=ctx.createBufferSource();src.buffer=buf;
      const g=ctx.createGain();g.gain.value=.8;
      src.connect(g);g.connect(ctx.destination);src.start(0);
    } else {
      // fallback: synth gong
      const now=ctx.currentTime;
      const freqs=[80,160,240,320];
      freqs.forEach((f,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(.4-i*.08,now+.01);
        g.gain.exponentialRampToValueAtTime(.001,now+2.5);
        o.connect(g);g.connect(ctx.destination);
        o.start(now);o.stop(now+2.5);
      });
    }
  }catch(e){}
}
function playBell(vol=1){try{const ctx=getAC();const now=ctx.currentTime;[{f:1050,a:.35,d:1.4},{f:2100,a:.18,d:1},{f:3150,a:.1,d:.7},{f:525,a:.12,d:1.2}].forEach(({f,a,d})=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.001,now);g.gain.linearRampToValueAtTime(a*vol,now+.003);g.gain.exponentialRampToValueAtTime(.001,now+d);o.connect(g);g.connect(ctx.destination);o.start(now);o.stop(now+d+.05);});}catch(e){}}

function getSearchResults(q){
  if(!q||q.length<2)return[];
  const lq=q.toLowerCase();const results=[];
  SPHERES.forEach(sp=>{
    gtasks(sp.id).forEach(t=>{
      if(t.txt.toLowerCase().includes(lq))
        results.push({type:'task',txt:t.txt,sub:sp.name,sid:sp.id,id:t.id,done:t.done,priority:t.priority});
    });
  });
  // search diary notes
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    const entry=LS.get('mt_dl_'+key,null);
    if(entry&&entry.note&&entry.note.toLowerCase().includes(lq))
      results.push({type:'note',txt:entry.note.slice(0,60),sub:key,date:key});
  }
  return results.slice(0,20);
}

    });
    // save to diary snapshot
    if(!dl.clearedDone)dl.clearedDone=[];
    const alreadySaved=dl.clearedDone.find(x=>x.txt===dl.mit&&x.isMIT);
    if(!alreadySaved)dl.clearedDone.push({txt:dl.mit,spName:dl.mitSphere||'ГЛАВНАЯ',priority:'r',isMIT:true});
  } else if(!dl.mitDone&&dl.mit){
    // undo — unmark in sphere too
    SPHERES.forEach(sp=>{

      const t=tasks.find(x=>x.txt===dl.mit&&x.done);
      if(t){t.done=false;stasks(sp.id,tasks);}
    });
    if(dl.clearedDone)dl.clearedDone=dl.clearedDone.filter(x=>!(x.txt===dl.mit&&x.isMIT));
  }
  sdl(dl);render();
}

function calNav(dir){
  calViewMonth+=dir;
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  render();

function selectCalDay(sid,day,month,year){
  const today=new Date();
  const isToday=day===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
  const fullDate=String(day).padStart(2,'0')+'.'+String(month+1).padStart(2,'0')+'.'+year;
  const label=isToday?'сегодня':fullDate;
  S.calPicker.selectedDay=label;
  S.calPicker.open=false;
  S.calPicker.sid=null;
  if(sid.startsWith('biz_')){
    const pid=sid.slice(4);
    S.bizDay=label;S.bizPid=pid;
    render();return;
  }
  if(sid.startsWith('assign_')){
    const parts=sid.slice(7).split('_');
    const taskId=parts.pop();const sphereId=parts.join('_');
    const tasks=gtasks(sphereId);
    const t=tasks.find(x=>x.id===taskId);
    if(t){t.day=label;stasks(sphereId,tasks);}
    render();return;
  }
  if(sid==='hq'){
    S.hqForm.day=label;render();return;
  }
  const inputId=sid.startsWith('g_')?'gtadd_day_'+sid.slice(2):'tadd_day_'+sid;
  const inp=document.getElementById(inputId);
  if(inp){inp.value=label;}
  render();
  setTimeout(()=>{const el=document.getElementById(inputId);if(el)el.value=label;},10);
}
function buildCalHTML(sid){
  const now=new Date();
  const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const firstDay=new Date(calViewYear,calViewMonth,1).getDay();
  const offset=(firstDay+6)%7;
  const daysInMonth=new Date(calViewYear,calViewMonth+1,0).getDate();
  // backdrop + popup
  let g=`<div style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.5)" onclick="closeCal()"></div>`;
  g+=`<div class="cal-popup" onclick="event.stopPropagation()">
    <div class="cal-head">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-month-lbl">${mNames[calViewMonth]} ${calViewYear}</div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">ПН</div><div class="cal-dow">ВТ</div><div class="cal-dow">СР</div><div class="cal-dow">ЧТ</div><div class="cal-dow">ПТ</div><div class="cal-dow">СБ</div><div class="cal-dow">ВС</div>`;
  for(let i=0;i<offset;i++)g+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===now.getDate()&&calViewMonth===now.getMonth()&&calViewYear===now.getFullYear();
    g+=`<div class="cal-day ${isToday?'today':''}" onclick="selectCalDay('${sid}',${d},${calViewMonth},${calViewYear})">${d}</div>`;
  }
  g+=`</div></div>`;
  return g;
}

function render(){
  const n=new Date();const hour=n.getHours();const isEvening=hour>=17;
  const clk=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();
  const dayName=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][n.getDay()];const wc=WC[S.week];
  let h='';

  // TIMER OVERLAY
  if(S.timer.on){
    const w=S.timer.left<=10;const pr=S.timer.max>0?(S.timer.left/S.timer.max)*100:0;

    h+=`<div class="overlay"><div class="tmr-card"><button class="tmr-close" onclick="xst()">✕</button><div class="tmr-lbl">ОТДЫХ</div><div class="tmr-t ${w?'warn':''}">${ft(S.timer.left)}</div><div class="tmr-ex">${S.timer.ex.toUpperCase()}</div><div class="tmr-prog"><div class="tmr-bar" style="width:${pr}%"></div></div><div class="tmr-adj"><button class="adj-btn" onclick="adj(-15)">−15С</button><button class="adj-btn" onclick="adj(15)">+15С</button></div>${sr}<button class="skip-btn" onclick="xst()">ПРОПУСТИТЬ</button></div></div>`;
  }
  if(S.done){h+=`<div class="overlay"><div class="comp-card"><div class="comp-t">ГОТОВО</div><div class="comp-s">Тренировка завершена.</div><button class="comp-btn" onclick="S.done=false;render()">OK ✓</button></div></div>`;}

    if(sRows)h+='<div style="margin-top:6px">'+sRows+'</div>';

  // ══ ШТАБ ══
  if(S.tab==='today'){
    const dl=gdl();const goals=ggoals();const alerts=getAlerts();

    // ЗАДАЧА ДНЯ STICKY
    h+='<div class="mit-sticky">';

    } else {
      h+=`<div class="mit-txt" style="${dl.mitDone?'text-decoration:line-through;color:var(--muted);opacity:.6':''}">${dl.mit}</div>`;
      if(dl.mitDone){
        h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--red);letter-spacing:1.5px;border:1px solid var(--red);padding:2px 8px">ГЛАВНАЯ ЗАДАЧА ВЫПОЛНЕНА ✓</span>
          <button onclick="toggleMITDone()" style="background:none;border:none;color:var(--dim);font-size:11px;padding:0">отменить</button>
          <button onclick="const dl=gdl();dl.mit='';dl.mitSphere='';dl.mitDone=false;sdl(dl);render()" style="background:none;border:none;color:var(--dim);font-size:18px;padding:0 2px">✕</button>

      } else {
        h+='<div class="mit-actions">';
        h+=`<button class="mit-start" onclick="toggleMITDone()">ВЫПОЛНЕНО ✓</button>`;
        h+=`<button class="mit-edit-btn" onclick="const dl=gdl();dl.mit='';dl.mitSphere='';dl.mitDone=false;sdl(dl);render()" title="Сменить задачу">✕</button>`;
        h+='</div>';
      }
    }
    h+='</div></div>';

    h+='<div class="pg" style="padding-top:10px">';

    // COLLECT TODAY'S TASKS from all spheres
    const todayStr=tdk().split('-');
    const todayDay=parseInt(todayStr[2]);
    const allTasks=[];
    SPHERES.forEach(sp=>{
      gtasks(sp.id).forEach(t=>{  // include done tasks too
        allTasks.push({...t,sid:sp.id,spName:sp.name});
      });
    });
    const _td=new Date();const _tm=String(_td.getMonth()+1).padStart(2,'0');const _ty=_td.getFullYear();
    const todayStr2=String(todayDay).padStart(2,'0')+'.'+_tm+'.'+_ty;
    const todayStr3=String(todayDay).padStart(2,'0')+'.'+_tm; // DD.MM without year (old format)
    const todayTasks=allTasks.filter(t=>{
      if(!t.day||t.day==='')return false;
      if(t.day==='сег'||t.day==='сегодня')return true;
      if(t.day===todayStr2)return true; // DD.MM.YYYY
      if(t.day===todayStr3)return true; // DD.MM legacy
      return parseInt(t.day)===todayDay; // plain number legacy
    });
    // inject recurring payments due today
    getRecurringToday().forEach(r=>{
      const alreadyDone=r.done_month===mdk();
      if(!alreadyDone)todayTasks.push({
        id:'rec_'+r.id,txt:r.name+' — '+(r.amount<0?'−':'+')+(Math.round(Math.abs(r.amount)/100)/10)+'к',
        sid:'fin',spName:'ФИНАНСЫ',priority:'a',done:false,day:String(r.day),
        isRecurring:true,recId:r.id
      });
    });
    const todayIds=new Set(todayTasks.map(t=>t.id));
    const undatedTasks=allTasks.filter(t=>!t.day||t.day==='');
    const undatedOpen=undatedTasks.filter(t=>!t.done&&!todayIds.has(t.id));
    const undatedDone=undatedTasks.filter(t=>t.done);
    // Weighted progress: MIT=50%, red=30% of rest, amber=15%, white=5%
    const hasMIT=!!dl.mit;
    const mitWeight=hasMIT?50:0;
    const remainWeight=hasMIT?50:100;
    const rCnt=todayTasks.filter(t=>t.priority==='r').length;
    const aCnt=todayTasks.filter(t=>t.priority==='a').length;
    const wCnt=todayTasks.filter(t=>t.priority==='w'||!t.priority).length;
    const totalTaskW=rCnt*3+aCnt*2+wCnt*1||1;
    const doneTaskW=todayTasks.filter(t=>t.done&&t.priority==='r').length*3+
                    todayTasks.filter(t=>t.done&&t.priority==='a').length*2+
                    todayTasks.filter(t=>t.done&&(t.priority==='w'||!t.priority)).length*1;
    const taskPct=Math.round(doneTaskW/totalTaskW*remainWeight);
    const mitPct=hasMIT&&dl.mitDone?mitWeight:0;
    const pctDay=Math.min(100,mitPct+taskPct);
    const pctColor=pctDay>=80?'var(--red)':pctDay>=40?'var(--amber)':'var(--muted)';
    const totalForDay=todayTasks.length+(hasMIT?1:0);
    const doneForDay=todayTasks.filter(t=>t.done).length+(dl.mitDone?1:0);

    // PROGRESS BAR
    if(totalForDay>0||hasMIT){
      const mitBarW=hasMIT?50:0;
      const taskBarW=100-mitBarW;
      h+=`<div style="margin-bottom:9px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="flex:1;height:5px;background:var(--z5);display:flex;overflow:hidden">
            ${hasMIT?`<div style="width:${mitBarW}%;height:100%;background:${dl.mitDone?'var(--red)':'var(--z4)'};border-right:1px solid var(--ink);transition:background .3s"></div>`:''}
            <div style="width:${taskBarW}%;height:100%;background:var(--z5);position:relative">
              <div style="position:absolute;top:0;left:0;height:100%;width:${totalTaskW>0?Math.round(doneTaskW/totalTaskW*100):0}%;background:var(--amber);transition:width .4s"></div>
            </div>
          </div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:${pctColor}">${pctDay}%</span>

        </div>

        </div>`:''}
      </div>`;
    }

    // ADD TASK BUTTON
    if(S.addTaskOpen){
      const calOpenHQ=S.calPicker.open&&S.calPicker.sid==='hq';
      h+=`<div class="sc" style="margin-bottom:9px">
        <div class="sc-h"><span class="sc-t">НОВАЯ ЗАДАЧА</span><button onclick="S.addTaskOpen=false;S.hqForm={txt:'',sid:'health',day:''};render()" style="background:none;border:none;color:var(--muted);font-size:18px;padding:0">×</button></div>

            </div>
          </div>
          <button onclick="addTaskFromHQ()" style="width:100%;background:var(--red);color:var(--white);border:none;padding:10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px">ДОБАВИТЬ →</button>
        </div>
      </div>`;
    } else {
      h+=`<button onclick="S.addTaskOpen=true;render()" style="width:100%;background:var(--z1);border:1px solid var(--line2);color:var(--muted);padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:9px;display:flex;align-items:center;justify-content:center;gap:6px">

      h+='<div class="sc" style="margin-bottom:9px">';

        const bd=on?(f==='a'?'var(--amber)':(f==='w'?'var(--body)':'var(--red)')):'var(--line2)';
        const cl=on?(f==='a'?'var(--ink)':'var(--white)'):(f==='r'?'var(--red)':(f==='a'?'var(--amber)':'var(--muted)'));
        fHtml+='<button onclick="S.taskFilter='+JSON.stringify(f)+';render()" style="background:'+bg+';border:1px solid '+bd+';color:'+cl+';padding:2px 7px;font-size:10px;font-weight:700">'+lbl+'</button>';
      });
      fHtml+='</div></div>';
      h+=fHtml;
      const priOrder={r:0,a:1,w:2};
      let filtered=openTodayAll.filter(t=>S.taskFilter==='all'||t.priority===S.taskFilter);
      filtered.sort((a,b)=>(priOrder[a.priority]||2)-(priOrder[b.priority]||2));
      filtered.forEach(t=>{
        const priColor=t.priority==='r'?'var(--red)':t.priority==='a'?'var(--amber)':'var(--dim)';
        const isMIT=dl.mit===t.txt;
        const isEditing=S.editTask.sid===t.sid&&S.editTask.id===t.id;

    h+=`<div class="sc"><div class="sc-h"><span class="sc-t">ПРАКТИКИ</span><span class="sc-m">${dev.practices.filter((_,i)=>devd.done[i]).length}/${dev.practices.length}</span></div>`;
    dev.practices.forEach((p,i)=>{const done=!!devd.done[i];h+=`<div class="rel-check" onclick="toggleDevPractice(${i})"><div class="rel-chk ${done?'on':''}">${done?'<svg width="10" height="8" viewBox="0 0 10 8"><polyline points="1,4 3.5,6.5 9,1" stroke="var(--red)" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}</div><span class="rel-txt ${done?'done':''}">${p}</span><button class="del-btn" onclick="event.stopPropagation();delDevPractice(${i})">×</button></div>`;});
    if(S.devAdd)h+=`<div style="padding:8px 12px;background:var(--z2);border-top:1px solid var(--line)"><div style="display:flex;gap:6px"><input id="dev-add-inp" type="text" class="add-inp" placeholder="Новая практика..."><button class="add-inp-btn" onclick="addDevPractice()">+</button></div></div>`;
    else h+=`<div style="padding:7px 12px;border-top:1px solid var(--line)"><button onclick="S.devAdd=true;render()" style="background:transparent;border:none;color:var(--muted);font-size:11px;width:100%;text-align:left;padding:0">+ добавить практику</button></div>`;
    h+='</div>';
    const hypos=ghypo();
    h+=`<div class="sc"><div class="sc-h"><span class="sc-t">ГИПОТЕЗЫ</span><button onclick="S.hypoAdd=!S.hypoAdd;render()" style="background:transparent;border:1px solid var(--red);color:var(--red);padding:3px 10px;font-size:11px">+</button></div>`;
    if(S.hypoAdd)h+=`<div style="padding:10px 12px;background:var(--z2);border-bottom:1px solid var(--line)"><div class="f-lbl">ГИПОТЕЗА</div><textarea id="hypo-txt-inp" class="day-note" style="min-height:48px" placeholder="Если я делаю X, то Y..."></textarea><div class="f-lbl" style="margin-top:6px">МЕТРИКА</div><input id="hypo-metric-inp" type="text" class="f-inp" placeholder="конверсия звонок → КП"><div class="pf-actions"><button class="add-btn" onclick="addHypo()">ДОБАВИТЬ</button><button class="cancel-btn" onclick="S.hypoAdd=false;render()">ОТМЕНА</button></div></div>`;
    const sl={TESTING:'t',SUCCESS:'s',FAIL:'f',IDEA:'i'};
    hypos.forEach(hy=>{h+=`<div class="hypo"><div class="hy-s ${sl[hy.status]||'i'}">${hy.status==='TESTING'?'— ТЕСТИРУЮ':hy.status==='SUCCESS'?'+ ПОДТВЕРЖДЕНО':hy.status==='FAIL'?'× ОПРОВЕРГНУТО':'◆ ИДЕЯ'}</div><div class="hy-tx">${hy.txt}</div>${hy.metric?`<div class="hy-m">Метрика: ${hy.metric}</div>`:''} ${hy.status==='TESTING'?`<div class="hy-actions"><button class="hy-btn s" onclick="setHypoStatus('${hy.id}','SUCCESS')">✓ РАБОТАЕТ</button><button class="hy-btn f" onclick="setHypoStatus('${hy.id}','FAIL')">× НЕ РАБОТАЕТ</button><button class="hy-btn" onclick="delHypo('${hy.id}')">удалить</button></div>`:''}</div>`;});
    if(!hypos.length)h+='<div style="padding:14px;text-align:center;color:var(--muted);font-size:11px">НЕТ ГИПОТЕЗ</div>';
    h+='</div></div>';
  }

  // ══ ФОКУС / ЦЕЛИ ══
  else if(S.tab==='goals'){
    const goals=ggoals();
    const now2=new Date();
    const monthName=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'][now2.getMonth()];
    const weekRange=getWeekDates(true);
    h+='<div class="pg" style="padding-top:11px">';

    SPHERES.forEach(sp=>{
      const g=goals[sp.id]||{mp:0,month:'',week:''};
      const pct2=Math.min(100,g.mp||0);
      const pctColor=pct2>=80?'var(--red)':pct2>=40?'var(--amber)':'var(--muted)';
      const tasks=gtasks(sp.id);
      const openGoalSph=!!S.openSpheres['g_'+sp.id];
      const openTasks=tasks.filter(t=>!t.done);
      const doneCnt=tasks.filter(t=>t.done).length;

      h+=`<div class="sc" style="margin-bottom:9px">
        <!-- SPHERE HEADER -->
        <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;background:var(--z2)" onclick="S.openSpheres['g_'+'${sp.id}']=!S.openSpheres['g_'+'${sp.id}'];render()">
          <div style="color:var(--muted);width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${SICONS[sp.id]}</div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white);letter-spacing:1px;flex:1">${sp.name}</span>
          ${openTasks.length?`<span style="font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--amber);border:1px solid var(--amber);padding:1px 6px">${openTasks.length}</span>`:''}
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:${pctColor}">${pct2}%</span>
          <span style="font-size:11px;color:var(--dim);margin-left:2px;transition:transform .2s;display:inline-block;${openGoalSph?'transform:rotate(90deg)':''}">›</span>
        </div>

        <!-- МЕСЯЦ -->
        <div style="padding:8px 12px 6px;border-bottom:1px solid var(--line)">
          <div style="font-size:8px;color:var(--muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:4px">${monthName.toUpperCase()} — ЦЕЛЬ</div>
          <input type="text" placeholder="Цель на месяц..." style="width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--white);padding:3px 0 5px;font-size:14px" value="${g.month||''}" onchange="saveGoalField('${sp.id}',this.value)">
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
            <div style="flex:1;height:3px;background:var(--z5)"><div style="height:100%;width:${pct2}%;background:${pctColor};transition:width .3s"></div></div>
            <input type="text" inputmode="numeric" value="${g.mp||0}" style="background:transparent;border:none;border-bottom:1px solid var(--line2);color:${pctColor};font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;width:42px;text-align:right;padding:0 0 2px" onchange="saveGoalPct('${sp.id}',this.value)">
            <span style="font-size:10px;color:var(--muted)">%</span>
          </div>
        </div>

        <!-- НЕДЕЛЯ -->
        <div style="padding:8px 12px;border-bottom:${openGoalSph?'1px solid var(--line)':'none'}">
          <div style="font-size:8px;color:var(--amber);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:4px;opacity:.8">${weekRange} — ФОКУС НЕДЕЛИ</div>
          <input type="text" placeholder="Цель на эту неделю..." style="width:100%;background:transparent;border:none;border-bottom:1px solid rgba(240,168,0,.3);color:var(--amber);padding:3px 0 5px;font-size:13px" value="${g.week||''}" onchange="saveGoalWeek('${sp.id}',this.value)">
        </div>

        ${openGoalSph?`
        <!-- ЗАДАЧИ НЕДЕЛИ -->
        <div>
          ${(()=>{
            const priOrder={r:0,a:1,w:2};
            const sorted=[...openTasks].sort((a,b)=>(priOrder[a.priority]||2)-(priOrder[b.priority]||2));
            let rows='';
            sorted.forEach(t=>{
              const priClass=t.priority==='r'?'t-pri-r':t.priority==='a'?'t-pri-a':'';
              const isMIT=gdl().mit===t.txt;
              const dayLabel=t.day?'<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:800;color:var(--amber);min-width:22px;text-align:right;flex-shrink:0">'+fmtDay(t.day)+'</span>':'<span style="min-width:22px"></span>';
              rows+='<div class="t-row">'+
                '<div class="t-pri '+priClass+'" onclick="cyclePri(\''+sp.id+'\',\''+t.id+'\')"></div>'+
                '<div class="t-chk" onclick="toggleTask(\''+sp.id+'\',\''+t.id+'\')"></div>'+
                '<span class="t-txt">'+t.txt+'</span>'+
                dayLabel+
                '<button class="t-mit-btn '+(isMIT?'active':'')+'" onclick="setMITfromTask(\''+sp.id+'\',\''+t.id+'\')" title="Задача дня">★</button>'+
                '<button class="del-btn" onclick="delTask(\''+sp.id+'\',\''+t.id+'\')">×</button>'+
              '</div>';
            });
            if(doneCnt)rows+='<div style="padding:4px 13px 2px"><span style="font-size:8px;color:var(--dim);letter-spacing:1px;font-weight:700">ВЫПОЛНЕНО ('+doneCnt+')</span></div>';
            tasks.filter(t=>t.done).forEach(t=>{
              rows+='<div class="t-row" style="opacity:.45">'+
                '<div class="t-pri"></div>'+
                '<div class="t-chk on" onclick="toggleTask(\''+sp.id+'\',\''+t.id+'\')">✓</div>'+
                '<span class="t-txt done">'+t.txt+'</span>'+
                '<button class="del-btn" onclick="delTask(\''+sp.id+'\',\''+t.id+'\')">×</button>'+
              '</div>';
            });
            return rows;
          })()}

          <!-- ADD TASK ROW -->
          <div class="t-add-row" style="gap:5px;position:relative">
            <div class="cal-wrap" style="flex-shrink:0">
              <button onclick="openCal('g_${sp.id}')" title="Дата" style="background:var(--z3);border:1px solid ${(S.calPicker.open&&S.calPicker.sid==='g_'+sp.id)?'var(--red)':'var(--line2)'};color:${(S.calPicker.open&&S.calPicker.sid==='g_'+sp.id)?'var(--red)':'var(--amber)'};padding:5px 7px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="16" height="14" rx="1"/><line x1="2" y1="9" x2="18" y2="9"/><line x1="6" y1="2" x2="6" y2="6"/><line x1="14" y1="2" x2="14" y2="6"/></svg></button>
              ${(S.calPicker.open&&S.calPicker.sid==='g_'+sp.id)?buildCalHTML('g_'+sp.id):''}
            </div>
            <input id="gtadd_${sp.id}" type="text" class="t-add-inp" placeholder="Добавить задачу на неделю..." style="flex:1">
            <button class="add-inp-btn" onclick="addTaskGoals('${sp.id}')">+</button>
          </div>
        </div>`:''}
      </div>`;
    });

    h+='</div>';
  }

  // ══ ДНЕВНИК ══
  else if(S.tab==='diary'){
    h+='<div class="pg" style="padding-top:11px">';
    h+=`<div style="display:flex;gap:7px;margin-bottom:9px">
      <button onclick="exportData()" style="flex:1;background:var(--z2);border:1px solid var(--line2);color:var(--muted);padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px">↓ ЭКСПОРТ ДАННЫХ</button>
      <label style="flex:1;background:var(--z2);border:1px solid var(--line2);color:var(--muted);padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-align:center;cursor:pointer">↑ ИМПОРТ<input type="file" accept=".json" onchange="importData(this.files[0])" style="display:none"></label>
    </div>`;
    const days=[];const now3=new Date();
    for(let i=0;i<30;i++){
      const d=new Date(now3);d.setDate(d.getDate()-i);
      const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
      const entry=LS.get('mt_dl_'+key,null);
      // collect tasks done that day (tasks that were cleared)
      const clearedDone=(entry&&entry.clearedDone)||[];
      // also check live tasks marked done on that day (if same as today)
      let liveDone=[];
      if(key===tdk()){
        SPHERES.forEach(sp=>{liveDone.push(...gtasks(sp.id).filter(t=>t.done).map(t=>({...t,spName:sp.name})));});
      }
      const allDone=[...clearedDone,...liveDone];
      days.push({key,d,entry,allDone});
    }
    const hasDays=days.some(x=>x.entry&&(x.entry.rating||x.entry.note||x.entry.mit)||x.allDone.length>0);
    if(!hasDays){
      h+='<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:12px;font-weight:300">НЕТ ЗАПИСЕЙ<br><br><span style="font-size:10px">Заполняй ШТАБ каждый день</span></div>';
    } else {
      const dayNames=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
      const monthNames=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
      days.forEach(({key,d,entry,allDone})=>{
        if(!entry&&!allDone.length)return;
        if(entry&&!(entry.rating)&&!(entry.note)&&!(entry.mit)&&!allDone.length)return;
        const r=(entry&&entry.rating)||0;
        const rColor=r>=8?'var(--red)':r>=5?'var(--amber)':'var(--muted)';
        const isToday=key===tdk();
        // task stats
        const totalDone=allDone.length;
        const redDone=allDone.filter(t=>t.priority==='r').length;
        const ambDone=allDone.filter(t=>t.priority==='a').length;
        const whtDone=allDone.filter(t=>t.priority==='w'||!t.priority).length;
        // by sphere
        const bySphere={};
        allDone.forEach(t=>{const sn=t.spName||t.sid||'?';if(!bySphere[sn])bySphere[sn]=0;bySphere[sn]++;});
        h+=`<div class="sc" style="margin-bottom:7px">
          <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--z2);border-bottom:1px solid var(--line)">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white)">${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]}${isToday?' <span style="color:var(--red);font-size:9px;letter-spacing:1px">СЕГОДНЯ</span>':''}</div>
            ${r?`<div style="flex:1;height:3px;background:var(--z5);margin:0 8px"><div style="height:100%;width:${r*10}%;background:${rColor}"></div></div><span style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:${rColor}">${r}</span>`:'<div style="flex:1"></div>'}
          </div>
          ${entry&&entry.mit?`<div style="padding:5px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px">
            <div style="flex:1">
              <span style="font-size:8px;color:var(--muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase">★ ЗАДАЧА ДНЯ · </span>
              <span style="font-size:12px;color:${entry.mitDone?'var(--muted)':'var(--text)'};${entry.mitDone?'text-decoration:line-through':''}">${entry.mit}</span>
            </div>
            ${entry.mitDone?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--red);letter-spacing:1px;flex-shrink:0">✓ +50%</span>`:`<span style="font-size:10px;color:var(--dim);flex-shrink:0">не выполнена</span>`}
          </div>`:''}
          ${totalDone>0?`<div style="padding:7px 12px;border-bottom:1px solid var(--line)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
              <span style="font-size:8px;color:var(--muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase">ВЫПОЛНЕНО</span>
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--white)">${totalDone}</span>
              ${redDone?`<span style="font-size:10px;font-weight:700;color:var(--red)">●${redDone}</span>`:''}
              ${ambDone?`<span style="font-size:10px;font-weight:700;color:var(--amber)">●${ambDone}</span>`:''}
              ${whtDone?`<span style="font-size:10px;font-weight:700;color:var(--dim)">●${whtDone}</span>`:''}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:5px">
              ${Object.entries(bySphere).map(([sn,cnt])=>`<span style="font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);border:1px solid var(--line2);padding:1px 6px">${sn} ${cnt}</span>`).join('')}
            </div>
          </div>`:''}
          ${entry&&entry.note?`<div style="padding:7px 12px"><div style="font-size:13px;color:var(--body);line-height:1.5;font-weight:300">${entry.note}</div></div>`:''}
        </div>`;
      });
    }
    h+='</div>';
  }

  // ОЦЕНКА ДНЯ — floating bar above nav (always visible)
  {
    const dlb=gdl();
    if(S.dayNoteOpen){
      h+=`<div class="day-bar-note open">
        <textarea class="day-note" style="min-height:44px;margin:0" placeholder="Заметка дня..." onchange="saveNote(this.value)">${dlb.note||''}</textarea>
      </div>`;
    }
    h+=`<div class="day-bar">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;flex-shrink:0">ДЕНЬ</span>
      <div class="day-bar-scores">`;
    for(let i=1;i<=10;i++)h+=`<button class="day-bar-btn ${dlb.rating===i?'sel':''}" onclick="setRating(${i})">${i}</button>`;
    h+=`</div>
      <button onclick="S.dayNoteOpen=!S.dayNoteOpen;render()" style="background:none;border:1px solid var(--line2);color:${S.dayNoteOpen?'var(--amber)':'var(--dim)'};padding:4px 8px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;flex-shrink:0">✎</button>
      <button onclick="S.tab='diary';render()" style="background:none;border:none;color:var(--dim);font-size:14px;padding:0 2px;flex-shrink:0" title="Дневник">▤</button>
    </div>`;
  }

  // POMODORO FLOATING BUTTON (always visible)
  {
    const cfg=gPomoSettings();
    if(S.pomo.on){
      h+=`<button id="pomo-fab" class="pomo-fab ${S.pomo.phase==='focus'?'active':'brk'}" onclick="togglePomoPanel()">
        <span class="pomo-fab-t" id="pomo-fab-t" style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;line-height:1">${ft(S.pomo.left)}</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;opacity:.7">${S.pomo.phase==='focus'?'ФОКУС':'ПАУЗА'}</span>
      </button>`;
    } else {
      h+=`<button id="pomo-fab" class="pomo-fab" onclick="togglePomoPanel()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="10" cy="11" r="7"/><polyline points="10,8 10,11 12,13"/><line x1="7" y1="2" x2="10" y2="4"/><line x1="13" y1="2" x2="10" y2="4"/></svg>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;line-height:1;margin-top:2px">${cfg.work}м</span>
      </button>`;
    }
  }

  // BOTTOM NAV
  const tabs=[['today','ШТАБ'],['health','ЗДОРОВЬЕ'],['biz','БИЗНЕС'],['fin','ФИНАНСЫ'],['rel','СЕМЬЯ'],['dev','РАЗВИТИЕ'],['goals','ЦЕЛИ']];
  h+='<nav class="bnav">';
  tabs.forEach(([id,lbl])=>{const on=S.tab===id;h+=`<button class="bn ${on?'on':''}" onclick="S.tab='${id}';render()"><span class="bn-ico" style="color:${on?'var(--red)':'var(--muted)'}">${TAB_ICONS[id]}</span><span class="bn-lbl">${lbl}</span></button>`;});
  h+='</nav>';

  document.getElementById('app').innerHTML=h;
}

function checkInstall(){
  if(window.matchMedia('(display-mode: standalone)').matches)return;
  if(localStorage.getItem('pwa_dismissed'))return;
  const banner=document.createElement('div');
  banner.style.cssText='position:fixed;bottom:64px;left:12px;right:12px;background:#1e1e1e;border:1px solid #e02030;padding:12px 14px;z-index:300;display:flex;align-items:center;gap:10px';
  banner.innerHTML=`<div style="flex:1;font-size:12px;color:#eee;line-height:1.4">Добавь на рабочий стол</div><button onclick="localStorage.setItem('pwa_dismissed','1');this.parentNode.remove()" style="background:transparent;border:1px solid #666;color:#666;padding:5px 10px;font-size:11px;flex-shrink:0">✕</button>`;
  document.body.appendChild(banner);
}

loadState();
render();
setTimeout(checkInstall,1500);
setInterval(()=>{const el=document.getElementById('clk');if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}},30000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
