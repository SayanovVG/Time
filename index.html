<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111827">
  <title>Фитнес Трекер v10-cardio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #111827 0%, #1f2937 50%, #111827 100%);
      min-height: 100vh;
      color: white;
      padding: 16px;
      padding-bottom: 32px;
    }
    input { font-size: 16px !important; font-family: inherit; }
    input:focus { outline: none; border-color: #3b82f6 !important; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
    button { font-family: inherit; cursor: pointer; border: none; }
    button:active { transform: scale(0.96); }

    /* Clock */
    .clock-row { display: flex; justify-content: flex-end; padding: 0 2px; margin-bottom: 6px; }
    .clock-display { color: #f1f5f9; font-size: 18px; font-weight: 800; letter-spacing: 2px; font-variant-numeric: tabular-nums; }

    /* Tab buttons */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
    .tab-btn.active-training { background: linear-gradient(to right, #3b82f6, #8b5cf6); color: white; }
    .tab-btn.active-nutrition { background: linear-gradient(to right, #22c55e, #10b981); color: white; }
    .tab-btn.inactive { background: rgba(55, 65, 81, 0.6); color: #d1d5db; }

    /* Header card */
    .header-card { border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
    .header-card.week-1-2 { background: linear-gradient(to right, #3b82f6, #2563eb); }
    .header-card.week-3-4 { background: linear-gradient(to right, #a855f7, #7c3aed); }
    .header-card.week-5-6 { background: linear-gradient(to right, #ef4444, #dc2626); }
    .header-card.week-7 { background: linear-gradient(to right, #22c55e, #16a34a); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .header-title { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
    .header-subtitle { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .header-info { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .header-day { font-size: 30px; font-weight: 900; text-align: right; }
    .header-day-label { font-size: 12px; color: rgba(255,255,255,0.7); text-align: right; }
    .day-buttons { display: flex; gap: 8px; }
    .day-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 700; transition: all 0.2s; }
    .day-btn.active { background: white; color: #111827; }
    .day-btn.inactive { background: rgba(255,255,255,0.2); color: white; }

    /* Exercise card */
    .exercise-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .exercise-name { font-weight: 700; font-size: 14px; }
    .exercise-info { font-size: 12px; color: #d1d5db; margin-top: 4px; }
    .exercise-info .yellow { color: #facc15; }
    .exercise-info .custom-tag { color: #a78bfa; font-size: 11px; font-weight: 600; }
    .exercise-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge-done { background: linear-gradient(to right, #22c55e, #10b981); color: white; font-size: 12px; padding: 4px 12px; border-radius: 9999px; font-weight: 700; animation: pulse 2s infinite; }
    .hint-btn { background: rgba(59,130,246,0.3); color: #93c5fd; font-size: 12px; padding: 4px 8px; border-radius: 9999px; display: flex; align-items: center; gap: 4px; }
    .hint-box { background: rgba(30,58,138,0.3); border: 1px solid rgba(59,130,246,0.3); border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 12px; color: #bfdbfe; }
    .hint-title { font-weight: 700; color: #93c5fd; margin-bottom: 4px; }

    /* Set row */
    .set-row { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 6px; margin-bottom: 8px; transition: all 0.2s; }
    .set-row.incomplete { background: rgba(55,65,81,0.4); border: 1px solid rgba(75,85,99,0.4); }
    .set-row.complete { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); }
    .set-content { flex: 1; }
    .set-label { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
    .set-inputs { display: flex; gap: 8px; }
    .set-input { width: 80px; padding: 6px 8px; font-size: 12px; border: 1px solid #6b7280; border-radius: 6px; background: #1f2937; color: white; }
    .set-input.small { width: 64px; }
    .check-btn { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .check-btn.incomplete { background: #4b5563; color: #d1d5db; }
    .check-btn.complete { background: #22c55e; color: white; }

    /* Week navigation */
    .week-nav { display: flex; gap: 8px; margin-bottom: 24px; }
    .week-btn { display: flex; align-items: center; gap: 8px; background: rgba(55,65,81,0.6); color: white; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 700; transition: all 0.2s; }
    .week-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .week-current { flex: 1; background: linear-gradient(to right, #9333ea, #db2777); color: white; padding: 10px 16px; border-radius: 8px; font-weight: 700; text-align: center; font-size: 14px; }
    .next-week-btn { width: 100%; background: linear-gradient(to right, #22c55e, #10b981, #14b8a6); color: white; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 18px; margin-bottom: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
    .final-week { background: linear-gradient(to right, #eab308, #f97316, #ef4444); color: white; padding: 16px; border-radius: 8px; text-align: center; font-weight: 900; margin-bottom: 24px; animation: pulse 2s infinite; }

    /* Nutrition */
    .macros-card { background: linear-gradient(to right, #16a34a, #10b981); border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
    .macros-label { font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 8px; font-weight: 500; }
    .macros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .macro-item { text-align: center; }
    .macro-value { font-size: 24px; font-weight: 900; }
    .macro-goal { font-size: 12px; color: rgba(255,255,255,0.7); }
    .macro-bar { height: 6px; background: rgba(255,255,255,0.2); border-radius: 9999px; margin-top: 4px; overflow: hidden; }
    .macro-bar-fill { height: 100%; background: white; border-radius: 9999px; transition: width 0.3s; }
    .recipe-box { background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.4); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
    .recipe-title { font-size: 12px; font-weight: 700; color: #d8b4fe; margin-bottom: 4px; }
    .recipe-text { font-size: 12px; color: #e9d5ff; }
    .section-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-title { font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-count { font-size: 12px; color: #9ca3af; }
    .meal-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
    .meal-row.incomplete { background: rgba(55,65,81,0.4); border: 1px solid rgba(75,85,99,0.4); }
    .meal-row.complete { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); }
    .meal-icon { font-size: 20px; }
    .meal-content { flex: 1; }
    .meal-name { font-size: 14px; font-weight: 500; }
    .meal-time { font-size: 12px; color: #9ca3af; margin-left: 8px; }
    .meal-items { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .meal-macros { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .meal-check { width: 24px; height: 24px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; }
    .meal-check.incomplete { background: #4b5563; }
    .meal-check.complete { background: #22c55e; }
    .buy-tag { background: rgba(234,179,8,0.3); color: #fde047; font-size: 12px; padding: 2px 8px; border-radius: 9999px; margin-left: 8px; }
    .shopping-box { background: rgba(234,179,8,0.2); border: 1px solid rgba(234,179,8,0.4); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
    .shopping-title { font-size: 12px; font-weight: 700; color: #fde047; margin-bottom: 4px; }
    .shopping-text { font-size: 12px; color: #fef08a; }
    .reset-btn { width: 100%; background: rgba(127,29,29,0.3); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 500; margin-top: 16px; }

    /* Timer overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .timer-card { position: relative; border-radius: 24px; padding: 28px 24px 24px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 4px solid rgba(255,255,255,0.2); margin: 16px; background: linear-gradient(135deg, #dc2626, #ea580c); }
    .timer-close { position: absolute; top: 14px; right: 16px; background: none; color: rgba(255,255,255,0.7); font-size: 24px; }
    .timer-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
    .timer-icon { font-size: 32px; }
    .timer-label { font-size: 16px; color: rgba(255,255,255,0.85); font-weight: 600; }
    .timer-time { font-size: 76px; font-weight: 900; margin-bottom: 4px; font-variant-numeric: tabular-nums; line-height: 1; }
    .timer-time.warning { color: #fde047; }
    .timer-exercise { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 14px; max-width: 210px; margin-left: auto; margin-right: auto; }
    .timer-progress { width: 240px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 9999px; margin: 0 auto 18px; overflow: hidden; }
    .timer-progress-fill { height: 100%; border-radius: 9999px; transition: width 1s linear; }
    .timer-progress-fill.normal { background: white; }
    .timer-progress-fill.warning { background: #facc15; }

    /* +/- кнопки */
    .timer-adjust-row { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 10px; }
    .timer-adjust-btn { width: 56px; height: 42px; border-radius: 10px; background: rgba(255,255,255,0.15); color: white; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
    .timer-adjust-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.93); }
    .timer-adjust-label { font-size: 11px; color: rgba(255,255,255,0.5); margin: 0 2px; }

    /* Кнопка сохранить */
    .timer-save-row { min-height: 30px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    .timer-save-btn { background: rgba(255,255,255,0.93); color: #1e293b; padding: 6px 18px; border-radius: 20px; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .timer-save-btn:active { background: white; }
    .timer-saved-text { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; animation: pulse 1s; }

    .timer-skip { background: rgba(255,255,255,0.18); color: white; padding: 8px 24px; border-radius: 8px; font-weight: 700; font-size: 14px; }
    .timer-skip:active { background: rgba(255,255,255,0.3); }

    /* Completion overlay */
    .completion-card { background: linear-gradient(135deg, #22c55e, #10b981, #14b8a6); border-radius: 24px; padding: 32px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 4px solid rgba(255,255,255,0.2); margin: 16px; animation: bounce 1s; }
    .completion-icon { font-size: 80px; margin-bottom: 16px; }
    .completion-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .completion-subtitle { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 16px; }
    .completion-saved { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
    .completion-btn { background: white; color: #16a34a; padding: 12px 32px; border-radius: 12px; font-weight: 700; font-size: 18px; }

    /* Rest day */
    .rest-day { text-align: center; padding: 48px 0; }
    .rest-icon { font-size: 60px; margin-bottom: 16px; }
    .rest-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .rest-subtitle { color: #9ca3af; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Main tabs */
    .main-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .main-tab {
      padding: 14px 8px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      text-align: center;
      background: rgba(55, 65, 81, 0.5);
      color: #9ca3af;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .main-tab.active {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    .main-tab-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    
    /* Tab content */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Cardio styles */
    .cardio-activity {
      background: rgba(31, 41, 55, 0.8);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(75, 85, 99, 0.5);
    }
    .cardio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .cardio-type {
      font-weight: 700;
      font-size: 15px;
      color: #f1f5f9;
    }
    .cardio-details {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .cardio-calories {
      font-size: 18px;
      font-weight: 700;
      color: #22c55e;
    }
    .delete-btn {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .empty-icon { font-size: 64px; opacity: 0.3; margin-bottom: 16px; }
    .empty-text { font-size: 16px; }

  </style>
</head>
<body>
  <div id="app"></div>


  </div>

  <!-- Cardio tab -->
  <div id="tab-cardio" class="tab-content">
    <div style="background: rgba(31, 41, 55, 0.8); border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1);">
      <div style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #f1f5f9;">🏃 Кардио активности</div>
      <button onclick="showAddCardio()" style="width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 15px; background: linear-gradient(135deg, #22c55e, #10b981); color: white; cursor: pointer;">
        + Добавить активность
      </button>
    </div>
    <div id="cardio-list"></div>
  </div>


  <script>
    // ==================== PROGRAM DATA ====================
    const PROGRAM = {
      1: {
        name: 'СПИНА + БИЦЕПС',
        exercises: [
          { id: 1, name: 'Тяга к поясу (#8)', reps: 12, pause: 150, hint: 'Сядь, упрись грудью в подушку. Тяни рукоять к животу, сводя лопатки. Локти вдоль корпуса.' },
          { id: 2, name: 'Вертикальная тяга (#7)', reps: 12, pause: 150, hint: 'Хват широкий. Тяни к верху груди, сводя лопатки вниз. Корпус слегка отклонён назад.' },
          { id: 3, name: 'Подтягивания широким хватом', reps: null, pause: 180, hint: 'Широкий хват, ладони от себя. Тянись грудью к перекладине. Делай максимум.' },
          { id: 18, name: 'Face Pulls (резинка)', reps: 15, pause: 60, hint: 'Тяни к лицу, разводя руки. Локти выше кистей! Лопатки сведены.' },
          { id: 4, name: 'Подтягивания узким обратным хватом', reps: 10, pause: 120, hint: 'Узкий хват, ладони к себе. Тяни подбородок к перекладине.' },
          { id: 5, name: 'Сгибание рук резинка', reps: 15, pause: 60, hint: 'Встань на резинку. Локти прижаты. Сгибай к плечам, медленно опускай.' }
        ]
      },
      3: {
        name: 'НОГИ + ПРЕСС',
        exercises: [
          { id: 6, name: 'Жим ногами (#3)', reps: 12, pause: 180, hint: 'Стопы на ширине плеч. Опускай до 90° в коленях. Жми пятками.' },
          { id: 19, name: 'Комбо лифт — становая (#6)', reps: 10, pause: 150, hint: 'Спина ПРЯМАЯ! Мощно выпрямись ногами и спиной.' },
          { id: 21, name: 'Приседания (#5)', reps: 10, pause: 150, hint: 'Ноги на ширине плеч. Опускайся до параллели. Спина прямая.' },
          { id: 7, name: 'Разгибание ноги (#1)', reps: 12, pause: 90, hint: 'Разгибай полностью, пауза 1 сек вверху. Опускай плавно.' },
          { id: 8, name: 'Сгибание ноги (#2)', reps: 12, pause: 90, hint: 'Сгибай до касания ягодиц. Не отрывай таз.' },
          { id: 22, name: 'Подъёмы на носки', reps: 15, pause: 60, hint: 'Поднимайся на носки максимально высоко. Пауза вверху 1 сек.' },
          { id: 9, name: 'Пресс (#15)', reps: 15, pause: 60, hint: 'Скручивайся, отрывая лопатки. Не тяни шею руками.' },
          { id: 20, name: 'Гиперэкстензия (#15)', reps: 12, pause: 60, hint: 'Опускайся до 90°. Поднимайся до линии с ногами. Сжимай ягодицы.' }
        ]
      },
      5: {
        name: 'ГРУДЬ + ПЛЕЧИ + ТРИЦЕПС',
        exercises: [
          { id: 11, name: 'Жим от груди (#10)', reps: 12, pause: 150, hint: 'Жми на уровне сосков. Локти под 45°.' },
          { id: 12, name: 'Жим плеча сидя (#9)', reps: 12, pause: 150, hint: 'Жми вверх, не выпрямляя локти до конца.' },
          { id: 13, name: 'Боковые разведения рез', reps: 15, pause: 60, hint: 'Руки в стороны до уровня плеч. Мизинец выше большого пальца.' },
          { id: 14, name: 'Жим плеча рез (стоя)', reps: 12, pause: 60, hint: 'Жми вверх. Корпус стабилен.' },
          { id: 15, name: 'Трицепс сидя (#14)', reps: 10, pause: 90, hint: 'Разгибай руки полностью, сжимай трицепс.' },
          { id: 16, name: 'Отжимания на брусьях', reps: null, pause: 150, hint: 'Опускайся до 90° в локтях. Корпус наклонён вперёд.' },
          { id: 17, name: 'Разгибание рук рез', reps: 15, pause: 45, hint: 'Локти прижаты. Разгибай до полного выпрямления.' }
        ]
      }
    };

    const WEEK_CONFIGS = {
      1: { name: 'Адаптация', sets: 3, reps: '12', cssClass: 'week-1-2' },
      2: { name: 'Адаптация', sets: 3, reps: '12', cssClass: 'week-1-2' },
      3: { name: 'Кумуляция объёма', sets: 4, reps: '8-10', cssClass: 'week-3-4' },
      4: { name: 'Кумуляция объёма', sets: 4, reps: '8-10', cssClass: 'week-3-4' },
      5: { name: 'ПИК объёма', sets: 4, reps: '8-10', cssClass: 'week-5-6' },
      6: { name: 'ПИК объёма', sets: 4, reps: '8-10', cssClass: 'week-5-6' },
      7: { name: 'Разгрузка', sets: 3, reps: '10-12', cssClass: 'week-7' }

    async function playGong() {
      try {
        const ctx = getAudioCtx();
        const buffer = await loadGong();
        if (!buffer) return;
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.8;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0);
      } catch(e) { console.error('Gong play error:', e); }
    }

    // === БОКСЁРСКИЙ ЗВОНОК с эскалацией громкости ===
    function playBoxingBell(volumeMultiplier = 1.0) {
      try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;

        // --- Удар молотком: короткий белый шум с быстрым спадом ---
        const hitLen = ctx.sampleRate * 0.025;
        const hitBuf = ctx.createBuffer(1, hitLen, ctx.sampleRate);
        const hitData = hitBuf.getChannelData(0);
        for (let i = 0; i < hitLen; i++) {
          hitData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / hitLen, 20);
        }
        const hitSrc = ctx.createBufferSource();
        hitSrc.buffer = hitBuf;
        const hitHP = ctx.createBiquadFilter();
        hitHP.type = 'highpass';
        hitHP.frequency.value = 2000;
        const hitGain = ctx.createGain();
        hitGain.gain.value = 0.7 * volumeMultiplier;
        hitSrc.connect(hitHP);
        hitHP.connect(hitGain);
        hitGain.connect(ctx.destination);
        hitSrc.start(now);

        // --- Основной тон колокола: 1050Hz + металлические обертоны ---
        const bellFreqs = [
          { freq: 1050, amp: 0.35, decay: 1.4 },
          { freq: 2100, amp: 0.18, decay: 1.0 },
          { freq: 3150, amp: 0.10, decay: 0.7 },
          { freq: 4200, amp: 0.05, decay: 0.5 },
          { freq: 525,  amp: 0.12, decay: 1.2 },
        ];

        bellFreqs.forEach(({ freq, amp, decay }) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.linearRampToValueAtTime(amp * volumeMultiplier, now + 0.003);
          gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + decay + 0.05);
        });

        // --- Металлический shimmer ---
        [-2, 2].forEach((det) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = 1050 + det;
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.linearRampToValueAtTime(0.08 * volumeMultiplier, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 1.2);
        });
      } catch(e) { console.error('Bell error:', e); }
    }

    // === ОБРАТНЫЙ ОТСЧЁТ с нарастающей громкостью ===
    function playCountdown() {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const volume = 0.25 + (i / 9) * 0.75; // 25% → 100%
          playBoxingBell(volume);
        }, i * 1000);
      }
    }

    function playBeep() {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

    // ==================== TIMER ====================
    let timerInterval = null;
    let lastBeepTime = null;

    function startTimer(seconds, exercise, exId) {
      state.timer = { active: true, timeLeft: seconds, maxTime: seconds, exercise, exId: exId, modified: false, saved: false };
      lastBeepTime = null;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        state.timer.timeLeft--;
        if (state.timer.timeLeft === 10 && lastBeepTime !== 10) {
          playCountdown(); 
          lastBeepTime = 10;
        }
        if (state.timer.timeLeft <= 0) { playGong(); stopTimer(); }
        render();
      }, 1000);
      render();
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      state.timer = { active: false, timeLeft: 0, maxTime: 0, exercise: '', exId: null, modified: false, saved: false };
      render();
    }

    function adjustTimer(delta) {
      const newTimeLeft = state.timer.timeLeft + delta;
      const newMaxTime = state.timer.maxTime + delta;
      if (newTimeLeft >= 5 && newMaxTime >= 5 && newMaxTime <= 600) {
        state.timer.timeLeft = newTimeLeft;
        state.timer.maxTime = newMaxTime;
        state.timer.modified = true;
        state.timer.saved = false;
        render();
      }
    }

    function saveTimerPause() {
      if (state.timer.exId !== null) {
        state.customPauses[state.timer.exId] = state.timer.maxTime;
        state.timer.modified = false;
        state.timer.saved = true;
        saveData();
        render();
        setTimeout(() => {
          if (state.timer.active) { state.timer.saved = false; render(); }
        }, 2200);
      }
    }

    // ==================== HELPERS ====================
    function getWeekConfig() { return WEEK_CONFIGS[state.currentWeek]; }
    function getTodayKey() { const d = new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
    function getExerciseData(exId) {
      const key = 'w'+state.currentWeek+'_ex'+exId;
      return state.workoutData[key] || { sets: [] };
    }
    function formatPause(sec) { return sec >= 120 ? (sec/60)+' мин' : sec+'с'; }
    function formatTime(sec) {
      const m = Math.floor(sec / 60), s = sec % 60;
      return m > 0 ? m+':'+(s<10?'0':'')+s : ''+s;
    }
    function getTodayNutrition() { return state.nutritionData[getTodayKey()] || { meals: {}, supplements: {} }; }
    function calculateMacros() {
      const today = getTodayNutrition();
      let p=0, f=0, c=0;
      MEALS.forEach(m => { if (today.meals[m.id]) { p+=m.protein; f+=m.fat; c+=m.carbs; } });
      return { protein: p, fat: f, carbs: c };
    }
    function getPauseForEx(exId, defaultPause) {
      return state.customPauses[exId] !== undefined ? state.customPauses[exId] : defaultPause;
    }

    // ==================== ACTIONS ====================
    function updateSet(exId, setIdx, field, value) {
      const key = 'w'+state.currentWeek+'_ex'+exId;
      if (!state.workoutData[key]) state.workoutData[key] = { sets: [] };
      while (state.workoutData[key].sets.length <= setIdx) {
        state.workoutData[key].sets.push({ weight: '', reps: '', completed: false });
      }
      state.workoutData[key].sets[setIdx][field] = value;
      saveData();
    }

    function toggleComplete(exId, setIdx, exerciseIdx, dayKey, isLastSet, isLastExercise) {
      const exercise = PROGRAM[dayKey].exercises[exerciseIdx];
      const key = 'w'+state.currentWeek+'_ex'+exId;
      if (!state.workoutData[key]) state.workoutData[key] = { sets: [] };
      while (state.workoutData[key].sets.length <= setIdx) {
        state.workoutData[key].sets.push({ weight: '', reps: '', completed: false });
      }
      const wasCompleted = state.workoutData[key].sets[setIdx].completed;
      state.workoutData[key].sets[setIdx].completed = !wasCompleted;

      if (!wasCompleted) {
        if (isLastSet && isLastExercise) {
          state.showCompletion = true;
        } else if (!isLastSet) {
          const pauseTime = getPauseForEx(exId, exercise.pause);
          startTimer(pauseTime, exercise.name, exId);
          // copy weight/reps to next set
          const curr = state.workoutData[key].sets[setIdx];
          if (!state.workoutData[key].sets[setIdx + 1]) {
            state.workoutData[key].sets[setIdx + 1] = { weight: '', reps: '', completed: false };
          }
          if (curr.weight) state.workoutData[key].sets[setIdx + 1].weight = curr.weight;
          if (curr.reps) state.workoutData[key].sets[setIdx + 1].reps = curr.reps;
        }
        // после последнего сета НЕпоследнего упражнения — таймер не запускается
      }
      saveData();
      render();
    }

    function toggleMeal(mealId) {
      const key = getTodayKey();
      if (!state.nutritionData[key]) state.nutritionData[key] = { meals: {}, supplements: {} };

    function toggleSupplement(suppId) {

    function goToNextWeek() {

      // ==================== TRAINING TAB ====================
      } else {

      // Reset

      document.getElementById('app').innerHTML = html;
    }

    // ==================== INIT ====================
    loadData();

    setInterval(() => {

    }, 1000);
  
// CARDIO
const CT={'run-interval':{n:'🏃 Интервал',c:12},'run-easy':{n:'🏃 Легкий',c:10},'swim':{n:'🏊 Плавание',c:11},'bike':{n:'🚴 Велосипед',c:8},'rowing':{n:'🚣 Гребля',c:11}};

function showAddCardio(){document.getElementById('cardio-modal').style.display='flex';document.getElementById('cardio-distance').value='';document.getElementById('cardio-time').value='';document.getElementById('cardio-calc-cal').textContent='—';document.getElementById('cardio-distance').oninput=updateCardioCalc;document.getElementById('cardio-time').oninput=updateCardioCalc;document.getElementById('cardio-type').onchange=updateCardioCalc;}
function closeCardioModal(){document.getElementById('cardio-modal').style.display='none';}
function updateCardioCalc(){const t=document.getElementById('cardio-type').value;const d=parseFloat(document.getElementById('cardio-distance').value)||0;const m=parseFloat(document.getElementById('cardio-time').value)||0;if(d&&m){const c=Math.round(m*CT[t].c);document.getElementById('cardio-calc-cal').textContent=c+' ккал';}}
function saveCardio(){const t=document.getElementById('cardio-type').value;const d=parseFloat(document.getElementById('cardio-distance').value);const m=parseFloat(document.getElementById('cardio-time').value);if(!d||!m){alert('Заполни поля');return;}const c=Math.round(m*CT[t].c);if(!state.cardio)state.cardio=[];state.cardio.push({id:Date.now(),type:t,distance:d,time:m,calories:c,date:new Date().toISOString().split('T')[0]});saveState();closeCardioModal();renderCardio();}
function deleteCardio(id){if(confirm('Удалить?')){state.cardio=state.cardio.filter(x=>x.id!==id);saveState();renderCardio();}}
function renderCardio(){const today=new Date().toISOString().split('T')[0];const acts=(state.cardio||[]).filter(x=>x.date===today);const c=document.getElementById('cardio-list');if(!acts.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">🏃</div><div class="empty-text">Нет активностей</div></div>';return;}const tot=acts.reduce((s,x)=>s+x.calories,0);c.innerHTML='<div style="background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);border-radius:12px;padding:16px;margin-bottom:16px;"><div style="font-size:13px;color:#93c5fd;">За сегодня:</div><div style="font-size:32px;font-weight:900;color:#60a5fa;">'+tot+' ккал</div></div>'+acts.map(a=>'<div class="cardio-activity"><div class="cardio-header"><div><div class="cardio-type">'+CT[a.type].n+'</div><div class="cardio-details">'+a.distance+' км · '+a.time+' мин</div></div><div><div class="cardio-calories">'+a.calories+' ккал</div><button onclick="deleteCardio('+a.id+')" class="delete-btn">🗑️</button></div></div></div>').join('');}

  </script>

  <!-- Cardio Modal -->
  <div id="cardio-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; padding: 20px; overflow-y: auto;">
    <div style="max-width: 500px; margin: 40px auto; background: #1f2937; border-radius: 20px; padding: 24px; border: 2px solid rgba(75, 85, 99, 0.5);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="font-size: 20px; font-weight: 700; color: #f1f5f9;">Добавить активность</h3>
        <button onclick="closeCardioModal()" style="width: 32px; height: 32px; border-radius: 8px; background: rgba(55, 65, 81, 0.6); color: #d1d5db; font-size: 20px; cursor: pointer;">×</button>
      </div>
      
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 8px;">Тип</label>
        <select id="cardio-type" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(17, 24, 39, 0.6); border: 2px solid rgba(75, 85, 99, 0.5); color: white; font-size: 15px;">
          <option value="run-interval">🏃 Бег интервальный</option>
          <option value="run-easy">🏃 Бег легкий</option>
          <option value="swim">🏊 Плавание</option>
          <option value="bike">🚴 Велосипед</option>
          <option value="rowing">🚣 Гребля</option>
        </select>
      </div>
      
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 8px;">Дистанция (км)</label>
        <input type="number" step="0.1" id="cardio-distance" placeholder="5.0" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(17, 24, 39, 0.6); border: 2px solid rgba(75, 85, 99, 0.5); color: white; font-size: 15px;">
      </div>
      
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 8px;">Время (мин)</label>
        <input type="number" id="cardio-time" placeholder="30" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(17, 24, 39, 0.6); border: 2px solid rgba(75, 85, 99, 0.5); color: white; font-size: 15px;">
      </div>
      
      <div style="padding: 16px; background: rgba(59,130,246,0.1); border-radius: 12px; margin-bottom: 20px; text-align: center;">
        <div style="font-size: 13px; color: #9ca3af; margin-bottom: 4px;">Калорий:</div>
        <div style="font-size: 28px; font-weight: 700; color: #3b82f6;" id="cardio-calc-cal">—</div>
      </div>
      
      <button onclick="saveCardio()" style="width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 15px; background: linear-gradient(135deg, #22c55e, #10b981); color: white; cursor: pointer;">✅ Сохранить</button>
    </div>
  </div>

</body>
</html>
