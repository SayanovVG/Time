<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1917">
<link rel="manifest" href="./manifest.json">
<title>MAX TIME</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--a:#c97a45;--a15:rgba(201,122,69,.15);--a30:rgba(201,122,69,.30);--a40:rgba(201,122,69,.40)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Oswald',sans-serif;background:#1a1917;min-height:100vh;color:#f0ede8;padding-bottom:40px;overflow-x:hidden}
input,button{font-family:'Oswald',sans-serif}
input{font-size:16px!important}
input:focus{outline:none}
button{cursor:pointer;border:none}
button:active{opacity:.8}

/* STICKY TOP */
.sticky-top{position:sticky;top:0;z-index:90;background:#1a1917}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #2a2825}
.topbar-left{display:flex;align-items:center;gap:10px}
.week-badge{width:36px;height:36px;background:var(--a);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;flex-shrink:0}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:#f0ede8;line-height:1}
.topbar-sub{font-size:12px;color:#888884;letter-spacing:1px;margin-top:1px;font-weight:600}
.clock{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#f0ede8;letter-spacing:2px}

/* TABS */
.tabs{display:flex;border-bottom:2px solid #2a2825}
.tab-btn{flex:1;padding:11px 4px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;background:none;color:#555450;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{color:var(--a);border-bottom-color:var(--a)}

/* CONTENT */
.content{padding:0 14px}

/* HEADER CARD */
.hdr{padding:16px 0 14px;border-bottom:1px solid #2a2825;margin-bottom:14px}
.hdr-label{font-size:11px;color:#888884;letter-spacing:2px;margin-bottom:3px}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--a);letter-spacing:1px;line-height:1.1}
.day-btns{display:flex;gap:8px;margin-top:12px}
.day-btn{flex:1;padding:9px 4px;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;border:1px solid #3a3733;background:none;color:#888884;transition:all .2s}
.day-btn.active{background:var(--a);border-color:var(--a);color:#fff}

/* EXERCISE CARD */
.ex-card{background:#242220;border:1px solid #2e2c29;border-radius:3px;margin-bottom:10px;overflow:hidden}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 12px 8px}
.ex-name{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px;color:#f0ede8}
.ex-meta{font-size:12px;color:#888884;letter-spacing:1px;margin-top:2px;font-weight:600}
.ex-meta .hl{color:var(--a)}
.ex-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge-done{border:1px solid var(--a);color:var(--a);font-family:'Bebas Neue',sans-serif;font-size:12px;padding:2px 8px;letter-spacing:1px}
.hint-btn{background:var(--a15);border:1px solid var(--a30);color:var(--a);font-size:11px;padding:3px 8px;border-radius:2px}
.hint-box{background:#1e1c1a;border-left:2px solid var(--a);padding:10px 12px;margin-bottom:8px}
.hint-t{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--a);letter-spacing:1px;margin-bottom:3px}
.hint-txt{font-size:12px;color:#aaa8a4;line-height:1.6}

/* SET ROW */
.set-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid #2a2825;transition:background .2s}
.set-row.done-row{background:rgba(201,122,69,.08)}
.set-lbl{font-family:'Bebas Neue',sans-serif;font-size:15px;color:#555450;width:24px;flex-shrink:0}
.set-row.done-row .set-lbl{color:var(--a)}
.set-inputs{flex:1;display:flex;gap:6px}
.set-inp{background:#1a1917;border:1px solid #3a3733;color:#f0ede8;padding:7px 8px;font-size:14px;width:76px;border-radius:2px}
.set-inp::placeholder{color:#444240}
.set-inp:focus{border-color:var(--a)}
.set-inp.done-inp{border-color:var(--a40)}
.chk-btn{width:34px;height:34px;border-radius:2px;border:1px solid #3a3733;background:#1a1917;color:#555450;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk-btn.checked{background:var(--a);border-color:var(--a);color:#fff}

/* TIMER ROW */
.tmr-row{padding:0 12px 12px}
.tmr-start{width:100%;background:var(--a);color:#fff;border:none;padding:11px;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:8px}

/* WEEK NAV */
.week-nav{display:flex;gap:8px;margin:14px 0}
.wn-btn{background:#242220;border:1px solid #3a3733;color:#888884;padding:10px 12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;border-radius:2px}
.wn-btn:disabled{opacity:.3;cursor:default}
.wn-cur{flex:1;background:#242220;border:1px solid var(--a);color:var(--a);padding:10px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;border-radius:2px;text-align:center}
.next-wk{width:100%;background:var(--a);color:#fff;border:none;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;border-radius:2px;margin-bottom:14px}
.final-wk{background:var(--a15);border:1px solid var(--a);padding:14px;text-align:center;margin-bottom:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--a);letter-spacing:2px}
.rest-day{text-align:center;padding:50px 20px}
.rest-icon{font-size:56px;margin-bottom:14px}
.rest-t{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#f0ede8;letter-spacing:2px}
.rest-s{color:#888884;font-size:13px;margin-top:6px}
.reset-btn{width:100%;background:none;border:1px solid #2e2c29;color:#555450;padding:10px;font-size:12px;letter-spacing:1px;border-radius:2px;margin-top:8px}
.footer{padding:14px 14px 6px;border-top:1px solid #2a2825;margin-top:14px}
.footer-txt{font-size:12px;color:#555450;line-height:1.7;margin-bottom:10px;font-style:italic}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{border:1px solid var(--a40);color:var(--a);font-family:'Bebas Neue',sans-serif;font-size:12px;padding:2px 10px;letter-spacing:1px}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.tmr-card{background:#242220;border:2px solid var(--a);border-radius:4px;padding:26px 20px 18px;text-align:center;width:100%;max-width:320px;position:relative}
.tmr-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#888884;font-size:22px;line-height:1}
.tmr-label{font-family:'Bebas Neue',sans-serif;font-size:15px;color:#888884;letter-spacing:3px;margin-bottom:4px}
.tmr-time{font-family:'Bebas Neue',sans-serif;font-size:76px;color:#f0ede8;line-height:1;margin-bottom:4px}
.tmr-time.warn{color:var(--a)}
.tmr-ex{font-size:12px;color:#888884;margin-bottom:14px;letter-spacing:1px}
.tmr-progress{height:3px;background:#2a2825;border-radius:2px;margin-bottom:16px;overflow:hidden}
.tmr-bar{height:100%;background:var(--a);transition:width 1s linear}
.tmr-bar.warn{background:#ffaa00}
.tmr-adj{display:flex;gap:10px;justify-content:center;margin-bottom:10px}
.adj-btn{background:#1a1917;border:1px solid #3a3733;color:#f0ede8;padding:8px 16px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;border-radius:2px}
.tmr-save-row{min-height:28px;display:flex;justify-content:center;align-items:center;margin-bottom:10px}
.save-btn{background:var(--a);color:#fff;border:none;padding:6px 18px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;border-radius:2px}
.saved-txt{color:var(--a);font-size:13px;letter-spacing:1px}
.skip-btn{background:none;border:1px solid #3a3733;color:#888884;padding:9px 28px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;border-radius:2px}
.comp-card{background:#242220;border:2px solid var(--a);border-radius:4px;padding:38px 22px;text-align:center;width:100%;max-width:320px}
.comp-icon{font-size:68px;margin-bottom:14px}
.comp-t{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--a);letter-spacing:2px;margin-bottom:6px}
.comp-s{font-size:14px;color:#888884;margin-bottom:22px}
.comp-btn{background:var(--a);color:#fff;border:none;padding:11px 34px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;border-radius:2px}

/* NUTRITION */
.mac-summary{background:#242220;border:1px solid #2e2c29;border-radius:3px;padding:14px;margin:12px 0}
.mac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mac-item{text-align:center}
.mac-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#f0ede8;line-height:1}
.mac-val.over{color:var(--a)}
.mac-lbl{font-size:10px;color:#888884;letter-spacing:1px;margin:2px 0}
.mac-bar{height:3px;background:#2a2825;border-radius:2px;overflow:hidden;margin-top:2px}
.mac-fill{height:100%;background:var(--a);border-radius:2px;transition:width .3s}
.mac-fill.over{background:#cc3300}

.nut-sec{background:#242220;border:1px solid #2e2c29;border-radius:3px;margin-bottom:10px;overflow:hidden}
.nut-sec-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #2a2825}
.nut-sec-t{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#f0ede8;letter-spacing:2px}
.nut-sec-c{font-size:12px;color:#888884}
.search-area{padding:10px 12px}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.search-inp{flex:1;background:#1a1917;border:1px solid #3a3733;color:#f0ede8;padding:9px 10px;font-size:14px;border-radius:2px;font-family:'Oswald',sans-serif;font-weight:400}
.search-inp::placeholder{color:#444240}
.search-inp:focus{border-color:var(--a);outline:none}
.f-sel{width:100%;background:#1a1917;border:1px solid #3a3733;color:#f0ede8;padding:9px 10px;font-size:15px;border-radius:2px;margin-bottom:8px;font-family:'Oswald',sans-serif;font-weight:600;-webkit-appearance:none;appearance:none}
.f-sel:focus{border-color:var(--a);outline:none}
.manual-btn{background:none;border:1px solid #3a3733;color:#888884;padding:9px 12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;border-radius:2px;width:100%}
.search-results{margin-top:8px}
.sri{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #2a2825;cursor:pointer}
.sri:last-child{border-bottom:none}
.sri-name{font-size:13px;color:#f0ede8;font-weight:500}
.sri-mac{font-size:11px;color:#888884;margin-top:1px}
.sri-arr{color:var(--a);font-size:20px}
.srch-status{text-align:center;color:#888884;font-size:12px;padding:14px 0;letter-spacing:1px}
.portion-form{background:#1a1917;border:1px solid var(--a);border-radius:2px;padding:12px;margin-top:4px}
.pf-t{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--a);letter-spacing:1px;margin-bottom:4px}
.pf-prev{font-size:12px;color:var(--a);min-height:16px;letter-spacing:1px;margin-bottom:8px}
.f-lbl{font-size:11px;color:#888884;letter-spacing:1px;margin-bottom:3px}
.f-inp{width:100%;background:#242220;border:1px solid #3a3733;color:#f0ede8;padding:8px 10px;font-size:16px;border-radius:2px;margin-bottom:8px}
.f-inp:focus{border-color:var(--a);outline:none}
.f-inp::placeholder{color:#444240}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.f-note{font-size:11px;color:#555450;margin-bottom:6px}
.pf-actions{display:flex;gap:8px;margin-top:4px}
.add-btn{flex:1;background:var(--a);color:#fff;border:none;padding:9px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;border-radius:2px}
.cancel-btn{background:none;border:1px solid #3a3733;color:#888884;padding:9px 14px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;border-radius:2px}
.manual-form{background:#1a1917;border:1px solid #3a3733;border-radius:2px;padding:12px;margin-top:4px}
.mf-t{font-family:'Bebas Neue',sans-serif;font-size:15px;color:#f0ede8;letter-spacing:1px;margin-bottom:6px}

.fli{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #2a2825}
.fli:last-child{border-bottom:none}
.fli-info{flex:1}
.fli-name{font-size:13px;color:#f0ede8;font-weight:500}
.fli-mac{font-size:11px;color:#888884;margin-top:1px}
.fli-del{background:none;border:none;color:#555450;font-size:20px;padding:0 4px;line-height:1}
.fli-del:active{color:var(--a)}
.empty-log{padding:14px;text-align:center;color:#555450;font-size:12px;letter-spacing:1px}

.supp-item{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #2a2825;cursor:pointer}
.supp-item:last-child{border-bottom:none}
.supp-chk{width:22px;height:22px;border:1px solid #3a3733;border-radius:2px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;transition:all .2s}
.supp-chk.checked{background:var(--a);border-color:var(--a)}
.supp-name{font-size:13px;color:#f0ede8;flex:1}
.supp-time{font-size:11px;color:#888884}
.buy-tag{font-size:10px;color:var(--a);border:1px solid var(--a40);padding:1px 6px;margin-left:6px;letter-spacing:1px}

/* ─── DESKTOP ─── */
@media(min-width:600px){
  body{display:flex;justify-content:center;background:#111110;}
  #app{max-width:480px;width:100%;background:#1a1917;box-shadow:0 0 60px rgba(0,0,0,.6);min-height:100vh;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const PROGRAM={
  1:{name:'СПИНА + БИЦЕПС',exercises:[
    {id:1,name:'Тяга к поясу (#8)',reps:12,pause:150,hint:'Сядь, упрись грудью в подушку. Тяни рукоять к животу, сводя лопатки. Локти вдоль корпуса.'},
    {id:2,name:'Вертикальная тяга (#7)',reps:12,pause:150,hint:'Хват широкий. Тяни к верху груди, сводя лопатки вниз. Корпус слегка отклонён назад.'},
    {id:3,name:'Подтягивания широким хватом',reps:null,pause:180,hint:'Широкий хват, ладони от себя. Тянись грудью к перекладине. Делай максимум.'},
    {id:18,name:'Face Pulls (резинка)',reps:15,pause:60,hint:'Тяни к лицу, разводя руки. Локти выше кистей! Лопатки сведены.'},
    {id:4,name:'Подтягивания узким обратным хватом',reps:10,pause:120,hint:'Узкий хват, ладони к себе. Тяни подбородок к перекладине.'},
    {id:5,name:'Сгибание рук резинка',reps:15,pause:60,hint:'Встань на резинку. Локти прижаты. Сгибай к плечам, медленно опускай.'}
  ]},
  3:{name:'НОГИ + ПРЕСС',exercises:[
    {id:6,name:'Жим ногами (#3)',reps:12,pause:180,hint:'Стопы на ширине плеч. Опускай до 90° в коленях. Жми пятками.'},
    {id:19,name:'Становая тяга (#6)',reps:10,pause:150,hint:'Спина ПРЯМАЯ! Мощно выпрямись ногами и спиной.'},
    {id:21,name:'Приседания (#5)',reps:10,pause:150,hint:'Ноги на ширине плеч. Опускайся до параллели. Спина прямая.'},
    {id:7,name:'Разгибание ноги (#1)',reps:12,pause:90,hint:'Разгибай полностью, пауза 1 сек вверху. Опускай плавно.'},
    {id:8,name:'Сгибание ноги (#2)',reps:12,pause:90,hint:'Сгибай до касания ягодиц. Не отрывай таз.'},
    {id:22,name:'Подъёмы на носки',reps:15,pause:60,hint:'Поднимайся на носки максимально высоко. Пауза вверху 1 сек.'},
    {id:9,name:'Пресс (#15)',reps:15,pause:60,hint:'Скручивайся, отрывая лопатки. Не тяни шею руками.'},
    {id:20,name:'Гиперэкстензия (#15)',reps:12,pause:60,hint:'Опускайся до 90°. Поднимайся до линии с ногами. Сжимай ягодицы.'}
  ]},
  5:{name:'ГРУДЬ + ПЛЕЧИ + ТРИЦЕПС',exercises:[
    {id:11,name:'Жим от груди (#10)',reps:12,pause:150,hint:'Жми на уровне сосков. Локти под 45°.'},
    {id:12,name:'Жим плеча сидя (#9)',reps:12,pause:150,hint:'Жми вверх, не выпрямляя локти до конца.'},
    {id:13,name:'Боковые разведения рез',reps:15,pause:60,hint:'Руки в стороны до уровня плеч. Мизинец выше большого пальца.'},
    {id:14,name:'Жим плеча рез (стоя)',reps:12,pause:60,hint:'Жми вверх. Корпус стабилен.'},
    {id:15,name:'Трицепс сидя (#14)',reps:10,pause:90,hint:'Разгибай руки полностью, сжимай трицепс.'},
    {id:16,name:'Отжимания на брусьях',reps:null,pause:150,hint:'Опускайся до 90° в локтях. Корпус наклонён вперёд.'},
    {id:17,name:'Разгибание рук рез',reps:15,pause:45,hint:'Локти прижаты. Разгибай до полного выпрямления.'}
  ]}
};
const WC={1:{n:'АДАПТАЦИЯ',s:3},2:{n:'АДАПТАЦИЯ',s:3},3:{n:'ОБЪЁМ',s:4},4:{n:'ОБЪЁМ',s:4},5:{n:'ПИК',s:4},6:{n:'ПИК',s:4},7:{n:'РАЗГРУЗКА',s:3}};
const DN=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

const BONUS={
  abs:{name:'ПРЕСС',sets:3,exercises:[
    {id:'b1',name:'Скручивания',reps:20,hint:'Лёжа на спине, колени согнуты. Отрывай только лопатки, не тяни шею.'},
    {id:'b2',name:'Обратные скручивания',reps:15,hint:'Лёжа на спине. Поднимай таз, скручивая поясницу к груди. Медленно опускай.'},
    {id:'b3',name:'Велосипед',reps:20,hint:'Попеременно тяни локоть к противоположному колену. Медленно, без рывков.'},
    {id:'b4',name:'Планка',reps:null,hint:'Локти под плечами. Тело — прямая линия. Не проваливай таз. Держи максимум.'},
    {id:'b5',name:'Боковая планка',reps:null,hint:'Одна рука, боковое положение. Бёдра не опускай. По 30-60 сек на каждую сторону.'},
    {id:'b6',name:'Подъём ног лёжа',reps:12,hint:'Лёжа на спине, поясница прижата к полу. Поднимай прямые ноги до 90°, медленно опускай.'}
  ]},
  posture:{name:'ОСАНКА',sets:2,exercises:[

// --- ХРАНИЛИЩЕ ---
function load(){try{const d=JSON.parse(localStorage.getItem('mt_v12')||'{}');S.wd=d.wd||{};S.week=d.week||1;S.cp=d.cp||{};}catch(e){}
  S.gs.url=localStorage.getItem('mt_gs_url')||'';
}
function sv(){try{localStorage.setItem('mt_v12',JSON.stringify({wd:S.wd,week:S.week,cp:S.cp}));}catch(e){}}
function tdk(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function gnd(){try{return JSON.parse(localStorage.getItem('mt_n_'+tdk())||'{}')}catch(e){return {};}}
function snd(d){try{localStorage.setItem('mt_n_'+tdk(),JSON.stringify(d));}catch(e){}}
function gcp(){try{return JSON.parse(localStorage.getItem('mt_cp')||'[]');}catch(e){return [];}}
function scp(p){try{localStorage.setItem('mt_cp',JSON.stringify(p));}catch(e){}}

// --- ПРОФИЛЬ ТЕЛА ---
function gprof(){try{return JSON.parse(localStorage.getItem('mt_prof')||'null');}catch(e){return null;}}
function sprof(p){try{localStorage.setItem('mt_prof',JSON.stringify(p));}catch(e){}}
function calcMacros(p){
  if(!p||!p.weight||!p.height||!p.age)return null;
  const bmr=10*p.weight+6.25*p.height-5*p.age+5;
  const act={1:1.2,2:1.375,3:1.55,4:1.725}[p.act||2]||1.375;
  const tdee=Math.round(bmr*act);
  const adj={cut:-300,maintain:0,bulk:300}[p.goal||'maintain']||0;
  const cal=tdee+adj;
  const prot=Math.round(p.weight*2.2);
  const fat=Math.round(cal*0.25/9);
  const carbs=Math.round((cal-prot*4-fat*9)/4);
  return{cal,prot,fat,carbs};
}

// --- ЭКСПОРТ / ИМПОРТ ---
function exportData(){
  const data={
    v:'mt13',
    train:{wd:S.wd,week:S.week,cp:S.cp},
    prof:gprof(),
    products:gcp(),
    days:{}
  };
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k='mt_n_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    const v=localStorage.getItem(k);
    if(v)data.days[k]=JSON.parse(v);
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='maxtime_backup_'+tdk()+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.train){S.wd=data.train.wd||{};S.week=data.train.week||1;S.cp=data.train.cp||{};sv();}
        if(data.prof)sprof(data.prof);
        if(data.products)scp(data.products);
        if(data.days){Object.entries(data.days).forEach(([k,v])=>{localStorage.setItem(k,JSON.stringify(v));});}
        alert('Данные восстановлены!');render();
      }catch(e){alert('Ошибка файла');}
    };r.readAsText(f);
  };
  document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
}

// ─── GOOGLE SHEETS SYNC ───
async function syncGS(){
  if(!S.gs.url){S.gs.setup=true;render();return;}
  S.gs.syncing=true;S.gs.err='';render();
  try{
    const data={v:'mt13',train:{wd:S.wd,week:S.week,cp:S.cp},prof:gprof(),products:gcp(),days:{}};
    for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const k='mt_n_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();const v=localStorage.getItem(k);if(v)data.days[k]=JSON.parse(v);}
    await fetch(S.gs.url,{method:'POST',mode:'no-cors',body:JSON.stringify(data),headers:{'Content-Type':'text/plain'}});
    S.gs.last=new Date().toLocaleTimeString('ru');S.gs.syncing=false;render();
  }catch(e){S.gs.err='Ошибка синхр';S.gs.syncing=false;render();}
}
async function loadGS(){
  if(!S.gs.url){S.gs.setup=true;render();return;}
  S.gs.syncing=true;S.gs.err='';render();
  try{
    const r=await fetch(S.gs.url+'?t='+Date.now());
    const data=await r.json();
    if(data.train){S.wd=data.train.wd||{};S.week=data.train.week||1;S.cp=data.train.cp||{};sv();}
    if(data.prof)sprof(data.prof);
    if(data.products)scp(data.products);
    if(data.days){Object.entries(data.days).forEach(([k,v])=>{localStorage.setItem(k,JSON.stringify(v));});}
    S.gs.last=new Date().toLocaleTimeString('ru');S.gs.syncing=false;render();
    alert('Данные загружены из облака!');
  }catch(e){S.gs.err='Ошибка загрузки';S.gs.syncing=false;render();}
}
function gsSetupSave(u){S.gs.url=u.trim();localStorage.setItem('mt_gs_url',S.gs.url);S.gs.setup=false;render();}

    async function playGong() {
      try {
        const ctx = getAudioCtx();
        const buffer = await loadGong();
        if (!buffer) return;
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.8;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0);
      } catch(e) { console.error('Gong play error:', e); }
    }

    function playBoxingBell(volumeMultiplier = 1.0) {
      try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        const hitLen = ctx.sampleRate * 0.025;
        const hitBuf = ctx.createBuffer(1, hitLen, ctx.sampleRate);
        const hitData = hitBuf.getChannelData(0);
        for (let i = 0; i < hitLen; i++) {
          hitData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / hitLen, 20);
        }
        const hitSrc = ctx.createBufferSource();
        hitSrc.buffer = hitBuf;
        const hitHP = ctx.createBiquadFilter();
        hitHP.type = 'highpass';
        hitHP.frequency.value = 2000;
        const hitGain = ctx.createGain();
        hitGain.gain.value = 0.7 * volumeMultiplier;
        hitSrc.connect(hitHP);
        hitHP.connect(hitGain);
        hitGain.connect(ctx.destination);
        hitSrc.start(now);
        const bellFreqs = [
          { freq: 1050, amp: 0.35, decay: 1.4 },
          { freq: 2100, amp: 0.18, decay: 1.0 },
          { freq: 3150, amp: 0.10, decay: 0.7 },
          { freq: 4200, amp: 0.05, decay: 0.5 },
          { freq: 525,  amp: 0.12, decay: 1.2 },
        ];
        bellFreqs.forEach(({ freq, amp, decay }) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.linearRampToValueAtTime(amp * volumeMultiplier, now + 0.003);
          gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + decay + 0.05);
        });
        [-2, 2].forEach((det) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = 1050 + det;
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.linearRampToValueAtTime(0.08 * volumeMultiplier, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 1.2);
        });
      } catch(e) { console.error('Bell error:', e); }
    }

    function playCountdown() {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const volume = 0.25 + (i / 9) * 0.75;
          playBoxingBell(volume);
        }, i * 1000);
      }
    }

    function playBeep() {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }


// TIMER
let ti=null,lb=null;
function st(sec,ex,eid){S.timer={on:true,left:sec,max:sec,ex,eid,mod:false,saved:false};lb=null;if(ti)clearInterval(ti);ti=setInterval(()=>{S.timer.left--;if(S.timer.left===10&&lb!==10){playCountdown();lb=10;}if(S.timer.left<=0){playGong();xst();return;}render();},1000);render();}
function xst(){if(ti)clearInterval(ti);ti=null;S.timer={on:false,left:0,max:0,ex:'',eid:null,mod:false,saved:false};render();}
function adj(d){const nl=S.timer.left+d,nm=S.timer.max+d;if(nl>=5&&nm>=5&&nm<=600){S.timer.left=nl;S.timer.max=nm;S.timer.mod=true;S.timer.saved=false;render();}}
function svp(){if(S.timer.eid!==null){S.cp[S.timer.eid]=S.timer.max;S.timer.mod=false;S.timer.saved=true;sv();render();setTimeout(()=>{if(S.timer.on){S.timer.saved=false;render();}},2200);}}
function gp(id,def){return S.cp[id]!==undefined?S.cp[id]:def;}
function ft(s){const m=Math.floor(s/60),sec=s%60;return m>0?m+':'+(sec<10?'0':'')+sec:''+sec;}
function fp(s){return s>=120?(s/60)+' мин':s+'с';}

// WORKOUT
function us(eid,si,f,v){const k='w'+S.week+'_e'+eid;if(!S.wd[k])S.wd[k]={sets:[]};while(S.wd[k].sets.length<=si)S.wd[k].sets.push({w:'',r:'',c:false});S.wd[k].sets[si][f]=v;sv();}
function tc(eid,si,ei,dk,ls,le){const ex=PROGRAM[dk].exercises[ei];const k='w'+S.week+'_e'+eid;if(!S.wd[k])S.wd[k]={sets:[]};while(S.wd[k].sets.length<=si)S.wd[k].sets.push({w:'',r:'',c:false});const was=S.wd[k].sets[si].c;S.wd[k].sets[si].c=!was;if(!was){if(ls&&le){S.done=true;}else if(!ls){const p=gp(eid,ex.pause);st(p,ex.name,eid);const cur=S.wd[k].sets[si];if(!S.wd[k].sets[si+1])S.wd[k].sets[si+1]={w:'',r:'',c:false};if(cur.w)S.wd[k].sets[si+1].w=cur.w;if(cur.r)S.wd[k].sets[si+1].r=cur.r;}}sv();render();}
function gnw(){if(S.week<7){const nw=S.week+1;[1,3,5].forEach(d=>{const p=PROGRAM[d];if(!p)return;p.exercises.forEach(ex=>{const pk='w'+S.week+'_e'+ex.id,nk='w'+nw+'_e'+ex.id;if(S.wd[pk])S.wd[nk]={sets:S.wd[pk].sets.map(s=>({...s,c:false}))};});});S.week=nw;sv();render();}}
function ra(){if(confirm('Сбросить ВСЕ данные?')){S.wd={};S.cp={};S.week=1;localStorage.removeItem('mt_v12');render();}}

// NUTRITION
function selp(p){S.ns.sel=p;S.ns.gram=p.defaultGrams?String(p.defaultGrams):'';S.ns.manual=false;S.ns.ck=false;render();setTimeout(()=>{const el=document.getElementById('gi');if(el)el.focus();},100);}
function ap(){
  const g=parseFloat(S.ns.gram);if(!g||g<=0)return;
  const p=S.ns.sel;
  const e={id:Date.now(),name:p.name,grams:g,cal:Math.round(p.cal*g/100),prot:Math.round(p.prot*g/100*10)/10,fat:Math.round(p.fat*g/100*10)/10,carbs:Math.round(p.carbs*g/100*10)/10};
  const nd=gnd();if(!nd.log)nd.log=[];nd.log.push(e);snd(nd);
  S.ns.sel=null;S.ns.gram='';render();
}
function am(){
  const m=S.ns.mf;if(!m.name.trim()||!m.grams)return;
  const g=parseFloat(m.grams)||100;
  const e={id:Date.now(),name:m.name.trim(),grams:g,cal:Math.round((parseFloat(m.cal)||0)*g/100),prot:Math.round((parseFloat(m.prot)||0)*g/100*10)/10,fat:Math.round((parseFloat(m.fat)||0)*g/100*10)/10,carbs:Math.round((parseFloat(m.carbs)||0)*g/100*10)/10};
  const cp=gcp();
  if(!cp.find(p=>p.name.toLowerCase()===m.name.trim().toLowerCase())){
    cp.push({id:'c'+Date.now(),name:m.name.trim(),cal:parseFloat(m.cal)||0,prot:parseFloat(m.prot)||0,fat:parseFloat(m.fat)||0,carbs:parseFloat(m.carbs)||0});
    scp(cp);
  }
  const nd=gnd();if(!nd.log)nd.log=[];nd.log.push(e);snd(nd);
  S.ns.manual=false;S.ns.mf={name:'',cal:'',prot:'',fat:'',carbs:'',grams:''};render();
}
function dl(id){const nd=gnd();nd.log=(nd.log||[]).filter(e=>e.id!==id);snd(nd);render();}
function dcp(id){const cp=gcp().filter(p=>p.id!==id);scp(cp);render();}
function cm(log){let c=0,p=0,f=0,ca=0;(log||[]).forEach(e=>{c+=e.cal;p+=e.prot;f+=e.fat;ca+=e.carbs;});return{cal:Math.round(c),prot:Math.round(p*10)/10,fat:Math.round(f*10)/10,carbs:Math.round(ca*10)/10};}

// КОКТЕЙЛИ
function ckAddItem(){
  const m=S.ns.ckaf;if(!m.name.trim()||!m.grams)return;
  const g=parseFloat(m.grams)||100;
  S.ns.ckitems.push({name:m.name.trim(),grams:g,cal:Math.round((parseFloat(m.cal)||0)*g/100),prot:Math.round((parseFloat(m.prot)||0)*g/100*10)/10,fat:Math.round((parseFloat(m.fat)||0)*g/100*10)/10,carbs:Math.round((parseFloat(m.carbs)||0)*g/100*10)/10});
  S.ns.ckaf={name:'',cal:'',prot:'',fat:'',carbs:'',grams:''};render();
}
function ckSave(){
  if(!S.ns.ckname.trim()||!S.ns.ckitems.length)return;
  const tot=S.ns.ckitems.reduce((a,i)=>({cal:a.cal+i.cal,prot:a.prot+i.prot,fat:a.fat+i.fat,carbs:a.carbs+i.carbs,grams:a.grams+i.grams}),{cal:0,prot:0,fat:0,carbs:0,grams:0});
  const per100=tot.grams>0?{cal:Math.round(tot.cal/tot.grams*100),prot:Math.round(tot.prot/tot.grams*100*10)/10,fat:Math.round(tot.fat/tot.grams*100*10)/10,carbs:Math.round(tot.carbs/tot.grams*100*10)/10}:{cal:0,prot:0,fat:0,carbs:0};
  const cp=gcp();
  cp.push({id:'ck'+Date.now(),name:S.ns.ckname.trim(),isCk:true,defaultGrams:Math.round(tot.grams),...per100});
  scp(cp);
  S.ns.ck=false;S.ns.ckname='';S.ns.ckitems=[];S.ns.ckaf={name:'',cal:'',prot:'',fat:'',carbs:'',grams:''};
  render();
}

  const p=S.ns.pf;

  sprof({weight:parseFloat(p.weight),height:parseFloat(p.height),age:parseInt(p.age),act:p.act||'2',goal:p.goal||'maintain'});

}

        <div style="display:flex;gap:8px">
          <button class="add-btn" style="flex:1" onclick="am()">ДОБАВИТЬ И СОХРАНИТЬ</button>
          <button class="cancel-btn" onclick="S.ns.manual=false;render()">ОТМЕНА</button>
        </div>`;
    } else if(S.ns.ck){
      const ck=S.ns.ckaf;
      const tot=S.ns.ckitems.reduce((a,i)=>({cal:a.cal+i.cal,prot:a.prot+i.prot,fat:a.fat+i.fat,carbs:a.carbs+i.carbs}),{cal:0,prot:0,fat:0,carbs:0});
      h+=`<div class="f-lbl">НАЗВАНИЕ КОКТЕЙЛЯ</div>
        <input type="text" placeholder="Протеиновый шейк" class="f-inp" value="${S.ns.ckname}" oninput="S.ns.ckname=this.value">`;
      if(S.ns.ckitems.length){
        h+=`<div style="background:#1e1c1a;border-left:2px solid var(--a);padding:8px 10px;margin-bottom:8px">`;
        S.ns.ckitems.forEach((it,i)=>{
          h+=`<div style="display:flex;align-items:center;padding:4px 0;border-bottom:1px solid #2a2825;font-size:13px">
            <span style="flex:1;color:#f0ede8;font-weight:600">${it.name} ${it.grams}г</span>
            <span style="color:#888884;margin-right:8px">${it.cal} кк</span>
            <button onclick="S.ns.ckitems.splice(${i},1);render()" style="background:none;border:none;color:#555450;font-size:16px;padding:0">×</button>
          </div>`;
        });
        h+=`<div style="font-size:12px;color:var(--a);margin-top:4px;font-weight:600">ИТОГО: ${tot.cal} ККАЛ · Б${Math.round(tot.prot*10)/10} Ж${Math.round(tot.fat*10)/10} У${Math.round(tot.carbs*10)/10}</div>`;
        h+=`</div>`;
      }
      h+=`<div style="font-size:11px;color:#888884;letter-spacing:1px;font-weight:600;margin-bottom:6px">ДОБАВИТЬ ИНГРЕДИЕНТ</div>
        <input type="text" placeholder="Название" class="f-inp" value="${ck.name}" oninput="S.ns.ckaf.name=this.value">
        <div class="f-grid">
          <div><div class="f-lbl">ККАЛ/100Г</div><input type="text" inputmode="decimal" placeholder="0" class="f-inp" value="${ck.cal}" oninput="S.ns.ckaf.cal=this.value"></div>
          <div><div class="f-lbl">БЕЛКИ/100Г</div><input type="text" inputmode="decimal" placeholder="0" class="f-inp" value="${ck.prot}" oninput="S.ns.ckaf.prot=this.value"></div>
          <div><div class="f-lbl">ЖИРЫ/100Г</div><input type="text" inputmode="decimal" placeholder="0" class="f-inp" value="${ck.fat}" oninput="S.ns.ckaf.fat=this.value"></div>
          <div><div class="f-lbl">УГЛЕВОДЫ/100Г</div><input type="text" inputmode="decimal" placeholder="0" class="f-inp" value="${ck.carbs}" oninput="S.ns.ckaf.carbs=this.value"></div>
        </div>
        <div class="f-lbl">ГРАММЫ</div>
        <input type="text" inputmode="decimal" placeholder="100" class="f-inp" value="${ck.grams}" oninput="S.ns.ckaf.grams=this.value">
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="add-btn" style="flex:1" onclick="ckAddItem()">+ ИНГРЕДИЕНТ</button>
        </div>
        <div style="display:flex;gap:8px">
          <button class="add-btn" style="flex:1;background:#444" onclick="ckSave()">💾 СОХРАНИТЬ КОКТЕЙЛЬ</button>
          <button class="cancel-btn" onclick="S.ns.ck=false;S.ns.ckitems=[];S.ns.ckname='';render()">ОТМЕНА</button>
        </div>`;
    } else {
      const cp=gcp();
      const sq=S.ns.sq||'';
      const found=sq?cp.filter(p=>p.name.toLowerCase().includes(sq.toLowerCase())):[];
      h+=`<div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="manual-btn" style="flex:1;border-color:var(--a30);color:var(--a)" onclick="S.ns.manual=true;render()">+ НОВЫЙ ПРОДУКТ</button>
        <button class="manual-btn" style="flex:1" onclick="S.ns.ck=true;S.ns.ckitems=[];S.ns.ckname='';S.ns.ckaf={name:'',cal:'',prot:'',fat:'',carbs:'',grams:''};render()">🥤 КОКТЕЙЛЬ</button>
      </div>
      <div style="display:flex;gap:8px">
        <input type="text" placeholder="Поиск по сохранённым..." class="search-inp" id="sq" value="${sq}" oninput="S.ns.sq=this.value;render()">
      </div>`;
      if(sq&&found.length){
        h+=`<div style="margin-top:6px">`;
        found.forEach(p=>{
          const ps=JSON.stringify({name:p.name,cal:p.cal,prot:p.prot,fat:p.fat,carbs:p.carbs,isCk:p.isCk||false,defaultGrams:p.defaultGrams||0}).replace(/"/g,'&quot;');
          h+=`<div data-p="${ps}" style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #2a2825">
            <div style="flex:1;cursor:pointer" onclick="selp(JSON.parse(this.closest('[data-p]').dataset.p))">
              <div style="font-size:14px;color:#f0ede8;font-weight:600">${p.name}${p.isCk?' 🥤':''}</div>
              <div style="font-size:11px;color:#888884">${p.cal} ККАЛ · Б${p.prot} Ж${p.fat} У${p.carbs} / 100Г</div>
            </div>
            <button onclick="selp(JSON.parse(this.closest('[data-p]').dataset.p))" style="background:none;border:none;color:var(--a);font-size:22px;padding:0 4px;line-height:1">›</button>
            <button onclick="dcp('${p.id}')" style="background:none;border:none;color:#555450;font-size:18px;padding:0 4px;line-height:1">×</button>
          </div>`;
        });
        h+=`</div>`;
      } else if(sq&&!found.length){
        h+=`<div style="text-align:center;color:#555450;font-size:12px;padding:10px 0;letter-spacing:1px">НИЧЕГО НЕ НАЙДЕНО</div>`;
      } else if(!sq&&cp.length){
        h+=`<div style="font-size:11px;color:#555450;padding:6px 0;letter-spacing:1px">СОХРАНЕНО ${cp.length} ПРОДУКТОВ/КОКТЕЙЛЕЙ</div>`;
      }
    }
    h+=`</div></div>`;

    const log=nd.log||[];
    h+=`<div class="nut-sec"><div class="nut-sec-head"><span class="nut-sec-t">СЕГОДНЯ</span><span class="nut-sec-c">${log.length} позиций</span></div>`;
    if(!log.length)h+=`<div class="empty-log">ЕЩЁ НЕТ ЗАПИСЕЙ</div>`;
    else log.slice().reverse().forEach(e=>{h+=`<div class="fli"><div class="fli-info"><div class="fli-name">${e.name} — ${e.grams}г</div><div class="fli-mac">${e.cal} ККАЛ · Б${e.prot} Ж${e.fat} У${e.carbs}</div></div><button class="fli-del" onclick="dl(${e.id})">×</button></div>`;});
    h+=`</div>`;

  } else if(S.tab==='bonus'){
    const bl=S.bonus.block;
    const prog=BONUS[bl];
    h+=`<div class="hdr">
      <div class="hdr-label">ДОПОЛНИТЕЛЬНЫЕ ТРЕНИРОВКИ</div>
      <div class="hdr-title">${prog.name}</div>
      <div class="day-btns">
        <button class="day-btn ${bl==='abs'?'active':''}" onclick="S.bonus.block='abs';render()">ПРЕСС</button>
        <button class="day-btn ${bl==='posture'?'active':''}" onclick="S.bonus.block='posture';render()">ОСАНКА</button>
      </div>
    </div>`;

    prog.exercises.forEach((ex,ei)=>{
      const bk='bon_'+bl+'_'+ex.id;
      if(!S.bonus.sets[bk])S.bonus.sets[bk]=[];
      const sets=S.bonus.sets[bk];
      const done=sets.filter(s=>s.c).length;
      const sh=S.hints['bon_'+ex.id];
      h+=`<div class="ex-card">
        <div class="ex-head">
          <div>
            <div class="ex-name">${ex.name.toUpperCase()}</div>
            <div class="ex-meta">${prog.sets} ПОДХ × ${ex.reps||'MAX'}</div>
          </div>
          <div class="ex-badges">
            ${done===prog.sets?'<span class="badge-done">DONE</span>':''}
            ${ex.hint?`<button class="hint-btn" onclick="S.hints['bon_${ex.id}']=!S.hints['bon_${ex.id}'];render()">?</button>`:''}
          </div>
        </div>
        ${sh?`<div class="hint-box"><div class="hint-t">ТЕХНИКА</div><div class="hint-txt">${ex.hint}</div></div>`:''}
        ${Array(prog.sets).fill(0).map((_,si)=>{
          const sd=sets[si]||{r:'',c:false};
          return `<div class="set-row ${sd.c?'done-row':''}">
            <span class="set-lbl">S${si+1}</span>
            <div class="set-inputs">
              <input type="text" inputmode="numeric" placeholder="${ex.reps||'сек'}" value="${sd.r}" class="set-inp ${sd.c?'done-inp':''}" style="width:120px" onchange="if(!S.bonus.sets['${bk}'])S.bonus.sets['${bk}']=[];while(S.bonus.sets['${bk}'].length<=${si})S.bonus.sets['${bk}'].push({r:'',c:false});S.bonus.sets['${bk}'][${si}].r=this.value;">
            </div>
            <button class="chk-btn ${sd.c?'checked':''}" onclick="if(!S.bonus.sets['${bk}'])S.bonus.sets['${bk}']=[];while(S.bonus.sets['${bk}'].length<=${si})S.bonus.sets['${bk}'].push({r:'',c:false});S.bonus.sets['${bk}'][${si}].c=!S.bonus.sets['${bk}'][${si}].c;if(!S.bonus.sets['${bk}'][${si}].c){}else{st(60,'${ex.name}',null);}render()">✓</button>
          </div>`;
        }).join('')}
        <div class="tmr-row">
          <button class="tmr-start" onclick="st(60,'${ex.name}',null)">⏱ 1:00</button>
        </div>
      </div>`;
    });

    h+=`<button class="reset-btn" onclick="S.bonus.sets={};render()">↺ СБРОСИТЬ БЛОК</button>`;
  }

  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

load();loadGong();render();
setInterval(()=>{const el=document.getElementById('clk');if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}},1000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
</script>
</body>
</html>
