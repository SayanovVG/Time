<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>IRON LOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #f0f0f0; --muted: #555;
      --accent: #e8ff00; --accent2: #ff4d00;
      --green: #00e676; --green-dim: rgba(0,230,118,0.1);
      --carry: #ff9d00; --carry-bg: rgba(255,157,0,0.07); --carry-border: rgba(255,157,0,0.3);
      --font-d: 'Bebas Neue',sans-serif; --font-m: 'DM Mono',monospace; --font-b: 'Inter',sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:var(--font-b); background:var(--bg); min-height:100vh; color:var(--text); padding:14px; padding-bottom:40px; }
    input { font-size:16px!important; font-family:var(--font-m); }
    input:focus { outline:none; }
    button { font-family:var(--font-b); cursor:pointer; border:none; }
    button:active { transform:scale(0.96); }

    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .brand { font-family:var(--font-d); font-size:30px; letter-spacing:4px; color:var(--accent); }
    .clock-display { font-family:var(--font-m); font-size:18px; color:var(--text); background:var(--bg3); padding:6px 12px; border-radius:8px; border:1px solid var(--border); letter-spacing:2px; }

    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:14px; background:var(--bg2); padding:4px; border-radius:12px; border:1px solid var(--border); }
    .tab-btn { padding:11px; border-radius:9px; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; gap:7px; transition:all 0.2s; background:transparent; color:var(--muted); }
    .tab-btn.active-training { background:var(--accent); color:#0a0a0a; }
    .tab-btn.active-nutrition { background:var(--green); color:#0a0a0a; }

    .header-card { border-radius:16px; padding:20px; margin-bottom:14px; position:relative; overflow:hidden; border:1px solid rgba(255,255,255,0.08); }
    .header-card::after { content:''; position:absolute; top:0; right:0; width:180px; height:180px; background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%); pointer-events:none; }
    .header-card.week-1-2 { background:linear-gradient(135deg,#0d1f3c,#1a3a6e); }
    .header-card.week-3-4 { background:linear-gradient(135deg,#1f0d3c,#4a1a7e); }
    .header-card.week-5-6 { background:linear-gradient(135deg,#3c0d0d,#7e1a1a); }
    .header-card.week-7 { background:linear-gradient(135deg,#0d3c1a,#1a7e3a); }
    .header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .workout-title { font-family:var(--font-d); font-size:28px; letter-spacing:2px; }
    .header-subtitle { font-size:12px; color:rgba(255,255,255,0.6); margin-top:4px; }
    .header-info { font-family:var(--font-m); font-size:11px; color:rgba(255,255,255,0.45); margin-top:3px; }
    .week-badge { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:10px; padding:8px 14px; text-align:center; flex-shrink:0; }
    .week-num { font-family:var(--font-d); font-size:28px; }
    .week-label { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1px; }
    .day-buttons { display:flex; gap:6px; }
    .day-btn { flex:1; padding:9px; border-radius:8px; font-size:13px; font-weight:700; transition:all 0.2s; }
    .day-btn.active { background:var(--accent); color:#0a0a0a; }
    .day-btn.inactive { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); }

    .carry-legend { background:var(--carry-bg); border:1px solid var(--carry-border); border-radius:10px; padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:10px; font-size:12px; color:var(--carry); line-height:1.4; }

    .exercise-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:10px; }
    .exercise-card.all-done { border-color:rgba(0,230,118,0.3); }
    .exercise-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .exercise-name { font-weight:700; font-size:15px; line-height:1.3; }
    .exercise-meta { display:flex; align-items:center; gap:6px; margin-top:5px; flex-wrap:wrap; }
    .meta-tag { font-family:var(--font-m); font-size:10px; padding:3px 7px; border-radius:5px; background:var(--bg3); border:1px solid var(--border); color:var(--muted); }
    .meta-tag.blue { color:#60a5fa; border-color:rgba(96,165,250,0.2); }
    .meta-tag.yellow { color:#facc15; border-color:rgba(250,204,21,0.2); }
    .meta-tag.purple { color:#a78bfa; border-color:rgba(167,139,250,0.2); }
    .exercise-badges { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .badge-done { background:var(--green); color:#0a0a0a; font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:1px; animation:pulse 2s infinite; }
    .hint-btn { background:rgba(96,165,250,0.08); color:#60a5fa; border:1px solid rgba(96,165,250,0.2); font-size:11px; padding:4px 9px; border-radius:20px; font-weight:600; }
    .hint-box { background:rgba(96,165,250,0.05); border:1px solid rgba(96,165,250,0.15); border-radius:10px; padding:12px; margin-bottom:12px; font-size:12px; color:#bfdbfe; line-height:1.5; }
    .hint-title { font-weight:700; color:#93c5fd; margin-bottom:4px; font-size:11px; letter-spacing:1px; text-transform:uppercase; }

    .set-row { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; margin-bottom:6px; border:1px solid transparent; transition:all 0.2s; }
    .set-row.incomplete { background:var(--bg3); border-color:var(--border); }
    .set-row.complete { background:var(--green-dim); border-color:rgba(0,230,118,0.2); }
    .set-row.carry-over { background:var(--carry-bg); border-color:var(--carry-border); }
    .set-row.carry-over.complete { background:var(--green-dim); border-color:rgba(0,230,118,0.2); }
    .set-num { font-family:var(--font-m); font-size:10px; color:var(--muted); width:28px; flex-shrink:0; }
    .set-inputs { display:flex; gap:7px; flex:1; }
    .set-input { padding:7px 9px; font-size:13px!important; border-radius:7px; background:rgba(255,255,255,0.05); border:1px solid var(--border2); color:var(--text); width:78px; font-family:var(--font-m)!important; transition:all 0.2s; }
    .set-input:focus { border-color:var(--accent); background:rgba(232,255,0,0.06); box-shadow:0 0 0 2px rgba(232,255,0,0.08); }
    .set-input.carry { color:var(--carry); border-color:var(--carry-border); background:rgba(255,157,0,0.05); }
    .set-input.small { width:62px; }
    .carry-dot { width:6px; height:6px; border-radius:50%; background:var(--carry); flex-shrink:0; }
    .check-btn { width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.2s; flex-shrink:0; }
    .check-btn.incomplete { background:rgba(255,255,255,0.05); border:1px solid var(--border2); color:var(--muted); }
    .check-btn.complete { background:var(--green); color:#0a0a0a; font-weight:900; }

    .week-nav { display:flex; gap:8px; margin:18px 0 10px; align-items:center; }
    .week-btn { background:var(--bg2); border:1px solid var(--border2); color:var(--text); padding:10px 14px; border-radius:9px; font-size:13px; font-weight:700; }
    .week-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .week-current { flex:1; background:rgba(168,85,247,0.12); border:1px solid rgba(168,85,247,0.25); color:#d8b4fe; padding:10px; border-radius:9px; font-weight:700; text-align:center; font-size:13px; font-family:var(--font-m); }
    .next-week-btn { width:100%; background:linear-gradient(135deg,var(--green),#00b894); color:#0a0a0a; padding:14px; border-radius:12px; font-weight:800; font-size:15px; margin-bottom:18px; box-shadow:0 4px 20px rgba(0,230,118,0.15); }
    .final-week { background:rgba(234,179,8,0.1); border:1px solid rgba(234,179,8,0.3); color:#fde047; padding:16px; border-radius:12px; text-align:center; font-family:var(--font-d); font-size:22px; letter-spacing:2px; margin-bottom:18px; }
    .rest-day { text-align:center; padding:60px 0; }
    .rest-icon { font-size:60px; margin-bottom:14px; }
    .rest-title { font-family:var(--font-d); font-size:32px; letter-spacing:2px; margin-bottom:8px; }
    .rest-subtitle { color:var(--muted); font-size:14px; }

    /* NUTRITION */
    .macros-card { background:linear-gradient(135deg,#0d3c1a,#0d2a1a); border:1px solid rgba(0,230,118,0.2); border-radius:16px; padding:18px; margin-bottom:14px; }
    .macros-label { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:12px; letter-spacing:2px; text-transform:uppercase; font-family:var(--font-m); }
    .macros-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .macro-item { text-align:center; }
    .macro-value { font-family:var(--font-d); font-size:32px; color:var(--green); }
    .macro-goal { font-size:10px; color:rgba(255,255,255,0.35); font-family:var(--font-m); }
    .macro-bar { height:3px; background:rgba(255,255,255,0.07); border-radius:99px; margin-top:6px; overflow:hidden; }
    .macro-bar-fill { height:100%; background:var(--green); border-radius:99px; transition:width 0.4s; }
    .recipe-box { background:rgba(168,85,247,0.07); border:1px solid rgba(168,85,247,0.2); border-radius:10px; padding:12px 14px; margin-bottom:14px; }
    .recipe-title { font-size:10px; font-weight:700; color:#d8b4fe; margin-bottom:3px; letter-spacing:1px; text-transform:uppercase; }
    .recipe-text { font-size:12px; color:#e9d5ff; }
    .section-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .section-title { font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
    .section-count { font-family:var(--font-m); font-size:11px; color:var(--muted); background:var(--bg3); padding:3px 8px; border-radius:6px; }
    .meal-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; margin-bottom:6px; cursor:pointer; transition:all 0.2s; border:1px solid transparent; }
    .meal-row.incomplete { background:var(--bg3); border-color:var(--border); }
    .meal-row.complete { background:var(--green-dim); border-color:rgba(0,230,118,0.2); }
    .meal-icon { font-size:18px; }
    .meal-content { flex:1; }
    .meal-name { font-size:13px; font-weight:600; }
    .meal-time { font-family:var(--font-m); font-size:11px; color:var(--muted); margin-left:7px; }
    .meal-items { font-size:11px; color:var(--muted); margin-top:2px; }
    .meal-macros { font-family:var(--font-m); font-size:10px; color:#444; margin-top:3px; }
    .meal-check { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; }
    .meal-check.incomplete { background:var(--bg); border:1px solid var(--border2); }
    .meal-check.complete { background:var(--green); color:#0a0a0a; }
    .buy-tag { background:rgba(234,179,8,0.12); color:#fde047; font-size:10px; padding:2px 7px; border-radius:99px; margin-left:6px; font-family:var(--font-m); }
    .shopping-box { background:rgba(234,179,8,0.05); border:1px solid rgba(234,179,8,0.2); border-radius:10px; padding:12px 14px; margin-bottom:14px; }
    .shopping-title { font-size:10px; font-weight:700; color:#fde047; margin-bottom:3px; text-transform:uppercase; letter-spacing:1px; }
    .shopping-text { font-size:12px; color:#fef08a; }
    .reset-btn { width:100%; background:transparent; border:1px solid rgba(239,68,68,0.15); color:rgba(239,68,68,0.4); padding:10px; border-radius:9px; font-size:12px; margin-top:14px; }

    /* TIMER */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.87); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:50; }
    .timer-card { position:relative; background:#0e0e0e; border:1px solid var(--border2); border-radius:24px; padding:28px 22px 22px; text-align:center; margin:16px; width:100%; max-width:330px; }
    .timer-close { position:absolute; top:12px; right:14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--muted); font-size:14px; width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; }
    .timer-label { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:3px; text-transform:uppercase; font-family:var(--font-m); margin-bottom:6px; }
    .timer-time { font-family:var(--font-d); font-size:88px; letter-spacing:2px; line-height:1; color:var(--accent); margin-bottom:4px; text-shadow:0 0 40px rgba(232,255,0,0.25); }
    .timer-time.warning { color:var(--accent2); text-shadow:0 0 40px rgba(255,77,0,0.3); }
    .timer-exercise { font-size:12px; color:var(--muted); margin-bottom:14px; max-width:210px; margin-left:auto; margin-right:auto; }
    .timer-progress { width:100%; height:3px; background:rgba(255,255,255,0.07); border-radius:99px; margin:0 auto 16px; overflow:hidden; }
    .timer-progress-fill { height:100%; border-radius:99px; transition:width 1s linear; }
    .timer-progress-fill.normal { background:var(--accent); }
    .timer-progress-fill.warning { background:var(--accent2); }
    .timer-adjust-row { display:flex; gap:7px; margin-bottom:10px; }
    .timer-adjust-btn { flex:1; height:40px; border-radius:9px; background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-size:13px; font-weight:700; font-family:var(--font-m); }
    .timer-save-row { min-height:30px; display:flex; justify-content:center; align-items:center; margin-bottom:10px; }
    .timer-save-btn { background:rgba(232,255,0,0.08); border:1px solid rgba(232,255,0,0.25); color:var(--accent); padding:7px 18px; border-radius:20px; font-weight:700; font-size:12px; display:flex; align-items:center; gap:5px; }
    .timer-saved-text { color:var(--green); font-size:12px; font-family:var(--font-m); }
    .timer-skip { background:var(--bg3); border:1px solid var(--border2); color:var(--muted); padding:9px 24px; border-radius:9px; font-weight:600; font-size:13px; width:100%; }

    /* COMPLETION */
    .completion-card { background:linear-gradient(135deg,#0d3c1a,#061a10); border:1px solid rgba(0,230,118,0.25); border-radius:24px; padding:36px 28px; text-align:center; margin:16px; max-width:340px; width:100%; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
    .completion-icon { font-size:72px; margin-bottom:12px; }
    .completion-title { font-family:var(--font-d); font-size:36px; letter-spacing:3px; color:var(--green); margin-bottom:8px; }
    .completion-subtitle { font-size:16px; color:rgba(255,255,255,0.7); margin-bottom:6px; }
    .completion-saved { font-size:12px; color:var(--muted); margin-bottom:24px; font-family:var(--font-m); }
    .completion-btn { background:var(--green); color:#0a0a0a; padding:13px 36px; border-radius:12px; font-weight:800; font-size:16px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
  </style>
</head>
<body>
<div id="app"></div>

let state={
  activeTab:'training', currentWeek:1, currentDay:1,
  workoutData:{}, nutritionData:{}, customPauses:{}, expandedHints:{},

  showCompletion:false
};

function loadData(){
  try{
    const s=localStorage.getItem('fitnessTrackerV9');
    if(s){const d=JSON.parse(s);state.workoutData=d.workoutData||{};state.currentWeek=d.currentWeek||1;state.nutritionData=d.nutritionData||{};state.customPauses=d.customPauses||{};}
  }catch(e){}
}
function saveData(){
  try{localStorage.setItem('fitnessTrackerV9',JSON.stringify({workoutData:state.workoutData,currentWeek:state.currentWeek,nutritionData:state.nutritionData,customPauses:state.customPauses}));}catch(e){}
}

// Проверка — есть ли у сета данные из прошлой недели (carry-over)
function isCarryOver(exId, setIdx){
  if(state.currentWeek<=1) return false;
  const prevKey='w'+(state.currentWeek-1)+'_ex'+exId;
  const currKey='w'+state.currentWeek+'_ex'+exId;
  const prev=state.workoutData[prevKey];
  const curr=state.workoutData[currKey];
  if(!prev||!prev.sets||!prev.sets[setIdx]) return false;
  const prevSet=prev.sets[setIdx];
  const currSet=curr&&curr.sets&&curr.sets[setIdx];
  // carry-over если в текущей неделе нет своих данных ИЛИ данные совпадают с прошлой неделей
  if(!currSet||(!currSet.weight&&!currSet.reps)) return !!(prevSet.weight||prevSet.reps);
  return (currSet.weight===prevSet.weight||currSet.reps===prevSet.reps);
}

function getSetData(exId, setIdx){
  const key='w'+state.currentWeek+'_ex'+exId;
  const sets=(state.workoutData[key]||{}).sets||[];
  return sets[setIdx]||{weight:'',reps:'',completed:false};
}
function getCarryData(exId, setIdx){
  if(state.currentWeek<=1) return null;
  const prevKey='w'+(state.currentWeek-1)+'_ex'+exId;
  const prev=(state.workoutData[prevKey]||{}).sets||[];
  return prev[setIdx]||null;
}

// AUDIO
let audioCtx=null,gongBuffer=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}

async function loadGong(){
  if(gongBuffer)return gongBuffer;
  try{
    const ctx=getAudioCtx();
    // Simple synth gong instead of base64
    gongBuffer=true;return true;
  }catch(e){return null;}
}

function playGong(){
  try{
    const ctx=getAudioCtx();
    const now=ctx.currentTime;
    const freqs=[220,440,550,660];
    freqs.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime((0.4-i*0.08),now+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,now+2.5);
      o.connect(g);g.connect(ctx.destination);
      o.start(now);o.stop(now+2.6);
    });
  }catch(e){}
}

function playBoxingBell(vol=1){
  try{
    const ctx=getAudioCtx(),now=ctx.currentTime;
    [1050,2100,3150,525].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      const amp=[0.35,0.18,0.10,0.12][i];
      const dec=[1.4,1.0,0.7,1.2][i];
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.001,now);
      g.gain.linearRampToValueAtTime(amp*vol,now+0.003);
      g.gain.exponentialRampToValueAtTime(0.001,now+dec);
      o.connect(g);g.connect(ctx.destination);
      o.start(now);o.stop(now+dec+0.05);
    });
  }catch(e){}
}

function playCountdown(){
  for(let i=0;i<10;i++) setTimeout(()=>playBoxingBell(0.25+(i/9)*0.75),i*1000);
}

let timerInterval=null,lastBeepTime=null;
function startTimer(seconds,exercise,exId){
  state.timer={active:true,timeLeft:seconds,maxTime:seconds,exercise,exId,modified:false,saved:false};
  lastBeepTime=null;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    state.timer.timeLeft--;
    if(state.timer.timeLeft===10&&lastBeepTime!==10){playCountdown();lastBeepTime=10;}
    if(state.timer.timeLeft<=0){playGong();stopTimer();return;}
    render();
  },1000);
  render();
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=null;
  state.timer={active:false,timeLeft:0,maxTime:0,exercise:'',exId:null,modified:false,saved:false};
  render();
}
function adjustTimer(d){
  const nl=state.timer.timeLeft+d,nm=state.timer.maxTime+d;
  if(nl>=5&&nm>=5&&nm<=600){state.timer.timeLeft=nl;state.timer.maxTime=nm;state.timer.modified=true;state.timer.saved=false;render();}
}
function saveTimerPause(){
  if(state.timer.exId!==null){
    state.customPauses[state.timer.exId]=state.timer.maxTime;
    state.timer.modified=false;state.timer.saved=true;
    saveData();render();
    setTimeout(()=>{if(state.timer.active){state.timer.saved=false;render();}},2200);
  }
}

function getWeekConfig(){return WEEK_CONFIGS[state.currentWeek];}
function getTodayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function formatPause(s){return s>=120?(s/60)+' мин':s+'с';}
function formatTime(s){const m=Math.floor(s/60),sec=s%60;return m>0?m+':'+(sec<10?'0':'')+sec:''+sec;}
function getTodayNutrition(){return state.nutritionData[getTodayKey()]||{meals:{},supplements:{}};}
function calcMacros(){const t=getTodayNutrition();let p=0,f=0,c=0;MEALS.forEach(m=>{if(t.meals[m.id]){p+=m.protein;f+=m.fat;c+=m.carbs;}});return{protein:p,fat:f,carbs:c};}
function getPause(exId,def){return state.customPauses[exId]!==undefined?state.customPauses[exId]:def;}

function updateSet(exId,setIdx,field,value){
  const key='w'+state.currentWeek+'_ex'+exId;
  if(!state.workoutData[key])state.workoutData[key]={sets:[]};
  while(state.workoutData[key].sets.length<=setIdx)state.workoutData[key].sets.push({weight:'',reps:'',completed:false});
  state.workoutData[key].sets[setIdx][field]=value;
  saveData();
}
function toggleComplete(exId,setIdx,exIdx,dayKey,isLastSet,isLastEx){
  const ex=PROGRAM[dayKey].exercises[exIdx];
  const key="w"+state.currentWeek+"_ex"+exId;
  if(!state.workoutData[key])state.workoutData[key]={sets:[]};
  while(state.workoutData[key].sets.length<=setIdx)state.workoutData[key].sets.push({weight:"",reps:"",completed:false});
  const was=state.workoutData[key].sets[setIdx].completed;
  state.workoutData[key].sets[setIdx].completed=!was;
  if(!was){
    // Если поле пустое — сохраняем carry-over из прошлой недели
    const carry=getCarryData(exId,setIdx);
    const curr=state.workoutData[key].sets[setIdx];
    if(carry){
      if(!curr.weight&&carry.weight) curr.weight=carry.weight;
      if(!curr.reps&&carry.reps) curr.reps=carry.reps;
    }
    if(isLastSet&&isLastEx){state.showCompletion=true;}
    else if(!isLastSet){
      const pause=getPause(exId,ex.pause);
      startTimer(pause,ex.name,exId);
      if(!state.workoutData[key].sets[setIdx+1])state.workoutData[key].sets[setIdx+1]={weight:"",reps:"",completed:false};
      const next=state.workoutData[key].sets[setIdx+1];
      if(curr.weight&&!next.weight) next.weight=curr.weight;
      if(curr.reps&&!next.reps) next.reps=curr.reps;
    }
  }
  saveData();render();
}

function toggleMeal(id){const k=getTodayKey();if(!state.nutritionData[k])state.nutritionData[k]={meals:{},supplements:{}};state.nutritionData[k].meals[id]=!state.nutritionData[k].meals[id];saveData();render();}
function toggleSupplement(id){const k=getTodayKey();if(!state.nutritionData[k])state.nutritionData[k]={meals:{},supplements:{}};state.nutritionData[k].supplements[id]=!state.nutritionData[k].supplements[id];saveData();render();}

function goToNextWeek(){
  if(state.currentWeek<7){
    const next=state.currentWeek+1;
    [1,3,5].forEach(day=>{
      const prog=PROGRAM[day];if(!prog)return;
      prog.exercises.forEach(ex=>{
        const prevKey='w'+state.currentWeek+'_ex'+ex.id;
        const nextKey='w'+next+'_ex'+ex.id;
        if(state.workoutData[prevKey]&&!state.workoutData[nextKey]){
          // Переносим данные в новую неделю как carry-over (не сбрасываем completed у прошлой)
          state.workoutData[nextKey]={
            sets:state.workoutData[prevKey].sets.map(s=>({weight:s.weight||'',reps:s.reps||'',completed:false}))
          };
        }
      });
    });
    state.currentWeek=next;
    saveData();render();
  }
}
function resetAllData(){
  if(confirm('Сбросить ВСЕ данные? Это нельзя отменить!')){
    state.workoutData={};state.nutritionData={};state.customPauses={};state.currentWeek=1;
    localStorage.removeItem('fitnessTrackerV9');render();
  }
}
function toggleHint(id){state.expandedHints['ex'+id]=!state.expandedHints['ex'+id];render();}
function setTab(t){state.activeTab=t;render();}
function setDay(d){state.currentDay=d;render();}
function setWeek(w){state.currentWeek=w;saveData();render();}
function closeCompletion(){state.showCompletion=false;render();}

function render(){
  const wc=getWeekConfig();
  const numSets=wc.sets;
  const todayWorkout=PROGRAM[state.currentDay];
  const todayNutr=getTodayNutrition();
  const macros=calcMacros();
  const now=new Date();
  const clockStr=(now.getHours()<10?'0':'')+now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();

  // Проверяем — есть ли carry-over данные на этой неделе
  let hasCarry=false;
  if(state.currentWeek>1&&todayWorkout){
    todayWorkout.exercises.forEach(ex=>{
      const prevKey='w'+(state.currentWeek-1)+'_ex'+ex.id;
      const currKey='w'+state.currentWeek+'_ex'+ex.id;
      if(state.workoutData[prevKey]&&state.workoutData[currKey]){
        const curr=state.workoutData[currKey];
        if(curr.sets&&curr.sets.some(s=>s.weight||s.reps)&&!curr.sets.some(s=>s.completed)){

    }
    html+=`<div class="overlay"><div class="timer-card">
      <button class="timer-close" onclick="stopTimer()">✕</button>

      <div class="timer-progress"><div class="timer-progress-fill ${warn?'warning':'normal'}" style="width:${prog}%"></div></div>
      <div class="timer-adjust-row">
        <button class="timer-adjust-btn" onclick="adjustTimer(-15)">− 15с</button>
        <button class="timer-adjust-btn" onclick="adjustTimer(15)">+ 15с</button>
      </div>
      ${saveRow}

    </div></div>`;
  }

  // COMPLETION OVERLAY
  if(state.showCompletion){
    html+=`<div class="overlay"><div class="completion-card">
      <div class="completion-icon">🏆</div>
      <div class="completion-title">DONE!</div>

        <div class="macro-item"><div class="macro-value">${macros.carbs}</div><div class="macro-goal">/ ${MACRO_GOALS.carbs}г У</div><div class="macro-bar"><div class="macro-bar-fill" style="width:${Math.min(100,macros.carbs/MACRO_GOALS.carbs*100)}%"></div></div></div>

    <div class="recipe-box"><div class="recipe-title">🥤 Рецепт гейнера</div><div class="recipe-text">Молоко 300мл + овсянка 50г + банан + протеин 30г</div></div>

            const showCarryWeight=!!(carry&&carry.weight&&!sd.completed&&!sd.weight);

          }).join('')}
        </div>`;
      });
    }

    html+=`<div class="week-nav">
      <button class="week-btn" onclick="setWeek(${state.currentWeek-1})" ${state.currentWeek===1?'disabled':''}>◀ W${state.currentWeek-1}</button>
      <div class="week-current">НЕДЕЛЯ ${state.currentWeek} / 7</div>
      <button class="week-btn" onclick="setWeek(${state.currentWeek+1})" ${state.currentWeek===7?'disabled':''}>W${state.currentWeek+1} ▶</button>
    </div>`;
    if(state.currentWeek<7){
      html+=`<button class="next-week-btn" onclick="goToNextWeek()">✓ Завершить неделю → Начать неделю ${state.currentWeek+1}</button>`;
    } else {
      html+=`<div class="final-week">🏆 ФИНАЛЬНАЯ НЕДЕЛЯ — РАЗГРУЗКА! 🏆</div>`;
    }
  }

  html+=`<button class="reset-btn" onclick="resetAllData()">🗑️ Сбросить все данные</button>`;
  document.getElementById('app').innerHTML=html;
}

loadData();
render();

setInterval(()=>{
  const el=document.getElementById('clock');
  if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}
},1000);
</script>
</body>
</html>
