<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="./manifest.json">
<title>MAX TIME</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#000;--z1:#0c0c0c;--z2:#111;--z3:#171717;--z4:#1e1e1e;--z5:#252525;
  --line:#1e1e1e;--line2:#2a2a2a;--dim:#444;--muted:#666;--body:#b0b0b0;
  --text:#e8e8e8;--white:#f5f5f5;
  --red:#cc1522;--red2:#ff1c2e;--red-a10:rgba(204,21,34,.10);--red-a20:rgba(204,21,34,.20);
  --red-glow:0 0 16px rgba(204,21,34,.2);
  --nav-h:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--ink)}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--ink);min-height:100vh;color:var(--body);padding-bottom:calc(var(--nav-h) + 8px);overflow-x:hidden}
input,button,select,textarea{font-family:'DM Sans',system-ui,sans-serif}
input{font-size:16px!important}
input:focus,select:focus,textarea:focus{outline:none}
button{cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;transition:opacity .15s,transform .1s}
button:active{transform:scale(.96);opacity:.8}
textarea{resize:none;font-size:16px!important}
.bc{font-family:'Barlow Condensed',sans-serif}

/* ─── TOPBAR ─── */
.topbar{position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:11px 16px 10px;background:rgba(0,0,0,.97);border-bottom:1px solid var(--line);backdrop-filter:blur(20px)}
.tb-left{display:flex;align-items:center;gap:11px}
.week-badge{width:30px;height:30px;border:1px solid var(--red);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--red);flex-shrink:0}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--white);letter-spacing:2px;line-height:1}
.tb-sub{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.5px;font-weight:300}
#clk{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;color:var(--white);letter-spacing:1px}

/* ─── BOTTOM NAV ─── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:98;height:var(--nav-h);background:rgba(0,0,0,.97);border-top:1px solid var(--line);display:flex;align-items:stretch;backdrop-filter:blur(20px)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;padding:6px 2px 8px;color:var(--muted);transition:color .2s}
.bnav-btn.active{color:var(--red)}
.bnav-icon{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;line-height:1}
.bnav-lbl{font-size:8.5px;font-weight:400;letter-spacing:.5px;line-height:1}

/* ─── CONTENT ─── */
.content{padding:0 14px}

/* ─── SECTION CARD ─── */
.sc{background:var(--z1);border:1px solid var(--line);margin-bottom:10px;overflow:hidden}
.sc-head{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--z2);border-bottom:1px solid var(--line)}
.sc-t{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--white);letter-spacing:1px}
.sc-meta{font-size:11px;color:var(--muted);font-weight:300}
.sc-body{padding:12px 13px}

/* ─── HEADER ─── */
.hdr{padding:16px 0 13px;border-bottom:1px solid var(--line);margin-bottom:14px}
.hdr-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;font-weight:300}
.hdr-t{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--white);letter-spacing:.5px;line-height:1}

/* ─── HEALTH SUB-TABS ─── */
.htabs{display:flex;background:var(--ink);border-bottom:1px solid var(--line);padding:0 14px;gap:20px}
.htab-btn{padding:10px 0;font-size:13px;font-weight:400;background:none;color:var(--muted);border:none;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:all .2s;letter-spacing:.3px}
.htab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:500}

/* ─── DAY BUTTONS ─── */
.day-btns{display:flex;gap:4px;margin-top:12px}
.day-btn{flex:1;padding:7px 2px;font-size:11px;font-weight:400;border:1px solid var(--line2);color:var(--muted);background:var(--z2);transition:all .18s;letter-spacing:.5px}
.day-btn.active{background:transparent;border-color:var(--red);color:var(--red);font-weight:500}

/* ─── EXERCISE CARD ─── */
.ex-card{background:var(--z1);border:1px solid var(--line);margin-bottom:9px;overflow:hidden}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 13px 9px;border-bottom:1px solid var(--line)}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--white);letter-spacing:.5px}
.ex-meta{font-size:11px;color:var(--muted);margin-top:2px;font-weight:300}
.ex-meta .hl{color:var(--red);font-weight:400}
.ex-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge-done{border:1px solid var(--red);color:var(--red);font-size:9px;padding:2px 7px;letter-spacing:1.5px;font-weight:600;font-family:'Barlow Condensed',sans-serif}
.hint-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:10px;padding:2px 8px;font-weight:400}
.hint-box{background:var(--z2);border-top:1px solid var(--line);padding:9px 13px}
.hint-t{font-size:9px;color:var(--red);letter-spacing:2px;margin-bottom:3px;font-weight:600;text-transform:uppercase}
.hint-txt{font-size:12px;color:var(--body);line-height:1.65;font-weight:300}
.set-row{display:flex;align-items:center;gap:9px;padding:8px 13px;border-top:1px solid var(--line);background:var(--z1);transition:background .15s}
.set-row.done-row{background:var(--red-a10)}
.set-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--muted);width:20px;flex-shrink:0;letter-spacing:.5px}
.set-row.done-row .set-lbl{color:var(--red)}
.set-inputs{flex:1;display:flex;gap:6px}
.set-inp{background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:7px 10px;font-size:15px;width:74px;font-weight:400;transition:border-color .15s}
.set-inp::placeholder{color:var(--muted);font-weight:300}
.set-inp:focus{border-color:var(--red)}
.set-inp.done-inp{border-color:rgba(204,21,34,.25)}
.set-inp.prev-inp{color:var(--muted);border-color:var(--line);font-style:italic;font-weight:300}
.chk-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:transparent;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk-btn.checked{border-color:var(--red);color:var(--red)}
.tmr-row{padding:7px 13px 12px}
.tmr-start{width:100%;background:transparent;color:var(--red);border:1px solid var(--red);padding:11px 0;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;letter-spacing:3px;display:flex;align-items:center;justify-content:center;gap:9px}
.week-nav{display:flex;gap:8px;margin:13px 0}
.wn-btn{background:var(--z2);border:1px solid var(--line);color:var(--body);padding:9px 13px;font-size:13px;font-weight:400}
.wn-btn:disabled{opacity:.2;cursor:default}
.wn-cur{flex:1;background:transparent;border:1px solid var(--red);color:var(--red);padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-align:center}
.next-wk{width:100%;background:transparent;color:var(--red);border:1px solid var(--red);padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;margin-bottom:13px}
.final-wk{border:1px solid var(--red);padding:13px;text-align:center;margin-bottom:13px;font-size:14px;font-weight:500;color:var(--red);background:var(--red-a10);letter-spacing:.5px}
.rest-day{text-align:center;padding:56px 20px}
.rest-icon{font-size:44px;margin-bottom:14px}
.rest-t{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--white);letter-spacing:2px}
.rest-s{color:var(--muted);font-size:12px;margin-top:5px;font-weight:300}
.reset-btn{width:100%;background:transparent;border:1px solid var(--line);color:var(--muted);padding:9px;font-size:12px;margin-top:9px;letter-spacing:.5px}
.footer{padding:14px 0 6px;border-top:1px solid var(--line);margin-top:14px}
.footer-txt{font-size:11px;color:var(--muted);line-height:1.8;margin-bottom:9px;font-weight:300}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{border:1px solid var(--line2);color:var(--muted);font-size:10px;padding:3px 9px;letter-spacing:.5px}

/* ─── TIMER OVERLAY ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(12px)}
.tmr-card{background:var(--z1);border:1px solid var(--line2);padding:28px 20px 20px;text-align:center;width:100%;max-width:320px;position:relative}
.tmr-close{position:absolute;top:13px;right:14px;background:var(--z3);border:1px solid var(--line2);color:var(--muted);font-size:13px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.tmr-label{font-size:9px;color:var(--muted);letter-spacing:4px;margin-bottom:7px;text-transform:uppercase;font-weight:400}
.tmr-time{font-family:'Barlow Condensed',sans-serif;font-size:86px;font-weight:700;color:var(--white);line-height:1;margin-bottom:5px;letter-spacing:-1px}
.tmr-time.warn{color:var(--red)}
.tmr-ex{font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:.5px;font-weight:300}
.tmr-progress{height:1px;background:var(--z5);margin-bottom:18px}
.tmr-bar{height:100%;background:var(--red);transition:width 1s linear}
.tmr-bar.warn{background:var(--red2)}
.tmr-adj{display:flex;gap:8px;justify-content:center;margin-bottom:11px}
.adj-btn{background:var(--z3);border:1px solid var(--line2);color:var(--body);padding:8px 20px;font-size:13px;font-weight:400}
.tmr-save-row{min-height:28px;display:flex;justify-content:center;align-items:center;margin-bottom:11px}
.save-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:6px 20px;font-size:12px;font-weight:500;letter-spacing:1px}
.saved-txt{color:#3ddc84;font-size:12px;font-weight:500;letter-spacing:1px}
.skip-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:9px 30px;font-size:13px;font-weight:400;letter-spacing:.5px}
.comp-card{background:var(--z1);border:1px solid var(--red);padding:40px 20px;text-align:center;width:100%;max-width:320px}
.comp-icon{font-size:52px;margin-bottom:16px}
.comp-t{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--white);letter-spacing:2px;margin-bottom:5px}
.comp-s{font-size:12px;color:var(--muted);margin-bottom:22px;font-weight:300}
.comp-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:11px 36px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px}

/* ─── NUTRITION ─── */
.mac-summary{background:var(--z1);border:1px solid var(--line);padding:14px;margin:12px 0}
.mac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mac-item{text-align:center}
.mac-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--white);line-height:1;letter-spacing:.5px}
.mac-val.over{color:var(--red)}
.mac-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;margin:3px 0;text-transform:uppercase;font-weight:300}
.mac-bar{height:1px;background:var(--z5);overflow:hidden;margin-top:4px}
.mac-fill{height:100%;background:var(--red);transition:width .4s;opacity:.8}
.mac-fill.over{opacity:1}
.nut-sec{background:var(--z1);border:1px solid var(--line);margin-bottom:9px;overflow:hidden}
.nut-sec-head{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--z2);border-bottom:1px solid var(--line)}
.nut-sec-t{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--white);letter-spacing:1px}
.nut-sec-c{font-size:11px;color:var(--muted);font-weight:300}
.search-area{padding:11px 13px}
.search-inp{flex:1;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:9px 11px;font-size:15px;font-weight:400}
.search-inp::placeholder{color:var(--muted);font-weight:300}
.search-inp:focus{border-color:var(--red)}
.manual-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:9px 11px;font-size:12px;width:100%;font-weight:400;letter-spacing:.3px}
.search-results{margin-top:8px}
.sri{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.sri:last-child{border-bottom:none}
.sri:active{opacity:.6}
.sri-name{font-size:13px;color:var(--text);font-weight:400}
.sri-mac{font-size:10px;color:var(--muted);margin-top:2px;font-weight:300}
.sri-arr{color:var(--red);font-size:18px}
.srch-status{text-align:center;color:var(--muted);font-size:12px;padding:14px 0;letter-spacing:.5px;font-weight:300}
.portion-form{background:var(--z2);border:1px solid var(--line2);padding:13px;margin-top:4px}
.pf-t{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--white);letter-spacing:.5px;margin-bottom:3px}
.pf-prev{font-size:11px;color:var(--red);min-height:15px;margin-bottom:8px;font-weight:400}
.f-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase;font-weight:400}
.f-inp{width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:9px 11px;font-size:15px;margin-bottom:9px;font-weight:400}
.f-inp:focus{border-color:var(--red)}
.f-inp::placeholder{color:var(--muted);font-weight:300}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.f-note{font-size:10px;color:var(--muted);margin-bottom:7px;font-weight:300}
.pf-actions{display:flex;gap:8px;margin-top:5px}
.add-btn{flex:1;background:transparent;color:var(--red);border:1px solid var(--red);padding:10px;font-size:14px;font-weight:500;letter-spacing:.5px}
.add-btn:active{background:var(--red-a10)}
.cancel-btn{background:var(--z3);border:1px solid var(--line2);color:var(--muted);padding:10px 14px;font-size:13px;font-weight:400}
.manual-form{background:var(--z2);border:1px solid var(--line2);padding:13px;margin-top:4px}
.mf-t{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--white);margin-bottom:7px;letter-spacing:.5px}
.fli{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--line)}
.fli:last-child{border-bottom:none}
.fli-info{flex:1}
.fli-name{font-size:13px;color:var(--text);font-weight:400}
.fli-mac{font-size:10px;color:var(--muted);margin-top:2px;font-weight:300}
.fli-del{background:none;border:none;color:var(--dim);font-size:20px;padding:0 4px;line-height:1}
.fli-del:active{color:var(--red)}
.empty-log{padding:18px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:.5px;font-weight:300}
.supp-item{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
.supp-item:last-child{border-bottom:none}
.supp-chk{width:20px;height:20px;border:1px solid var(--line2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:11px;flex-shrink:0;transition:all .2s}
.supp-chk.checked{border-color:var(--red)}
.supp-name{font-size:13px;color:var(--body);flex:1;font-weight:400}
.supp-time{font-size:11px;color:var(--muted);font-weight:300}
select.f-inp{-webkit-appearance:none;appearance:none}

/* ─── TODAY TAB ─── */
.sphere-row{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-bottom:1px solid var(--line)}
.sphere-row:last-child{border-bottom:none}
.sphere-icon{width:34px;height:34px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s}
.sphere-icon.done{border-color:var(--red);color:var(--red)}
.sphere-right{flex:1}
.sphere-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;font-weight:400;margin-bottom:4px;text-transform:uppercase}
.sphere-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--text);padding:2px 0 5px;font-size:14px;font-weight:400;transition:border-color .2s}
.sphere-inp:focus{border-bottom-color:var(--red);outline:none}
.sphere-inp.done-inp{color:var(--muted);text-decoration:line-through}
.sphere-chk{width:26px;height:26px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:transparent;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-top:4px}
.sphere-chk.chk-on{border-color:var(--red);color:var(--red)}
.day-score{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.score-btn{width:calc(10% - 6px);min-width:26px;padding:7px 0;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;border:1px solid var(--line2);background:transparent;color:var(--muted);text-align:center;transition:all .18s}
.score-btn.sel{border-color:var(--red);color:var(--red);background:var(--red-a10)}
.today-note{width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--text);padding:10px 11px;font-size:14px;font-weight:400;min-height:60px}
.today-note:focus{border-color:var(--red)}
.today-note::placeholder{color:var(--muted);font-weight:300}
.sphere-prog{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:12px 13px}
.sp-dot{display:flex;flex-direction:column;align-items:center;gap:4px}
.sp-circle{width:32px;height:32px;border:1px solid var(--line2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);transition:all .25s}
.sp-circle.on{border-color:var(--red);color:var(--red);background:var(--red-a10)}
.sp-name{font-size:7.5px;color:var(--muted);letter-spacing:.5px;text-align:center}

/* ─── BUSINESS TAB ─── */
.proj-item{padding:11px 13px;border-bottom:1px solid var(--line)}
.proj-item:last-child{border-bottom:none}
.proj-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--white);letter-spacing:.5px;margin-bottom:6px}
.task-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.task-row:last-child{margin-bottom:0}
.task-chk{width:18px;height:18px;border:1px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .2s;cursor:pointer}
.task-chk.on{border-color:var(--red);color:var(--red)}
.task-txt{font-size:13px;color:var(--body);flex:1;font-weight:400}
.task-txt.done-t{color:var(--muted);text-decoration:line-through}
.task-del{background:none;border:none;color:var(--dim);font-size:17px;padding:0 3px;line-height:1;flex-shrink:0}
.task-del:active{color:var(--red)}
.add-row{display:flex;gap:7px;padding:9px 13px;background:var(--z2);border-top:1px solid var(--line)}
.add-inp{flex:1;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:8px 10px;font-size:14px}
.add-inp:focus{border-color:var(--red);outline:none}
.add-inp::placeholder{color:var(--muted);font-weight:300}
.add-inp-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:8px 14px;font-size:13px;font-weight:500;white-space:nowrap}
.contact-row{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line)}
.contact-row:last-child{border-bottom:none}
.contact-ava{width:32px;height:32px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--muted);flex-shrink:0;background:var(--z3)}
.contact-info{flex:1}
.contact-name{font-size:13px;color:var(--white);font-weight:500}
.contact-deal{font-size:11px;color:var(--muted);margin-top:2px;font-weight:300}
.contact-date{font-size:10px;color:var(--red);margin-top:2px}
.idea-row{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border-bottom:1px solid var(--line)}
.idea-row:last-child{border-bottom:none}
.idea-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px}
.idea-txt{font-size:13px;color:var(--body);flex:1;font-weight:400;line-height:1.5}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 13px}
.metric-box{background:var(--z2);border:1px solid var(--line2);padding:11px}
.metric-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--white);line-height:1}
.metric-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:3px;text-transform:uppercase;font-weight:300}
.metric-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--white);padding:2px 0 4px;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700}
.metric-inp:focus{border-bottom-color:var(--red);outline:none}

/* ─── FINANCE TAB ─── */
.fin-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.fin-box{background:var(--z1);border:1px solid var(--line);padding:13px}
.fin-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:var(--white);line-height:1}
.fin-val.income{color:#3ddc84}
.fin-val.expense{color:var(--red)}
.fin-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px;text-transform:uppercase;font-weight:300}
.fin-goal-bar{height:3px;background:var(--z5);margin:12px 0 4px;overflow:hidden}
.fin-goal-fill{height:100%;background:#3ddc84;transition:width .4s}
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--line)}
.fin-row:last-child{border-bottom:none}
.fin-name{font-size:13px;color:var(--text);font-weight:400}
.fin-cat{font-size:10px;color:var(--muted);margin-top:2px;font-weight:300}
.fin-amount{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600}
.fin-amount.pos{color:#3ddc84}
.fin-amount.neg{color:var(--red)}

/* ─── RELATIONS TAB ─── */
.rel-check{display:flex;align-items:center;gap:11px;padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
.rel-check:last-child{border-bottom:none}
.rel-chk{width:22px;height:22px;border:1px solid var(--line2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.rel-chk.on{border-color:var(--red)}
.rel-txt{font-size:13px;color:var(--body);flex:1;font-weight:400}
.rel-txt.done-t{color:var(--muted);text-decoration:line-through}
.date-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--line)}
.date-row:last-child{border-bottom:none}
.date-name{font-size:13px;color:var(--text);font-weight:400}
.date-when{font-size:11px;color:var(--red);font-weight:400}

/* ─── DEVELOPMENT TAB ─── */
.dev-item{padding:11px 13px;border-bottom:1px solid var(--line)}
.dev-item:last-child{border-bottom:none}
.dev-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:5px;text-transform:uppercase;font-weight:400}
.dev-val{font-size:14px;color:var(--text);font-weight:400;line-height:1.5}
.dev-inp{width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:9px 11px;font-size:14px}
.dev-inp:focus{border-color:var(--red);outline:none}
.dev-inp::placeholder{color:var(--muted);font-weight:300}

/* ─── GOALS TAB ─── */
.goal-sphere{background:var(--z1);border:1px solid var(--line);margin-bottom:9px;overflow:hidden}
.goal-sphere-head{padding:10px 13px;background:var(--z2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.goal-sphere-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);letter-spacing:1px;flex:1}
.goal-period{padding:10px 13px;border-bottom:1px solid var(--line)}
.goal-period:last-child{border-bottom:none}
.goal-period-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:5px;text-transform:uppercase;font-weight:400}
.goal-text{font-size:13px;color:var(--body);font-weight:400;margin-bottom:6px;line-height:1.5}
.goal-pct-row{display:flex;align-items:center;gap:8px}
.goal-bar{flex:1;height:2px;background:var(--z5)}
.goal-fill{height:100%;background:var(--red);transition:width .4s}
.goal-pct{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--red);min-width:36px;text-align:right}
</style>
</head>

async function playGong(){try{const ctx=getAudioCtx();const buf=await loadGong();if(!buf)return;const src=ctx.createBufferSource();src.buffer=buf;const g=ctx.createGain();g.gain.value=0.8;src.connect(g);g.connect(ctx.destination);src.start(0);}catch(e){}}
function playBoxingBell(vol=1){try{const ctx=getAudioCtx();const now=ctx.currentTime;const hl=ctx.sampleRate*.025;const hb=ctx.createBuffer(1,hl,ctx.sampleRate);const hd=hb.getChannelData(0);for(let i=0;i<hl;i++)hd[i]=(Math.random()*2-1)*Math.pow(1-i/hl,20);const hs=ctx.createBufferSource();hs.buffer=hb;const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=2000;const hg=ctx.createGain();hg.gain.value=.7*vol;hs.connect(hp);hp.connect(hg);hg.connect(ctx.destination);hs.start(now);[{freq:1050,amp:.35,decay:1.4},{freq:2100,amp:.18,decay:1},{freq:3150,amp:.1,decay:.7},{freq:525,amp:.12,decay:1.2}].forEach(({freq,amp,decay})=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(.001,now);g.gain.linearRampToValueAtTime(amp*vol,now+.003);g.gain.exponentialRampToValueAtTime(.001,now+decay);o.connect(g);g.connect(ctx.destination);o.start(now);o.stop(now+decay+.05);});}catch(e){}}
function playCountdown(){for(let i=0;i<10;i++)setTimeout(()=>playBoxingBell(.25+(i/9)*.75),i*1000);}
function playBeep(){try{const ctx=getAudioCtx();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=800;g.gain.value=.3;o.start();o.stop(ctx.currentTime+.15);}catch(e){}}

// ─── TIMER ───
let ti=null,lb=null;
function st(sec,ex,eid){S.timer={on:true,left:sec,max:sec,ex,eid,mod:false,saved:false};lb=null;if(ti)clearInterval(ti);ti=setInterval(()=>{S.timer.left--;if(S.timer.left===10&&lb!==10){playCountdown();lb=10;}if(S.timer.left<=0){playGong();xst();return;}render();},1000);render();}
function xst(){if(ti)clearInterval(ti);ti=null;S.timer={on:false,left:0,max:0,ex:'',eid:null,mod:false,saved:false};render();}
function adj(d){const nl=S.timer.left+d,nm=S.timer.max+d;if(nl>=5&&nm>=5&&nm<=600){S.timer.left=nl;S.timer.max=nm;S.timer.mod=true;S.timer.saved=false;render();}}
function svp(){if(S.timer.eid!==null){S.cp[S.timer.eid]=S.timer.max;S.timer.mod=false;S.timer.saved=true;svState();render();setTimeout(()=>{if(S.timer.on){S.timer.saved=false;render();}},2200);}}
function gp(id,def){return S.cp[id]!==undefined?S.cp[id]:def;}
function ft(s){const m=Math.floor(s/60),sec=s%60;return m>0?m+':'+(sec<10?'0':'')+sec:''+ s;}
function fp(s){return s>=120?(s/60)+' мин':s+'с';}

// ─── WORKOUT ───
function us(eid,si,f,v){const k='w'+S.week+'_e'+eid;if(!S.wd[k])S.wd[k]={sets:[]};while(S.wd[k].sets.length<=si)S.wd[k].sets.push({w:'',r:'',c:false});S.wd[k].sets[si][f]=v;svState();}
function tc(eid,si,ei,dk,ls,le){const ex=PROGRAM[dk].exercises[ei];const k='w'+S.week+'_e'+eid;if(!S.wd[k])S.wd[k]={sets:[]};while(S.wd[k].sets.length<=si)S.wd[k].sets.push({w:'',r:'',c:false});const was=S.wd[k].sets[si].c;S.wd[k].sets[si].c=!was;if(!was){if(ls&&le){S.done=true;}else if(!ls){const p=gp(eid,ex.pause);st(p,ex.name,eid);const cur=S.wd[k].sets[si];if(!S.wd[k].sets[si+1])S.wd[k].sets[si+1]={w:'',r:'',c:false};if(cur.w)S.wd[k].sets[si+1].w=cur.w;if(cur.r)S.wd[k].sets[si+1].r=cur.r;}}svState();render();}
function gnw(){if(S.week<7){const nw=S.week+1;[1,3,5].forEach(d=>{const p=PROGRAM[d];if(!p)return;p.exercises.forEach(ex=>{const pk='w'+S.week+'_e'+ex.id,nk='w'+nw+'_e'+ex.id;if(S.wd[pk])S.wd[nk]={sets:S.wd[pk].sets.map(s=>({...s,c:false}))};});});S.week=nw;svState();render();}}
function ra(){if(confirm('Сбросить ВСЕ данные?')){{S.wd={};S.cp={};S.week=1;localStorage.removeItem('mt_v12');render();}}}

// ─── NUTRITION ───
function debounceSf(v){
  S.ns.q=v;
  S.ns.res=v.length>=1?gcp().filter(p=>p.name.toLowerCase().includes(v.toLowerCase())).map(p=>({...p,isC:true})).slice(0,7):[];
  const box=document.getElementById('sr-box');
  if(box)box.innerHTML=buildResultsHTML();
}
function buildResultsHTML(){
  return S.ns.res.map(p=>{
    const ps=JSON.stringify(p).replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return`<div class="sri" onclick="selp(JSON.parse(this.dataset.p))" data-p="${ps}"><div><div class="sri-name">${p.name}${p.isC?' ★':''}</div><div class="sri-mac">${p.cal} ККАЛ · Б${p.prot} Ж${p.fat} У${p.carbs} / 100Г</div></div><span class="sri-arr">›</span></div>`;
  }).join('');
}
function calcGoals(){const c=S.calc;const w=parseFloat(c.weight),h=parseFloat(c.height),a=parseFloat(c.age),act=parseFloat(c.activity);if(!w||!h||!a)return null;const bmr=c.sex==='m'?(10*w+6.25*h-5*a+5):(10*w+6.25*h-5*a-161);const tdee=Math.round(bmr*act);let cal=tdee;if(c.goal==='cut')cal=Math.round(tdee*.82);if(c.goal==='bulk')cal=Math.round(tdee*1.12);const prot=c.goal==='cut'?Math.round(w*2.4):Math.round(w*2);const fat=Math.round(cal*.25/9);const carbs=Math.round((cal-prot*4-fat*9)/4);return{cal,prot,fat:fat<Math.round(w*.8)?Math.round(w*.8):fat,carbs:carbs<0?0:carbs};}
function saveDomToCalc(){const w=document.getElementById('calc-weight');const h=document.getElementById('calc-height');const a=document.getElementById('calc-age');const act=document.getElementById('calc-act');if(w)S.calc.weight=w.value;if(h)S.calc.height=h.value;if(a)S.calc.age=a.value;if(act)S.calc.activity=act.value;}
function calcAndSave(){saveDomToCalc();const g=calcGoals();if(!g){alert('Заполни все поля');return;}setMG(g);S.calc.on=false;render();}
function selp(p){S.ns.sel=p;S.ns.gram='';S.ns.manual=false;render();setTimeout(()=>{const el=document.getElementById('gi');if(el)el.focus();},100);}
function ap(){const g=parseFloat(S.ns.gram);if(!g||g<=0)return;const p=S.ns.sel;const e={id:Date.now(),name:p.name,grams:g,cal:Math.round(p.cal*g/100),prot:Math.round(p.prot*g/100*10)/10,fat:Math.round(p.fat*g/100*10)/10,carbs:Math.round(p.carbs*g/100*10)/10};const nd=gnd();if(!nd.log)nd.log=[];nd.log.push(e);snd(nd);S.ns.sel=null;S.ns.gram='';S.ns.q='';S.ns.res=[];render();}
function am(){const m=S.ns.mf;if(!m.name.trim()||!m.grams)return;const g=parseFloat(m.grams)||100;const e={id:Date.now(),name:m.name.trim(),grams:g,cal:Math.round((parseFloat(m.cal)||0)*g/100),prot:Math.round((parseFloat(m.prot)||0)*g/100*10)/10,fat:Math.round((parseFloat(m.fat)||0)*g/100*10)/10,carbs:Math.round((parseFloat(m.carbs)||0)*g/100*10)/10};const cp=gcp();if(!cp.find(p=>p.name.toLowerCase()===m.name.trim().toLowerCase())){cp.push({id:'c'+Date.now(),name:m.name.trim(),cal:parseFloat(m.cal)||0,prot:parseFloat(m.prot)||0,fat:parseFloat(m.fat)||0,carbs:parseFloat(m.carbs)||0,isC:true});scp(cp);}const nd=gnd();if(!nd.log)nd.log=[];nd.log.push(e);snd(nd);S.ns.manual=false;S.ns.mf={name:'',cal:'',prot:'',fat:'',carbs:'',grams:''};render();}
function dl(id){const nd=gnd();nd.log=(nd.log||[]).filter(e=>e.id!==id);snd(nd);render();}
function addSupp(){const name=document.getElementById('supp-name').value.trim();const time=document.getElementById('supp-time').value.trim()||'—';if(!name)return;const a=gSupps();a.push({id:'s'+Date.now(),name,time});sSupps(a);render();}
function delSupp(id){sSupps(gSupps().filter(s=>s.id!==id));render();}
function ts(id){const nd=gnd();if(!nd.sup)nd.sup={};nd.sup[id]=!nd.sup[id];snd(nd);render();}
function cm(log){let c=0,p=0,f=0,ca=0;(log||[]).forEach(e=>{c+=e.cal;p+=e.prot;f+=e.fat;ca+=e.carbs;});return{cal:Math.round(c),prot:Math.round(p*10)/10,fat:Math.round(f*10)/10,carbs:Math.round(ca*10)/10};}
function pct(v,m){return m>0?Math.min(100,Math.round(v/m*100)):0;}

function toggleTodayDone(sphere){const d=gtd();if(!d.done)d.done={};d.done[sphere]=!d.done[sphere];std(d);render();}

// ─── CUSTOM ACTIVITY ───
function gact(day){return LS.get('mt_act_'+tdk()+'_d'+day,{items:[]});}
function sact(day,d){LS.set('mt_act_'+tdk()+'_d'+day,d);}
function addAct(day){
  const inp=document.getElementById('act-inp');
  if(!inp||!inp.value.trim())return;
  const d=gact(day);
  d.items.push({id:'a'+Date.now(),txt:inp.value.trim(),done:false});
  sact(day,d);render();
}
function toggleAct(day,id){
  const d=gact(day);
  const item=d.items.find(x=>x.id===id);
  if(item)item.done=!item.done;
  sact(day,d);render();
}
function delAct(day,id){
  const d=gact(day);
  d.items=d.items.filter(x=>x.id!==id);
  sact(day,d);render();
}
function actBlockHTML(day){
  const d=gact(day);
  const done=d.items.filter(x=>x.done).length;
  let h='';
  h+=`<div class="ex-card">
    <div class="ex-head"><div><div class="ex-name">АКТИВНОСТЬ ДНЯ</div><div class="ex-meta">бег, растяжка, прогулка...</div></div>
    <div class="ex-badges"><span style="font-size:11px;color:var(--muted);font-weight:300">${done}/${d.items.length}</span></div></div>`;
  d.items.forEach(item=>{
    h+=`<div class="set-row ${item.done?'done-row':''}">
      <button class="chk-btn ${item.done?'checked':''}" onclick="toggleAct(${day},'${item.id}')">${item.done?'✓':''}</button>
      <span style="flex:1;font-size:14px;color:${item.done?'var(--muted)':'var(--text)'};${item.done?'text-decoration:line-through':''};padding-left:4px">${item.txt}</span>
      <button onclick="delAct(${day},'${item.id}')" style="background:none;border:none;color:var(--dim);font-size:18px;padding:0 4px;line-height:1">×</button>
    </div>`;
  });
  h+=`<div class="tmr-row" style="display:flex;gap:7px">
    <input id="act-inp" type="text" class="set-inp" style="flex:1;width:auto" placeholder="Бег 5 км, растяжка...">
    <button class="tmr-start" style="flex:0;padding:10px 14px;font-size:13px;letter-spacing:1px" onclick="addAct(${day})">+ ДОБАВИТЬ</button>
  </div>`;
  h+='</div>';
  return h;
}

// ─── RENDER ───
function render(){
  const n=new Date();
  const clk=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();
  const dayName=DN[n.getDay()];
  let h='';

  // OVERLAY: Timer
  if(S.timer.on){
    const w=S.timer.left<=10;
    const pr=S.timer.max>0?(S.timer.left/S.timer.max)*100:0;
    let sr='<div class="tmr-save-row"></div>';
    if(S.timer.eid!==null){if(S.timer.saved)sr='<div class="tmr-save-row"><span class="saved-txt">✓ СОХРАНЕНО</span></div>';else if(S.timer.mod)sr='<div class="tmr-save-row"><button class="save-btn" onclick="svp()">СОХРАНИТЬ</button></div>';}
    h+=`<div class="overlay"><div class="tmr-card">
      <button class="tmr-close" onclick="xst()">✕</button>
      <div class="tmr-label">ОТДЫХ</div>
      <div class="tmr-time ${w?'warn':''}">${ft(S.timer.left)}</div>
      <div class="tmr-ex">${S.timer.ex.toUpperCase()}</div>
      <div class="tmr-progress"><div class="tmr-bar ${w?'warn':''}" style="width:${pr}%"></div></div>
      <div class="tmr-adj"><button class="adj-btn" onclick="adj(-15)">−15С</button><button class="adj-btn" onclick="adj(15)">+15С</button></div>
      ${sr}
      <button class="skip-btn" onclick="xst()">ПРОПУСТИТЬ →</button>
    </div></div>`;}
  if(S.done){h+=`<div class="overlay"><div class="comp-card"><div class="comp-icon">🏆</div><div class="comp-t">ГОТОВО!</div><div class="comp-s">Тренировка завершена. Отличная работа.</div><button class="comp-btn" onclick="S.done=false;render()">OK ✓</button></div></div>`;}

  // TOPBAR
  const tabNames={today:'СЕГОДНЯ',health:'ЗДОРОВЬЕ',biz:'БИЗНЕС',fin:'ФИНАНСЫ',rel:'СЕМЬЯ',dev:'РАЗВИТИЕ',goals:'ЦЕЛИ'};
  h+=`<div class="topbar">
    <div class="tb-left">
      <div class="week-badge">${S.week}</div>
      <div><div class="tb-title">MAX TIME</div><div class="tb-sub">${dayName} · ${tabNames[S.tab]}</div></div>
    </div>
    <span id="clk">${clk}</span>
  </div>`;

  h+='<div class="content">';

  // ════════════════════════════
  // TAB: СЕГОДНЯ
  // ════════════════════════════
  if(S.tab==='today'){
    const td=gtd();
    const tasks=td.tasks||{};const done=td.done||{};
    // Прогресс по сферам
    h+='<div class="sc" style="margin-top:14px"><div class="sphere-prog">';
    SPHERES.forEach(sp=>{
      const hasDone=done[sp.id];
      h+=`<div class="sp-dot"><div class="sp-circle ${hasDone?'on':''}">${sp.ab}</div><div class="sp-name">${sp.name.substring(0,3)}</div></div>`;
    });
    h+='</div></div>';
    // Задачи на день
    h+='<div class="sc"><div class="sc-head"><span class="sc-t">ЗАДАЧА ДНЯ</span><span class="sc-meta">по каждой сфере</span></div>';
    SPHERES.forEach(sp=>{
      const val=tasks[sp.id]||''
      const isDone=!!done[sp.id];
      h+=`<div class="sphere-row">
        <div class="sphere-icon ${isDone?'done':''}">${sp.ab}</div>
        <div class="sphere-right">
          <div class="sphere-lbl">${sp.name}</div>
          <input class="sphere-inp ${isDone?'done-inp':''}" type="text" placeholder="Главная задача..." value="${val.replace(/"/g,'&quot;')}"
            onchange="saveTodayTask('${sp.id}',this.value)">
        </div>
        <button class="sphere-chk ${isDone?'chk-on':''}" onclick="toggleTodayDone('${sp.id}')">${isDone?'✓':''}</button>
      </div>`;
    });
    h+='</div>';
    // Итог дня
    h+='<div class="sc"><div class="sc-head"><span class="sc-t">ИТОГ ДНЯ</span></div><div class="sc-body">';
    h+='<div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-bottom:8px;font-weight:300;text-transform:uppercase">ОЦЕНКА ДНЯ</div>';
    h+='<div class="day-score">';
    for(let i=1;i<=10;i++){h+=`<button class="score-btn ${td.rating===i?'sel':''}" onclick="saveTodayRating(${i})">${i}</button>`;}
    h+='</div>';
    h+='<div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;margin:10px 0 6px;font-weight:300;text-transform:uppercase">ГЛАВНОЕ ЗА ДЕНЬ</div>';
    h+=`<textarea class="today-note" placeholder="Что важного произошло сегодня?" onchange="saveTodayNote(this.value)">${td.note||''}</textarea>`;
    h+='</div></div>';
  }

  // ════════════════════════════
  // TAB: ЗДОРОВЬЕ
  // ════════════════════════════
  else if(S.tab==='health'){
    h+=`<div class="htabs"><button class="htab-btn ${S.htab==='training'?'active':''}" onclick="S.htab='training';render()">ТРЕНИРОВКИ</button><button class="htab-btn ${S.htab==='nutrition'?'active':''}" onclick="S.htab='nutrition';render()">ПИТАНИЕ</button></div>`;
    if(S.htab==='training'){
      const wc=WC[S.week];
      h+='<div class="content">';
      const dayLabels={1:'СПИНА + БИЦЕПС',2:'БЕГ / КАРДИО',3:'НОГИ + ПРЕСС',4:'БЕГ / КАРДИО',5:'ГРУДЬ + ПЛЕЧИ + ТРЦ',6:'АКТИВНОСТЬ',7:'ВОССТАНОВЛЕНИЕ'};
      h+=`<div class="hdr"><div class="hdr-lbl">НЕДЕЛЯ ${S.week} · ${wc.n} · ${wc.s} ПОДХОДА</div><div class="hdr-t">${dayLabels[S.day]}</div>
        <div class="day-btns">
          ${[1,2,3,4,5,6,7].map(d=>`<button class="day-btn ${S.day===d?'active':''}" onclick="S.day=${d};render()">${['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'][d-1]}</button>`).join('')}
        </div></div>`;
      const dk=S.day;
      const prog=PROGRAM[dk];
      if(!prog){
        h+=actBlockHTML(dk);
      } else {
        prog.exercises.forEach((ex,ei)=>{
          const k='w'+S.week+'_e'+ex.id;const sets=S.wd[k]?.sets||[];const nc=wc.s;
          const allDone=sets.length>=nc&&sets.slice(0,nc).every(s=>s.c);
          const prevKey='w'+(S.week-1)+'_e'+ex.id;const prevSets=S.week>1?(S.wd[prevKey]?.sets||[]):[];
          h+=`<div class="ex-card"><div class="ex-head"><div><div class="ex-name">${ex.name}</div><div class="ex-meta">${nc}×${ex.reps||'макс'} <span class="hl">· ${fp(gp(ex.id,ex.pause))}</span></div></div>
            <div class="ex-badges">${allDone?'<span class="badge-done">✓ DONE</span>':''}<button class="hint-btn" onclick="S.hints[${ex.id}]=!S.hints[${ex.id}];render()">?</button></div></div>`;
          if(S.hints[ex.id])h+=`<div class="hint-box"><div class="hint-t">ТЕХНИКА</div><div class="hint-txt">${ex.hint}</div></div>`;
          for(let si=0;si<nc;si++){
            const set=sets[si]||{w:'',r:'',c:false};
            const prev=prevSets[si];
            const isPrev=!set.w&&!set.r&&!!prev;
            const isDone=set.c;
            const isLast=si===nc-1;const isLastEx=ei===prog.exercises.length-1;
            h+=`<div class="set-row ${isDone?'done-row':''}" >
              <span class="set-lbl">${si+1}</span>
              <div class="set-inputs">
                <input class="set-inp ${isDone?'done-inp':isPrev&&!set.w?'prev-inp':''}" type="text" inputmode="decimal" placeholder="КГ"
                  value="${set.w||(isPrev?prev.w:'')}" onchange="us(${ex.id},${si},'w',this.value)">
                <input class="set-inp ${isDone?'done-inp':isPrev&&!set.r?'prev-inp':''}" type="text" inputmode="decimal" placeholder="ПОВТ"
                  value="${set.r||(isPrev?prev.r:'')}" onchange="us(${ex.id},${si},'r',this.value)">
              </div>
              <button class="chk-btn ${isDone?'checked':''}" onclick="tc(${ex.id},${si},${ei},${dk},${isLast},${isLastEx})">${isDone?'✓':''}</button>
            </div>`;
          }
          h+=`<div class="tmr-row"><button class="tmr-start" onclick="st(${gp(ex.id,ex.pause)},'${ex.name}',${ex.id})">⏱ ${fp(gp(ex.id,ex.pause))}</button></div>`;
          h+='</div>';
        });
        h+=actBlockHTML(dk);
        h+=`<div class="week-nav">
          <button class="wn-btn" onclick="if(S.week>1){S.week--;svState();render();}" ${S.week<=1?'disabled':''}>← НАЗАД</button>
          <div class="wn-cur">НЕДЕЛЯ ${S.week} / 7</div>
          <button class="wn-btn" onclick="if(S.week<7){S.week++;svState();render();}" ${S.week>=7?'disabled':''}>ВПЕРЁД →</button>
        </div>`;
        if(S.week<7)h+=`<button class="next-wk" onclick="gnw()">СЛЕДУЮЩАЯ НЕДЕЛЯ →</button>`;
        else h+='<div class="final-wk">🏆 ПРОГРАММА ЗАВЕРШЕНА!</div>';
        h+=`<div class="footer"><div class="footer-txt">Данные сохраняются автоматически.<br>Серые значения — предыдущая неделя.</div>
          <div class="tags"><span class="tag">7 НЕДЕЛЬ</span><span class="tag">3 ДНЯ / НЕД</span><span class="tag">ПРОГРЕССИЯ</span></div>
          <button class="reset-btn" onclick="ra()">↺ СБРОСИТЬ ВСЕ ДАННЫЕ</button></div>`;
      }
      h+='</div>';
    } else {
      // NUTRITION
      const MG=getMG();const nd=gnd();const mac=cm(nd.log);
      h+='<div class="content">';
      if(S.calc.on){
        const c=S.calc;
        h+=`<div class="nut-sec"><div class="nut-sec-head"><span class="nut-sec-t">КАЛЬКУЛЯТОР КБЖУ</span><button onclick="S.calc.on=false;render()" style="background:none;border:none;color:var(--muted);font-size:20px;line-height:1">×</button></div><div style="padding:13px">
          <div class="f-grid" style="margin-bottom:0">
            <div><div class="f-lbl">ПОЛ</div>
              <div style="display:flex;gap:6px">
                <button onclick="saveDomToCalc();S.calc.sex='m';render()" style="flex:1;padding:9px;font-size:14px;font-weight:500;border:1px solid ${c.sex==='m'?'var(--red)':'var(--line2)'};background:${c.sex==='m'?'var(--red-a20)':'transparent'};color:${c.sex==='m'?'var(--red)':'var(--muted)'}">М</button>
                <button onclick="saveDomToCalc();S.calc.sex='f';render()" style="flex:1;padding:9px;font-size:14px;font-weight:500;border:1px solid ${c.sex==='f'?'var(--red)':'var(--line2)'};background:${c.sex==='f'?'var(--red-a20)':'transparent'};color:${c.sex==='f'?'var(--red)':'var(--muted)'}">Ж</button>
              </div>
            </div>
            <div><div class="f-lbl">ВОЗРАСТ</div><input type="text" inputmode="numeric" placeholder="30" class="f-inp" id="calc-age" value="${c.age}"></div>
            <div><div class="f-lbl">ВЕС (КГ)</div><input type="text" inputmode="decimal" placeholder="80" class="f-inp" id="calc-weight" value="${c.weight}"></div>
            <div><div class="f-lbl">РОСТ (СМ)</div><input type="text" inputmode="decimal" placeholder="175" class="f-inp" id="calc-height" value="${c.height}"></div>
          </div>
          <div class="f-lbl" style="margin-top:4px">ЦЕЛЬ</div>

    h+=`<div class="sc"><div class="sc-head"><span class="sc-t">НАМЕРЕНИЕ НЕДЕЛИ</span></div><div style="padding:11px 13px"><textarea class="today-note" placeholder="Моё намерение на эту неделю..." onchange="saveDevField('affirmation',this.value)">${dev.affirmation||''}</textarea></div></div>`;
    // Практики дня
    const pc=dev.practices.filter((_,i)=>done[i]).length;
    h+=`<div class="sc"><div class="sc-head"><span class="sc-t">ПРАКТИКИ ДНЯ</span><span class="sc-meta">${pc}/${dev.practices.length}</span></div>`;
    dev.practices.forEach((p,i)=>{h+=`<div class="rel-check" onclick="toggleDevPractice(${i})"><div class="rel-chk ${done[i]?'on':''}">${done[i]?'<svg width="11" height="8" viewBox="0 0 11 8"><polyline points="1,4 4,7 10,1" stroke="var(--red)" stroke-width="1.5" fill="none"/></svg>':''}</div><span class="rel-txt ${done[i]?'done-t':''}">${p}</span><button onclick="event.stopPropagation();delDevPractice(${i})" style="background:none;border:none;color:var(--dim);font-size:17px;padding:0 4px">×</button></div>`;});
    h+=`<div class="add-row"><input id="dev-add" type="text" class="add-inp" placeholder="Добавить практику..."><button class="add-inp-btn" onclick="addDevPractice()">+ ДОБАВИТЬ</button></div></div>`;
    h+='</div>';
  }

  // ════════════════════════════
  // TAB: ЦЕЛИ
  // ════════════════════════════
  else if(S.tab==='goals'){
    const goals=ggoals();
    h+='<div style="margin-top:14px">';
    SPHERES.forEach(sp=>{
      const g=goals[sp.id];
      h+=`<div class="goal-sphere"><div class="goal-sphere-head"><div class="goal-sphere-name">${sp.name}</div></div>`;
      [{key:'month',pKey:'mp',label:'МЕСЯЦ'},{key:'quarter',pKey:'qp',label:'КВАРТАЛ'},{key:'year',pKey:'yp',label:'ГОД'}].forEach(({key,pKey,label})=>{
        h+=`<div class="goal-period"><div class="goal-period-lbl">${label}</div>
          <input type="text" class="dev-inp" style="margin-bottom:6px" placeholder="Напиши цель..." value="${g[key]||''}" onchange="saveGoalField('${sp.id}','${key}',this.value)">
          <div class="goal-pct-row">
            <div class="goal-bar"><div class="goal-fill" style="width:${g[pKey]||0}%"></div></div>
            <input type="text" inputmode="numeric" class="goal-pct" placeholder="0%" value="${g[pKey]>0?g[pKey]+'%':''}" onchange="saveGoalPct('${sp.id}','${pKey}',this.value.replace('%',''))">
          </div>
        </div>`;
      });
      h+='</div>';
    });
    h+='</div>';
  }

  h+='</div>';

  // BOTTOM NAV
  const tabs=[
    {id:'today',  ab:'◈', label:'ДЕНЬ'},
    {id:'health', ab:'♡', label:'ТЕЛО'},
    {id:'biz',    ab:'◧', label:'БИЗНЕС'},
    {id:'fin',    ab:'₽', label:'ДЕНЬГИ'},
    {id:'rel',    ab:'∞', label:'СЕМЬЯ'},
    {id:'dev',    ab:'↑', label:'РОСТ'},
    {id:'goals',  ab:'◎', label:'ЦЕЛИ'},
  ];
  h+='<nav class="bnav">';
  tabs.forEach(t=>{h+=`<button class="bnav-btn ${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';render()"><span class="bnav-icon">${t.ab}</span><span class="bnav-lbl">${t.label}</span></button>`;});
  h+='</nav>';

  document.getElementById('app').innerHTML=h;
}

// ─── INIT ───
loadState();
loadGong();
render();
setInterval(()=>{const el=document.getElementById('clk');if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}},1000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
</script>
</body>
</html>
