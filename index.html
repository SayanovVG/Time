<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="./manifest.json">
<title>MAX TIME</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0d0d;--z1:#161616;--z2:#1e1e1e;--z3:#252525;--z4:#2c2c2c;--z5:#333;
  --line:#2a2a2a;--line2:#333;--dim:#444;--muted:#666;
  --body:#bbb;--text:#eee;--white:#f5f5f5;
  --red:#e02030;--amber:#f0a800;--green:#2ecc80;
  --ra10:rgba(224,32,48,.12);--ra20:rgba(224,32,48,.22);
  --aa10:rgba(240,168,0,.12);--ga10:rgba(46,204,128,.12);--nav-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--ink)}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--ink);color:var(--body);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h)+4px)}
input,button,select,textarea{font-family:'DM Sans',system-ui,sans-serif}
input{font-size:16px!important}
input:focus,select:focus,textarea:focus{outline:none}
button{cursor:pointer;transition:opacity .15s,transform .1s}
button:active{transform:scale(.96);opacity:.8}
textarea{resize:none;font-size:16px!important}
.bc{font-family:'Barlow Condensed',sans-serif}

/* TOP */
.topbar{position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 9px;background:rgba(13,13,13,.98);border-bottom:1px solid var(--line);backdrop-filter:blur(20px)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-week{width:28px;height:28px;border:1px solid var(--red);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--red);flex-shrink:0}
.tb-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--white);letter-spacing:2px;line-height:1}
.tb-sub{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:300;margin-top:1px}
#clk{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--white);letter-spacing:1px}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:98;height:var(--nav-h);background:rgba(13,13,13,.98);border-top:1px solid var(--line2);display:flex;align-items:stretch;backdrop-filter:blur(20px)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;padding:6px 2px 8px;position:relative}
.bn::before{content:'';position:absolute;top:0;left:0;right:0;height:0;background:var(--red);transition:height .15s}
.bn.on::before{height:1px}
.bn-ico{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.bn-ico svg{width:100%;height:100%}
.bn-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase}
.bn.on .bn-lbl{color:var(--red)}

/* COMMON */
.pg{padding:0 13px}
.sc{background:var(--z1);border:1px solid var(--line2);margin-bottom:9px;overflow:hidden}
.sc-h{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--z2);border-bottom:1px solid var(--line)}
.sc-t{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--white);letter-spacing:1.5px}
.sc-m{font-size:10px;color:var(--muted);font-weight:300}
.f-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;font-weight:700}
.f-inp{width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:8px 10px;font-size:15px;margin-bottom:8px;font-weight:400}
.f-inp:focus{border-color:var(--red)}
.f-inp::placeholder{color:var(--muted);font-weight:300}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.add-btn{flex:1;background:transparent;color:var(--red);border:1px solid var(--red);padding:9px;font-size:13px;font-weight:500;letter-spacing:.5px}
.add-btn:active{background:var(--ra10)}
.cancel-btn{background:var(--z3);border:1px solid var(--line2);color:var(--muted);padding:9px 12px;font-size:12px;font-weight:400}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.del-btn{background:none;border:none;color:var(--dim);font-size:18px;padding:0 4px;line-height:1}
.del-btn:active{color:var(--red)}

/* ШТАБ */
.mit-block{padding:12px 13px;border-bottom:1px solid var(--line)}
.mit-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;font-weight:700;margin-bottom:5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mit-sphere-tag{border:1px solid var(--line2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 6px}
.mit-txt{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--white);line-height:1.2;letter-spacing:.3px;margin-bottom:9px;cursor:pointer}
.mit-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--white);padding:3px 0 5px;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.3px;margin-bottom:8px}
.mit-inp:focus{border-bottom-color:var(--red)}
.mit-inp::placeholder{color:var(--dim);font-weight:400}
.mit-actions{display:flex;gap:7px}
.mit-start{background:transparent;border:1px solid var(--red);color:var(--red);padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;flex:1}
.mit-edit-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:8px 10px;font-size:13px}
.badge-not-started{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--amber);border:1px solid var(--amber);padding:2px 7px}
.badge-done-mit{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--green)}

/* ALERTS */
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid rgba(212,146,10,.15);background:rgba(212,146,10,.08)}
.alert-row:last-child{border-bottom:none}
.alert-row.crit{background:rgba(196,16,32,.07);border-bottom-color:rgba(196,16,32,.12)}
.al-dot{width:4px;height:4px;background:var(--amber);flex-shrink:0}
.al-dot.crit{background:var(--red)}
.al-txt{font-size:12px;color:var(--amber);font-weight:600;letter-spacing:.3px}
.al-txt.crit{color:var(--red);font-size:12px}

/* СФЕРЫ */
.spheres-grid{display:flex;flex-direction:column}
.sph-cell{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:12px;flex:1}
.sph-cell:last-child{border-bottom:none}
.sph-top{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.sph-ico{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sph-ico svg{width:100%;height:100%}
.sph-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white);letter-spacing:1px;min-width:80px;flex-shrink:0}
.sph-chk{font-size:9px;color:transparent;width:16px;height:16px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:none;border-radius:0}
.sph-chk.on{border-color:var(--red);color:var(--red)}
.sph-goal{font-size:13px;color:var(--body);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.sph-cell.done .sph-name{color:var(--red)}

/* ЭНЕРГИЯ */
.nrg-block{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--line)}
.nrg-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;width:46px;flex-shrink:0}
.nrg-dots{display:flex;gap:3px;flex:1}
.nd{flex:1;height:4px;border:1px solid var(--line2)}
.nd.on{background:var(--red);border-color:var(--red)}
.nd.hi{background:var(--amber);border-color:var(--amber)}
.nrg-n{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--amber);width:20px;text-align:right;background:none;border:none}

/* ПУЛЬС */
.pulse-row{display:grid;grid-template-columns:repeat(3,1fr)}
.pc{padding:8px 11px;border-right:1px solid var(--line)}
.pc:last-child{border-right:none}
.p-l{font-size:7.5px;color:var(--muted);letter-spacing:.8px;font-weight:700;margin-bottom:2px;text-transform:uppercase}
.p-v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--white);line-height:1}
.p-v.a{color:var(--amber)}.p-v.r{color:var(--red)}.p-v.g{color:var(--green)}
.p-t{font-size:8px;color:var(--muted);margin-top:1px;font-weight:300}
.p-t.u{color:var(--green)}.p-t.d{color:var(--red)}

/* ВЕЧЕР */
.eve-block{padding:11px 13px;border-bottom:1px solid var(--line);flex:1;display:flex;flex-direction:column}
.eve-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:7px}
.score-row{display:flex;gap:3px;margin-bottom:9px}
.score-btn{flex:1;padding:6px 0;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--muted);border:1px solid var(--line2);background:transparent}
.score-btn.sel{border-color:var(--red);color:var(--red);background:var(--ra10)}
.day-note{width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--text);padding:9px 11px;font-size:14px;min-height:54px;flex:1}
.day-note:focus{border-color:var(--red)}
.day-note::placeholder{color:var(--muted);font-weight:300}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(13,13,13,.92);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(12px)}
.tmr-card{background:var(--z1);border:1px solid var(--line2);padding:26px 20px 20px;text-align:center;width:100%;max-width:320px;position:relative}
.tmr-close{position:absolute;top:12px;right:13px;background:var(--z3);border:1px solid var(--line2);color:var(--muted);font-size:12px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.tmr-lbl{font-size:9px;color:var(--muted);letter-spacing:4px;margin-bottom:6px;text-transform:uppercase}
.tmr-t{font-family:'Barlow Condensed',sans-serif;font-size:86px;font-weight:800;color:var(--white);line-height:1;margin-bottom:5px;letter-spacing:-2px}
.tmr-t.warn{color:var(--red)}
.tmr-ex{font-size:10px;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;font-weight:300}
.tmr-prog{height:1px;background:var(--z5);margin-bottom:16px}
.tmr-bar{height:100%;background:var(--red);transition:width 1s linear}
.tmr-adj{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.adj-btn{background:var(--z3);border:1px solid var(--line2);color:var(--body);padding:7px 18px;font-size:12px;font-weight:400}
.tmr-save-row{min-height:26px;display:flex;justify-content:center;align-items:center;margin-bottom:10px}
.save-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:5px 18px;font-size:11px;letter-spacing:1px}
.saved-txt{color:var(--green);font-size:11px;letter-spacing:1px}
.skip-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:8px 28px;font-size:12px;letter-spacing:.5px}
.comp-card{background:var(--z1);border:1px solid var(--red);padding:36px 20px;text-align:center;width:100%;max-width:320px}
.comp-t{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--white);letter-spacing:2px;margin-bottom:5px}
.comp-s{font-size:12px;color:var(--muted);margin-bottom:20px;font-weight:300}
.comp-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:10px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px}

/* ЗДОРОВЬЕ */
.htabs{display:flex;background:var(--ink);border-bottom:1px solid var(--line);padding:0 13px;gap:18px}
.htab{padding:9px 0;font-size:12px;font-weight:400;background:none;color:var(--muted);border:none;border-bottom:1.5px solid transparent;margin-bottom:-1px;letter-spacing:.3px}
.htab.on{color:var(--red);border-bottom-color:var(--red);font-weight:500}
.hdr{padding:12px 13px 10px;border-bottom:1px solid var(--line)}
.hdr-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:3px;text-transform:uppercase;font-weight:700}
.hdr-t{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--white);letter-spacing:.5px;line-height:1}
.day-btns{display:flex;gap:3px;margin-top:9px}
.day-btn{flex:1;padding:6px 1px;font-size:10px;border:1px solid var(--line2);color:var(--muted);background:var(--z2);letter-spacing:.3px;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.day-btn.on{background:transparent;border-color:var(--red);color:var(--red)}
.ex-card{background:var(--z1);border:1px solid var(--line);margin-bottom:8px;overflow:hidden}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px 8px;border-bottom:1px solid var(--line)}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--white);letter-spacing:.3px}
.ex-meta{font-size:10px;color:var(--muted);margin-top:2px;font-weight:300}
.ex-meta .hl{color:var(--red);font-weight:400}
.ex-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;margin-left:6px}
.badge-done{border:1px solid var(--red);color:var(--red);font-size:8px;padding:2px 6px;letter-spacing:1px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.badge-lr{border:1px solid var(--amber);color:var(--amber);font-size:8px;padding:2px 6px;letter-spacing:1px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.hint-btn{background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:10px;padding:2px 7px;font-weight:400}
.hint-box{background:var(--z3);border-top:1px solid var(--line);padding:8px 12px}
.hint-t{font-size:8px;color:var(--red);letter-spacing:2px;margin-bottom:2px;font-weight:700;text-transform:uppercase}
.hint-txt{font-size:11px;color:var(--body);line-height:1.6;font-weight:300}
.set-row{display:flex;align-items:center;gap:7px;padding:7px 12px;border-top:1px solid var(--line)}
.set-row.done-row{background:rgba(196,16,32,.06)}
.set-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);width:16px;flex-shrink:0}
.set-row.done-row .set-lbl{color:var(--red)}
.set-inputs{flex:1;display:flex;gap:5px}
.set-inp{background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 8px;font-size:14px;width:70px;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.set-inp::placeholder{color:var(--muted);font-weight:300;font-family:'DM Sans',sans-serif;font-size:11px}
.set-inp:focus{border-color:var(--red)}
.set-inp.done-inp{border-color:rgba(204,21,34,.25)}
.set-inp.prev-inp{color:var(--muted);border-color:var(--line);font-style:italic;font-weight:300}
.chk-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:transparent;font-size:12px;flex-shrink:0}
.chk-btn.checked{border-color:var(--red);color:var(--red)}
.prg-hint{font-size:10px;color:var(--amber);font-weight:500;padding:5px 12px 2px;letter-spacing:.5px}
.tmr-row{padding:6px 12px 10px}
.tmr-start{width:100%;background:transparent;color:var(--red);border:1px solid var(--red);padding:9px 0;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px}
.act-inp-row{display:flex;gap:6px;padding:8px 12px;background:var(--z2);border-top:1px solid var(--line)}
.act-txt-inp{flex:1;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 9px;font-size:13px}
.act-txt-inp:focus{border-color:var(--red);outline:none}
.act-txt-inp::placeholder{color:var(--muted);font-weight:300}
.act-add-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:6px 11px;font-size:14px;font-weight:700}
.week-nav{display:flex;gap:7px;margin:10px 0}
.wn-btn{background:var(--z2);border:1px solid var(--line);color:var(--body);padding:8px 12px;font-size:12px}
.wn-btn:disabled{opacity:.2}
.wn-cur{flex:1;background:transparent;border:1px solid var(--red);color:var(--red);padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-align:center}
.reset-btn{width:100%;background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px;font-size:11px;margin-top:8px;letter-spacing:.5px}

/* ПИТАНИЕ */
.mac-summary{background:var(--z2);border:1px solid var(--line);padding:12px 13px;margin:11px 0 9px}
.mac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mac-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--white);line-height:1}
.mac-val.over{color:var(--red)}
.mac-lbl{font-size:8px;color:var(--muted);letter-spacing:.3px;margin:2px 0;text-transform:uppercase;font-weight:300}
.mac-bar{height:1px;background:var(--z5)}
.mac-fill{height:100%;background:var(--red)}
.nut-sec{background:var(--z1);border:1px solid var(--line);margin-bottom:9px;overflow:hidden}
.nut-sec-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--z2);border-bottom:1px solid var(--line)}
.nut-sec-t{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--white);letter-spacing:1px}
.nut-sec-c{font-size:10px;color:var(--muted);font-weight:300}
.search-inp{background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:8px 10px;font-size:15px}
.search-inp::placeholder{color:var(--muted);font-weight:300}
.search-inp:focus{border-color:var(--red);outline:none}
.sri{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.sri:last-child{border-bottom:none}
.sri-name{font-size:12px;color:var(--text);font-weight:400}
.sri-mac{font-size:9px;color:var(--muted);margin-top:2px;font-weight:300}
.sri-arr{color:var(--red);font-size:16px}
.pf-actions{display:flex;gap:7px;margin-top:4px}
.fli{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
.fli:last-child{border-bottom:none}
.fli-info{flex:1}
.fli-name{font-size:12px;color:var(--text);font-weight:400}
.fli-mac{font-size:9px;color:var(--muted);margin-top:2px;font-weight:300}
.supp-item{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
.supp-item:last-child{border-bottom:none}
.supp-chk{width:18px;height:18px;border:1px solid var(--line2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;cursor:pointer}
.supp-chk.checked{border-color:var(--red)}
.supp-name{font-size:12px;color:var(--body);flex:1;font-weight:400}
.supp-time{font-size:10px;color:var(--muted);font-weight:300}

/* БИЗНЕС */
.biz-metrics{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--line)}
.bm{padding:8px 8px;border-right:1px solid var(--line)}
.bm:last-child{border-right:none}
.bm-l{font-size:7px;color:var(--muted);letter-spacing:.7px;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.metric-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;padding:2px 0}

async function playGong(){try{const ctx=getAC();const buf=await loadGong();if(!buf)return;const src=ctx.createBufferSource();src.buffer=buf;const g=ctx.createGain();g.gain.value=.8;src.connect(g);g.connect(ctx.destination);src.start(0);}catch(e){}}
function playBell(vol=1){try{const ctx=getAC();const now=ctx.currentTime;[{f:1050,a:.35,d:1.4},{f:2100,a:.18,d:1},{f:3150,a:.1,d:.7},{f:525,a:.12,d:1.2}].forEach(({f,a,d})=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.001,now);g.gain.linearRampToValueAtTime(a*vol,now+.003);g.gain.exponentialRampToValueAtTime(.001,now+d);o.connect(g);g.connect(ctx.destination);o.start(now);o.stop(now+d+.05);});}catch(e){}}
function playCountdown(){for(let i=0;i<10;i++)setTimeout(()=>playBell(.25+(i/9)*.75),i*1000);}

let ti=null,lb=null;
function st(sec,ex,eid){S.timer={on:true,left:sec,max:sec,ex,eid,mod:false,saved:false};lb=null;if(ti)clearInterval(ti);ti=setInterval(()=>{S.timer.left--;if(S.timer.left===10&&lb!==10){playCountdown();lb=10;}if(S.timer.left<=0){playGong();xst();return;}render();},1000);render();}
function xst(){if(ti)clearInterval(ti);ti=null;S.timer={on:false,left:0,max:0,ex:'',eid:null,mod:false,saved:false};render();}
function adj(d){const nl=S.timer.left+d,nm=S.timer.max+d;if(nl>=5&&nm>=5&&nm<=600){S.timer.left=nl;S.timer.max=nm;S.timer.mod=true;S.timer.saved=false;render();}}
function svp(){if(S.timer.eid!==null){S.cp[S.timer.eid]=S.timer.max;S.timer.mod=false;S.timer.saved=true;svState();render();setTimeout(()=>{if(S.timer.on){S.timer.saved=false;render();}},2200);}}
function gp(id,def){return S.cp[id]!==undefined?S.cp[id]:def;}
function ft(s){const m=Math.floor(s/60),sec=s%60;return m>0?m+':'+(sec<10?'0':'')+sec:''+s;}
function fp(s){return s>=120?(s/60)+' мин':s+'с';}

function us(eid,si,f,v){const k='w'+S.week+'_e'+eid;if(!S.wd[k])S.wd[k]={sets:[]};while(S.wd[k].sets.length<=si)S.wd[k].sets.push({w:'',r:'',c:false});S.wd[k].sets[si][f]=v;svState();}
function tc(eid,si,ei,dk,ls,le){const ex=PROGRAM[dk].exercises[ei];const k='w'+S.week+'_e'+eid;if(!S.wd[k])S.wd[k]={sets:[]};while(S.wd[k].sets.length<=si)S.wd[k].sets.push({w:'',r:'',c:false});const was=S.wd[k].sets[si].c;S.wd[k].sets[si].c=!was;if(!was){if(ls&&le){S.done=true;const dl=gdl();dl.sphereDone.health=true;sdl(dl);}else if(!ls){const p=gp(eid,ex.pause);st(p,ex.name,eid);const cur=S.wd[k].sets[si];if(!S.wd[k].sets[si+1])S.wd[k].sets[si+1]={w:'',r:'',c:false};if(cur.w)S.wd[k].sets[si+1].w=cur.w;if(cur.r)S.wd[k].sets[si+1].r=cur.r;}}svState();render();}
function gnw(){if(S.week<7){const nw=S.week+1;[1,3,5].forEach(d=>{const p=PROGRAM[d];if(!p)return;p.exercises.forEach(ex=>{const pk='w'+S.week+'_e'+ex.id,nk='w'+nw+'_e'+ex.id;if(S.wd[pk])S.wd[nk]={sets:S.wd[pk].sets.map(s=>({...s,c:false}))};});});S.week=nw;svState();render();}}
function ra(){if(confirm('Сбросить ВСЕ данные тренировок?')){S.wd={};S.cp={};S.week=1;localStorage.removeItem('mt_v12');render();}}
function isLR(eid,w){const recs=LS.get('mt_lr',{});return recs[eid]&&parseFloat(w)>recs[eid];}
function updateLR(eid,w){const recs=LS.get('mt_lr',{});const wf=parseFloat(w);if(!recs[eid]||wf>recs[eid]){recs[eid]=wf;LS.set('mt_lr',recs);}}
function addAct(day){const inp=document.getElementById('act-inp');if(!inp||!inp.value.trim())return;const d=gact(day);d.items.push({id:'a'+Date.now(),txt:inp.value.trim(),done:false});sact(day,d);render();}
function toggleAct(day,id){const d=gact(day);const item=d.items.find(x=>x.id===id);if(item)item.done=!item.done;sact(day,d);render();}
function delAct(day,id){const d=gact(day);d.items=d.items.filter(x=>x.id!==id);sact(day,d);render();}

function debounceSf(v){S.ns.q=v;S.ns.res=v.length>=1?gcp().filter(p=>p.name.toLowerCase().includes(v.toLowerCase())).slice(0,7):[];const box=document.getElementById('sr-box');if(box)box.innerHTML=buildRH();}
function buildRH(){return S.ns.res.map(p=>`<div class="sri" onclick='selp(${JSON.stringify(p)})'><div><div class="sri-name">${p.name}</div><div class="sri-mac">${p.cal} ККАЛ · Б${p.prot} Ж${p.fat} У${p.carbs}/100Г</div></div><span class="sri-arr">›</span></div>`).join('');}
function selp(p){S.ns.sel=p;S.ns.gram='';S.ns.manual=false;render();setTimeout(()=>{const el=document.getElementById('gi');if(el)el.focus();},100);}
function ap(){const g=parseFloat(S.ns.gram);if(!g||g<=0)return;const p=S.ns.sel;const e={id:Date.now(),name:p.name,grams:g,cal:Math.round(p.cal*g/100),prot:Math.round(p.prot*g/100*10)/10,fat:Math.round(p.fat*g/100*10)/10,carbs:Math.round(p.carbs*g/100*10)/10};const nd=gnd();if(!nd.log)nd.log=[];nd.log.push(e);snd(nd);S.ns.sel=null;S.ns.gram='';S.ns.q='';S.ns.res=[];render();}
function am(){const m=S.ns.mf;if(!m.name.trim()||!m.grams)return;const g=parseFloat(m.grams)||100;const e={id:Date.now(),name:m.name.trim(),grams:g,cal:Math.round((parseFloat(m.cal)||0)*g/100),prot:Math.round((parseFloat(m.prot)||0)*g/100*10)/10,fat:Math.round((parseFloat(m.fat)||0)*g/100*10)/10,carbs:Math.round((parseFloat(m.carbs)||0)*g/100*10)/10};const cp=gcp();if(!cp.find(p=>p.name.toLowerCase()===m.name.trim().toLowerCase())){cp.push({id:'c'+Date.now(),name:m.name.trim(),cal:parseFloat(m.cal)||0,prot:parseFloat(m.prot)||0,fat:parseFloat(m.fat)||0,carbs:parseFloat(m.carbs)||0});scp(cp);}const nd=gnd();if(!nd.log)nd.log=[];nd.log.push(e);snd(nd);S.ns.manual=false;S.ns.mf={name:'',cal:'',prot:'',fat:'',carbs:'',grams:''};render();}

function addSupp(){const name=document.getElementById('supp-name').value.trim();const time=document.getElementById('supp-time').value.trim()||'—';if(!name)return;sSupps([...gSupps(),{id:'s'+Date.now(),name,time}]);render();}

function ts(id){const nd=gnd();if(!nd.sup)nd.sup={};nd.sup[id]=!nd.sup[id];snd(nd);render();}
function cm(log){let c=0,p=0,f=0,ca=0;(log||[]).forEach(e=>{c+=e.cal;p+=e.prot;f+=e.fat;ca+=e.carbs;});return{cal:Math.round(c),prot:Math.round(p*10)/10,fat:Math.round(f*10)/10,carbs:Math.round(ca*10)/10};}
function pct(v,m){return m>0?Math.min(100,Math.round(v/m*100)):0;}
function calcGoals(){const c=S.calc;const w=parseFloat(c.weight),h=parseFloat(c.height),a=parseFloat(c.age),act=parseFloat(c.activity);if(!w||!h||!a)return null;const bmr=c.sex==='m'?(10*w+6.25*h-5*a+5):(10*w+6.25*h-5*a-161);const tdee=Math.round(bmr*act);let cal=tdee;if(c.goal==='cut')cal=Math.round(tdee*.82);if(c.goal==='bulk')cal=Math.round(tdee*1.12);const prot=c.goal==='cut'?Math.round(w*2.4):Math.round(w*2);const fat=Math.round(cal*.25/9);const carbs=Math.round((cal-prot*4-fat*9)/4);return{cal,prot,fat:fat<Math.round(w*.8)?Math.round(w*.8):fat,carbs:carbs<0?0:carbs};}
function calcAndSave(){const w=document.getElementById('calc-weight');const h=document.getElementById('calc-height');const a=document.getElementById('calc-age');const act=document.getElementById('calc-act');if(w)S.calc.weight=w.value;if(h)S.calc.height=h.value;if(a)S.calc.age=a.value;if(act)S.calc.activity=act.value;const g=calcGoals();if(!g){alert('Заполни все поля');return;}setMG(g);S.calc.on=false;render();}

function getAlerts(){
  const alerts=[];
  const biz=gbiz();
  if(!biz.metrics.leads||parseInt(biz.metrics.leads)===0)alerts.push({txt:'НЕТ ЛИДОВ — БРУСНИКА',crit:true});
  const rel=grel();const reld=greld();
  const ritDone=rel.checklist.filter((_,i)=>reld.done[i]).length;
  if(ritDone===0)alerts.push({txt:'РИТУАЛ С ПАРТНЁРОМ НЕ ВЫПОЛНЕН',crit:false});
  const dl=gdl();
  if(dl.energy>0&&dl.energy<4)alerts.push({txt:'НИЗКАЯ ЭНЕРГИЯ · РЕШИ ЧТО ДЕЛАТЬ',crit:false});
  return alerts;
}

function render(){
  const n=new Date();const hour=n.getHours();const isEvening=hour>=17;
  const clk=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();
  const dayName=DN[n.getDay()];const wc=WC[S.week];
  let h='';

  // TIMER
  if(S.timer.on){
    const w=S.timer.left<=10;const pr=S.timer.max>0?(S.timer.left/S.timer.max)*100:0;
    let sr='<div class="tmr-save-row"></div>';
    if(S.timer.eid!==null){if(S.timer.saved)sr='<div class="tmr-save-row"><span class="saved-txt">✓ СОХРАНЕНО</span></div>';else if(S.timer.mod)sr='<div class="tmr-save-row"><button class="save-btn" onclick="svp()">СОХРАНИТЬ</button></div>';}

  }
  if(S.done){h+=`<div class="overlay"><div class="comp-card"><div class="comp-t">ГОТОВО</div><div class="comp-s">Тренировка завершена.</div><button class="comp-btn" onclick="S.done=false;render()">OK ✓</button></div></div>`;}

  // TOPBAR
  const tabLabels={today:'ШТАБ',health:'ЗДОРОВЬЕ',biz:'БИЗНЕС',fin:'ДЕНЬГИ',rel:'СЕМЬЯ',dev:'РАЗВИТИЕ',goals:'ЦЕЛИ'};
  h+=`<div class="topbar"><div class="tb-l"><div class="tb-week">${S.week}</div><div><div class="tb-name">MAX TIME</div><div class="tb-sub">${dayName} · ${tabLabels[S.tab]}${isEvening?' · ВЕЧЕР':' · УТРО'}</div></div></div><span id="clk">${clk}</span></div>`;

  // ══ ШТАБ ══
  if(S.tab==='today'){
    const dl=gdl();const goals=ggoals();const alerts=getAlerts();
    h+='<div class="pg" style="padding-top:11px;height:calc(100vh - 44px - 60px);display:flex;flex-direction:column">';
    // MIT
    h+='<div class="mit-block sc">';
    h+=`<div class="mit-lbl"><span>ГЛАВНОЕ СЕГОДНЯ</span>${dl.mitSphere?`<span class="mit-sphere-tag">${dl.mitSphere}</span>`:''} ${dl.mitDone?'<span class="badge-done-mit">✓ ВЫПОЛНЕНО</span>':(!dl.mit?'<span class="badge-not-started">НЕ ЗАДАНО</span>':'')}</div>`;
    if(S.mitEdit||!dl.mit){
      h+=`<input class="mit-inp" type="text" placeholder="Главная задача дня..." value="${dl.mit||''}" onchange="saveMIT(this.value)" onblur="S.mitEdit=false;render()">`;
      h+=`<select style="width:100%;background:var(--z3);border:1px solid var(--line2);color:var(--white);padding:6px 8px;font-size:12px;margin-top:5px" onchange="saveMITSphere(this.value)"><option value="">— сфера —</option>${SPHERES.map(s=>`<option value="${s.name}"${dl.mitSphere===s.name?' selected':''}>${s.name}</option>`).join('')}</select>`;
    } else {
      h+=`<div class="mit-txt" onclick="S.mitEdit=true;render()">${dl.mit}</div>`;
      h+='<div class="mit-actions">';

    // ALERTS
    if(alerts.length){h+='<div class="sc">';alerts.forEach(a=>{h+=`<div class="alert-row ${a.crit?'crit':''}"><div class="al-dot ${a.crit?'crit':''}"></div><div class="al-txt ${a.crit?'crit':''}">${a.txt}</div></div>`;});h+='</div>';}
    // СФЕРЫ 3x2
    h+='<div class="sc" style="flex:1;display:flex;flex-direction:column"><div class="spheres-grid" style="flex:1;display:flex;flex-direction:column">';
    SPHERES.forEach(sp=>{

      h+=`<div class="sph-cell ${isDone?'done':''}" onclick="toggleSphDone('${sp.id}')"><div class="sph-top"><div class="sph-ico" style="color:${isDone?'var(--red)':'var(--muted)'}">${SICONS[sp.id]}</div><span class="sph-name">${sp.name}</span><span class="sph-goal">${g.month||'— задай цель —'}</span></div><span class="sph-chk ${isDone?'on':''}">${isDone?'✓':''}</span></div>`;
    });
    h+='</div></div>';
    if(!isEvening){

    } else {

      for(let i=1;i<=10;i++)h+=`<button class="score-btn ${dl.rating===i?'sel':''}" onclick="setRating(${i})">${i}</button>`;
      h+=`</div><textarea class="day-note" placeholder="Главное за день — одна строка..." onchange="saveNote(this.value)">${dl.note||''}</textarea></div></div>`;
    }

  }

  // ══ ЗДОРОВЬЕ ══
  else if(S.tab==='health'){
    h+=`<div class="htabs"><button class="htab ${S.htab==='training'?'on':''}" onclick="S.htab='training';render()">ТРЕНИРОВКИ</button><button class="htab ${S.htab==='nutrition'?'on':''}" onclick="S.htab='nutrition';render()">ПИТАНИЕ</button><button class="htab ${S.htab==='supps'?'on':''}" onclick="S.htab='supps';render()">ДОБАВКИ</button></div>`;
    if(S.htab==='training'){
      const dayLabels={1:'СПИНА + БИЦЕПС',2:'БЕГ / КАРДИО',3:'НОГИ + ПРЕСС',4:'БЕГ / КАРДИО',5:'ГРУДЬ + ПЛЕЧИ + ТРЦ',6:'АКТИВНОСТЬ',7:'ВОССТАНОВЛЕНИЕ'};

      const dk=S.day;const prog=PROGRAM[dk];
      const actData=gact(dk);
      h+=`<div class="ex-card"><div class="ex-head"><div><div class="ex-name">АКТИВНОСТЬ</div><div class="ex-meta">бег, кардио, растяжка...</div></div><div class="ex-badges"><span style="font-size:10px;color:var(--muted)">${actData.items.filter(x=>x.done).length}/${actData.items.length}</span></div></div>`;
      actData.items.forEach(item=>{h+=`<div class="set-row ${item.done?'done-row':''}"><button class="chk-btn ${item.done?'checked':''}" onclick="toggleAct(${dk},'${item.id}')">${item.done?'✓':''}</button><span style="flex:1;font-size:13px;color:${item.done?'var(--muted)':'var(--text)'};${item.done?'text-decoration:line-through':''}">${item.txt}</span><button onclick="delAct(${dk},'${item.id}')" style="background:none;border:none;color:var(--dim);font-size:17px;padding:0 3px">×</button></div>`;});
      h+=`<div class="act-inp-row"><input id="act-inp" type="text" class="act-txt-inp" placeholder="Добавить активность..."><button class="act-add-btn" onclick="addAct(${dk})">+</button></div></div>`;
      if(prog){
        prog.exercises.forEach((ex,ei)=>{
          const k='w'+S.week+'_e'+ex.id;const sets=S.wd[k]?.sets||[];const nc=wc.s;
          const allDone=sets.length>=nc&&sets.slice(0,nc).every(s=>s.c);
          const prevKey='w'+(S.week-1)+'_e'+ex.id;const prevSets=S.week>1?(S.wd[prevKey]?.sets||[]):[];
          const prevBest=prevSets.length?Math.max(...prevSets.map(s=>parseFloat(s.w)||0)):0;
          const curBest=sets.length?Math.max(...sets.map(s=>parseFloat(s.w)||0)):0;
          if(curBest>0)updateLR(ex.id,curBest);
          const lr=curBest>0&&isLR(ex.id,curBest);
          const progHint=prevBest>0&&!allDone?`ПРОШЛАЯ НЕДЕЛЯ ${prevBest}КГ — ПОПРОБУЙ ${prevBest+2.5}КГ`:null;
          h+=`<div class="ex-card"><div class="ex-head"><div><div class="ex-name">${ex.name}</div><div class="ex-meta">${nc}×${ex.reps||'макс'} <span class="hl">· ${fp(gp(ex.id,ex.pause))}</span></div></div><div class="ex-badges">${allDone?'<span class="badge-done">✓</span>':''}${lr?'<span class="badge-lr">ЛР</span>':''}<button class="hint-btn" onclick="S.hints[${ex.id}]=!S.hints[${ex.id}];render()">?</button></div></div>`;
          if(S.hints[ex.id])h+=`<div class="hint-box"><div class="hint-t">ТЕХНИКА</div><div class="hint-txt">${ex.hint}</div></div>`;
          if(progHint)h+=`<div class="prg-hint">${progHint}</div>`;
          for(let si=0;si<nc;si++){

            h+=`<div class="set-row ${isDone?'done-row':''}"><span class="set-lbl">${si+1}</span><div class="set-inputs"><input class="set-inp ${isDone?'done-inp':isPrev&&!set.w?'prev-inp':''}" type="text" inputmode="decimal" placeholder="КГ" value="${set.w||(isPrev?prev.w:'')}" onchange="us(${ex.id},${si},'w',this.value)"><input class="set-inp ${isDone?'done-inp':isPrev&&!set.r?'prev-inp':''}" type="text" inputmode="decimal" placeholder="ПОВТ" value="${set.r||(isPrev?prev.r:'')}" onchange="us(${ex.id},${si},'r',this.value)"></div><button class="chk-btn ${isDone?'checked':''}" onclick="tc(${ex.id},${si},${ei},${dk},${isLast},${isLastEx})">${isDone?'✓':''}</button></div>`;

        });
        h+=`<div class="week-nav"><button class="wn-btn" onclick="if(S.week>1){S.week--;svState();render();}" ${S.week<=1?'disabled':''}>← НАЗАД</button><div class="wn-cur">НЕД ${S.week} / 7</div><button class="wn-btn" onclick="if(S.week<7){S.week++;svState();render();}" ${S.week>=7?'disabled':''}>ВПЕРЁД →</button></div>`;
        if(S.week<7)h+=`<button style="width:100%;background:transparent;color:var(--red);border:1px solid var(--red);padding:11px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;margin-bottom:11px" onclick="gnw()">СЛЕДУЮЩАЯ НЕДЕЛЯ →</button>`;
        h+=`<button class="reset-btn" onclick="ra()">↺ СБРОСИТЬ ТРЕНИРОВКИ</button><div style="height:11px"></div>`;
      }
      h+='</div>';
    } else if(S.htab==='nutrition'){
      const MG=getMG();const nd=gnd();const mac=cm(nd.log);
      h+='<div class="pg" style="padding-top:0">';

    const dev=gdev();const devd=gdevd();
    h+='<div class="pg" style="padding-top:11px">';
    h+=`<div class="sc"><div class="sc-h"><span class="sc-t">СЕЙЧАС ИЗУЧАЮ</span></div><div class="dev-item"><div class="dev-lbl">КНИГА</div><input type="text" class="dev-inp" placeholder="Название книги..." value="${dev.book||''}" onchange="saveDevField('book',this.value)"></div><div class="dev-item"><div class="dev-lbl">КУРС</div><input type="text" class="dev-inp" placeholder="Название курса..." value="${dev.course||''}" onchange="saveDevField('course',this.value)"></div><div class="dev-item" style="border-bottom:none"><div class="dev-lbl">АФФИРМАЦИЯ НЕДЕЛИ</div><input type="text" class="dev-inp" placeholder="Я становлюсь..." value="${dev.affirmation||''}" onchange="saveDevField('affirmation',this.value)"></div></div>`;
    h+=`<div class="sc"><div class="sc-h"><span class="sc-t">ЕЖЕДНЕВНЫЕ ПРАКТИКИ</span><span class="sc-m">${dev.practices.filter((_,i)=>devd.done[i]).length}/${dev.practices.length}</span></div>`;
    dev.practices.forEach((p,i)=>{const done=!!devd.done[i];h+=`<div class="rel-check" onclick="toggleDevPractice(${i})"><div class="rel-chk ${done?'on':''}">${done?'<svg width="10" height="8" viewBox="0 0 10 8"><polyline points="1,4 3.5,6.5 9,1" stroke="var(--red)" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}</div><span class="rel-txt ${done?'done':''}">${p}</span><button class="del-btn" onclick="event.stopPropagation();delDevPractice(${i})">×</button></div>`;});
    if(S.devAdd)h+=`<div style="padding:8px 12px;background:var(--z2);border-top:1px solid var(--line)"><div class="add-row" style="padding:0;background:transparent"><input id="dev-add-inp" type="text" class="add-inp" placeholder="Новая практика..."><button class="add-inp-btn" onclick="addDevPractice()">+</button></div></div>`;
    else h+=`<div style="padding:7px 12px;border-top:1px solid var(--line)"><button onclick="S.devAdd=true;render()" style="background:transparent;border:none;color:var(--muted);font-size:11px;width:100%;text-align:left;padding:0">+ добавить практику</button></div>`;
    h+='</div>';
    const hypos=ghypo();
    h+=`<div class="sc"><div class="sc-h"><span class="sc-t">ГИПОТЕЗЫ</span><button onclick="S.hypoAdd=!S.hypoAdd;render()" style="background:transparent;border:1px solid var(--red);color:var(--red);padding:3px 10px;font-size:11px">+</button></div>`;
    if(S.hypoAdd)h+=`<div style="padding:10px 12px;background:var(--z2);border-bottom:1px solid var(--line)"><div class="f-lbl">ГИПОТЕЗА</div><textarea id="hypo-txt-inp" class="day-note" style="min-height:48px" placeholder="Если я делаю X, то Y..."></textarea><div class="f-lbl" style="margin-top:6px">МЕТРИКА ПРОВЕРКИ</div><input id="hypo-metric-inp" type="text" class="f-inp" placeholder="конверсия звонок → КП"><div class="pf-actions"><button class="add-btn" onclick="addHypo()">ДОБАВИТЬ</button><button class="cancel-btn" onclick="S.hypoAdd=false;render()">ОТМЕНА</button></div></div>`;
    hypos.forEach(hy=>{const sl={TESTING:'t',SUCCESS:'s',FAIL:'f',IDEA:'i'};h+=`<div class="hypo"><div class="hy-s ${sl[hy.status]||'i'}">${hy.status==='TESTING'?'— ТЕСТИРУЮ':hy.status==='SUCCESS'?'+ ПОДТВЕРЖДЕНО':hy.status==='FAIL'?'× ОПРОВЕРГНУТО':'◆ ИДЕЯ'}</div><div class="hy-tx">${hy.txt}</div>${hy.metric?`<div class="hy-m">Метрика: ${hy.metric}</div>`:''}${hy.status==='TESTING'?`<div class="hy-actions"><button class="hy-btn s" onclick="setHypoStatus('${hy.id}','SUCCESS')">✓ РАБОТАЕТ</button><button class="hy-btn f" onclick="setHypoStatus('${hy.id}','FAIL')">× НЕ РАБОТАЕТ</button><button class="hy-btn" onclick="delHypo('${hy.id}')">удалить</button></div>`:''}`;h+='</div>';});
    if(!hypos.length)h+='<div style="padding:14px;text-align:center;color:var(--muted);font-size:11px;font-weight:300">НЕТ ГИПОТЕЗ</div>';
    h+='</div></div>';
  }

  // ══ ФОКУС ══
  else if(S.tab==='goals'){
    const goals=ggoals();
    const wfocus=LS.get('mt_wfocus',{health:'',biz:'',fin:'',rel:'',dev:'',goals:''});
    h+='<div class="pg" style="padding-top:11px">';
    h+=`<div style="padding:4px 0 10px"><div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">ФОКУС НЕДЕЛИ — ЧТО ВАЖНО СДЕЛАТЬ</div></div>`;
    SPHERES.forEach(sp=>{
      const g=goals[sp.id]||{};
      const wf=wfocus[sp.id]||'';
      h+=`<div class="sc" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line)"><div style="color:var(--muted);width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${SICONS[sp.id]}</div><span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white);letter-spacing:1px;flex-shrink:0;width:90px">${sp.name}</span><span style="font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.month||'цель не задана'}</span></div><div style="padding:8px 13px"><input type="text" placeholder="Что сделать на этой неделе..." style="width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--white);padding:4px 0 6px;font-size:14px;font-weight:400" value="${wf}" onchange="const wf=LS.get('mt_wfocus',{health:'',biz:'',fin:'',rel:'',dev:'',goals:''});wf['${sp.id}']=this.value;LS.set('mt_wfocus',wf)"></div></div>`;
    });
    h+='</div>';
  }

  // BOTTOM NAV
  const tabs=[['today','ШТАБ'],['health','ЗДОРОВЬЕ'],['biz','БИЗНЕС'],['fin','ДЕНЬГИ'],['rel','СЕМЬЯ'],['dev','РАЗВИТИЕ'],['goals','ФОКУС']];
  h+='<nav class="bnav">';
  tabs.forEach(([id,lbl])=>{const on=S.tab===id;h+=`<button class="bn ${on?'on':''}" onclick="S.tab='${id}';render()"><span class="bn-ico" style="color:${on?'var(--red)':'var(--muted)'}">${TAB_ICONS[id]}</span><span class="bn-lbl">${lbl}</span></button>`;});
  h+='</nav>';

  document.getElementById('app').innerHTML=h;
  if(S.ns.q){const si=document.getElementById('si');if(si){si.selectionStart=si.value.length;si.selectionEnd=si.value.length;}}
}

// INSTALL BANNER
function checkInstall(){
  if(window.matchMedia('(display-mode: standalone)').matches)return;
  const dismissed=localStorage.getItem('pwa_dismissed');
  if(dismissed)return;
  const banner=document.createElement('div');
  banner.id='install-banner';
  banner.style.cssText='position:fixed;bottom:64px;left:12px;right:12px;background:#1e1e1e;border:1px solid #e02030;padding:12px 14px;z-index:300;display:flex;align-items:center;gap:10px';
  banner.innerHTML=`<div style="flex:1;font-size:12px;color:#eee;font-weight:400;line-height:1.4">Добавь на рабочий стол для полноэкранного режима</div><button onclick="localStorage.setItem('pwa_dismissed','1');document.getElementById('install-banner').remove()" style="background:transparent;border:1px solid #666;color:#666;padding:5px 10px;font-size:11px;flex-shrink:0">✕</button>`;
  document.body.appendChild(banner);
}

// INIT
loadState();
render();
setTimeout(checkInstall, 1500);
setInterval(()=>{const el=document.getElementById('clk');if(el){const n=new Date();el.textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}},30000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');
</script>
</body>
